openapi: 3.0.3
info:
  title: ZooLink Organization API
  version: 1.0.0
  description: >
    API управления организациями, филиалами и связями организация-пользователь в ZooLink.
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth (§2), x-required-roles (§3),
    ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5), LocalizedString (§6),
    If-Match/ETag на мутирующих PATCH (§10).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /organizations:
    get:
      summary: Список организаций
      operationId: listOrganizations
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: name
          schema: { type: string }
          description: Фильтр по названию организации (без учёта регистра, частичное совпадение)
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Фильтр по активности
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
      responses:
        '200':
          description: Постраничный список организаций
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Organization' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Создать новую организацию
      operationId: createOrganization
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationCreate' }
      responses:
        '201':
          description: Организация успешно создана
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organizations/{id}:
    get:
      summary: Получить организацию по ID
      operationId: getOrganizationById
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Детали организации
          headers:
            ETag:
              schema: { type: string }
              description: Weak-валидатор для отправки в If-Match на PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Обновить организацию
      operationId: updateOrganization
      description: Оптимистичная конкуренция (§10) — требует If-Match с ETag из предыдущего GET.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего GET /organizations/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationUpdate' }
      responses:
        '200':
          description: Организация успешно обновлена
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Удалить организацию (мягкое удаление)
      operationId: deleteOrganization
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Организация успешно удалена }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organizations/{id}/branches:
    get:
      summary: Список филиалов организации
      operationId: listOrganizationBranches
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID организации
        - in: query
          name: is_headquarters
          schema: { type: boolean }
          description: Фильтр по флагу головного офиса
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Фильтр по активности
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
      responses:
        '200':
          description: Постраничный список филиалов
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Branch' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Создать новый филиал организации
      operationId: createBranch
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID организации
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BranchCreate' }
      responses:
        '201':
          description: Филиал успешно создан
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Branch' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organizations/{orgId}/users:
    get:
      summary: Список пользователей, связанных с организацией
      operationId: listOrganizationUsers
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string, format: uuid }
          description: ID организации
        - in: query
          name: role
          schema: { type: string, enum: [OWNER, ADMIN, STAFF, VET, MODERATOR] }
          description: Фильтр по роли в организации
        - in: query
          name: is_primary
          schema: { type: boolean }
          description: Фильтр по флагу основной связи
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
      responses:
        '200':
          description: Постраничный список пользователей организации
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/OrganizationUser' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Связать пользователя с организацией
      operationId: createOrganizationUser
      x-required-roles: [OWNER, ADMIN]
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string, format: uuid }
          description: ID организации
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationUserCreate' }
      responses:
        '201':
          description: Связь организация-пользователь успешно создана
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationUser' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organization-users/{id}:
    get:
      summary: Получить связь организация-пользователь по ID
      operationId: getOrganizationUserById
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Детали связи организация-пользователь
          headers:
            ETag:
              schema: { type: string }
              description: Weak-валидатор для отправки в If-Match на PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationUser' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Обновить связь организация-пользователь
      operationId: updateOrganizationUser
      description: Оптимистичная конкуренция (§10) — требует If-Match с ETag из предыдущего GET.
      x-required-roles: [OWNER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего GET /organization-users/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationUserUpdate' }
      responses:
        '200':
          description: Связь организация-пользователь успешно обновлена
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationUser' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Удалить связь организация-пользователь
      operationId: deleteOrganizationUser
      x-required-roles: [OWNER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Связь организация-пользователь успешно удалена }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    Organization:
      type: object
      required:
        - id
        - address
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованное название организации (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованное описание (LocalizedString {en, ru})
        inn:
          type: string
          maxLength: 20
          description: ИНN (опционально)
        kpp:
          type: string
          maxLength: 20
          description: КПП (опционально)
        address:
          type: string
          description: Адрес головного офиса
        phone:
          type: string
          maxLength: 30
          description: Контактный телефон (опционально)
        email:
          type: string
          maxLength: 255
          format: email
          description: Контактный email (опционально)
        logoUrl:
          type: string
          format: uri
          description: URL логотипа организации (опционально)
        metadata:
          type: object
          description: JSONB-поле расширяемости (тариф подписки, настройки брендинга и т.п.)
          default: {}
        isActive:
          type: boolean
          description: Активность
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
    OrganizationCreate:
      type: object
      required:
        - address
      properties:
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованное название организации (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованное описание (LocalizedString {en, ru})
        inn:
          type: string
          maxLength: 20
          description: ИНN (опционально)
        kpp:
          type: string
          maxLength: 20
          description: КПП (опционально)
        address:
          type: string
          description: Адрес головного офиса
        phone:
          type: string
          maxLength: 30
          description: Контактный телефон (опционально)
        email:
          type: string
          maxLength: 255
          format: email
          description: Контактный email (опционально)
        logoUrl:
          type: string
          format: uri
          description: URL логотипа организации (опционально)
        metadata:
          type: object
          description: JSONB-поле расширяемости (тариф подписки, настройки брендинга и т.п.)
          default: {}
        isActive:
          type: boolean
          description: Активность
          default: true
    OrganizationUpdate:
      type: object
      properties:
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованное название организации (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованное описание (LocalizedString {en, ru})
        inn:
          type: string
          maxLength: 20
          description: ИНN (опционально)
        kpp:
          type: string
          maxLength: 20
          description: КПП (опционально)
        address:
          type: string
          description: Адрес головного офиса
        phone:
          type: string
          maxLength: 30
          description: Контактный телефон (опционально)
        email:
          type: string
          maxLength: 255
          format: email
          description: Контактный email (опционально)
        logoUrl:
          type: string
          format: uri
          description: URL логотипа организации (опционально)
        metadata:
          type: object
          description: JSONB-поле расширяемости (тариф подписки, настройки брендинга и т.п.)
        isActive:
          type: boolean
          description: Активность
    Branch:
      type: object
      required:
        - id
        - organizationId
        - cityId
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        organizationId:
          type: string
          format: uuid
          description: Внешний ключ на организацию
        cityId:
          type: integer
          description: Внешний ключ на город для гео-поиска
        addressLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованный адрес (LocalizedString {en, ru})
        phone:
          type: string
          maxLength: 30
          description: Телефон филиала (опционально)
        email:
          type: string
          maxLength: 255
          format: email
          description: Email филиала (опционально)
        metadata:
          type: object
          description: JSONB-поле расширяемости (атрибуты конкретного филиала)
          default: {}
        isHeadquarters:
          type: boolean
          description: Флаг головного офиса
          default: false
        isActive:
          type: boolean
          description: Активность
          default: true
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
    BranchCreate:
      type: object
      required:
        - organizationId
        - cityId
      properties:
        organizationId:
          type: string
          format: uuid
          description: Внешний ключ на организацию
        cityId:
          type: integer
          description: Внешний ключ на город для гео-поиска
        addressLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Локализованный адрес (LocalizedString {en, ru})
        phone:
          type: string
          maxLength: 30
          description: Телефон филиала (опционально)
        email:
          type: string
          maxLength: 255
          format: email
          description: Email филиала (опционально)
        metadata:
          type: object
          description: JSONB-поле расширяемости (атрибуты конкретного филиала)
          default: {}
        isHeadquarters:
          type: boolean
          description: Флаг головного офиса
          default: false
        isActive:
          type: boolean
          description: Активность
          default: true
    OrganizationUser:
      type: object
      required:
        - id
        - organizationId
        - userId
        - roleInOrg
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        organizationId:
          type: string
          format: uuid
          description: Внешний ключ на организацию
        userId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя
        roleInOrg:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Роль в организации (enum в рамках организации, отдельно от платформенных ролей)
        isPrimary:
          type: boolean
          description: Флаг основной организации для уведомлений
          default: false
        joinedAt:
          type: string
          format: date
          description: Дата вступления пользователя в организацию
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
    OrganizationUserCreate:
      type: object
      required:
        - organizationId
        - userId
        - roleInOrg
        - joinedAt
      properties:
        organizationId:
          type: string
          format: uuid
          description: Внешний ключ на организацию
        userId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя
        roleInOrg:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Роль в организации (enum в рамках организации, отдельно от платформенных ролей)
        isPrimary:
          type: boolean
