openapi: 3.0.3
info:
  title: ZooLink Animals API
  version: 1.0.0
  description: >
    API управления профилями животных в ZooLink.
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth (§2), x-required-roles (§3),
    ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5), LocalizedString (§6),
    If-Match/ETag на мутирующих PATCH (§10).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /animals:
    get:
      summary: Список животных с фильтрацией
      operationId: listAnimals
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: owner_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID владельца (личные)
        - in: query
          name: organization_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID организации (организационные)
        - in: query
          name: species_id
          schema: { type: integer }
          description: Фильтр по ID вида
        - in: query
          name: breed_id
          schema: { type: integer }
          description: Фильтр по ID породы
        - in: query
          name: sex
          schema: { type: string, enum: [Male, Female] }
          description: Фильтр по полу
        - in: query
          name: nickname
          schema: { type: string }
          description: Фильтр по кличке (частичное совпадение, без учёта регистра)
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Фильтр по активности
        - in: query
          name: date_of_birth_min
          schema: { type: string, format: date }
          description: Минимальная дата рождения
        - in: query
          name: date_of_birth_max
          schema: { type: string, format: date }
          description: Максимальная дата рождения
        - in: query
          name: owned_since_min
          schema: { type: string, format: date }
          description: Минимальная дата владения
        - in: query
          name: owned_since_max
          schema: { type: string, format: date }
          description: Максимальная дата владения
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
      responses:
        '200':
          description: Постраничный список животных
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Animal' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Создать новый профиль животного
      operationId: createAnimal
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnimalCreate' }
      responses:
        '201':
          description: Животное успешно создано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}:
    get:
      summary: Получить животное по ID
      operationId: getAnimalById
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Детали животного
          headers:
            ETag:
              schema: { type: string }
              description: Weak-валидатор для отправки в If-Match на PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Обновить животное
      operationId: updateAnimal
      description: Оптимистичная конкуренция (§10) — требует If-Match с ETag из предыдущего GET.
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего GET /animals/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnimalUpdate' }
      responses:
        '200':
          description: Животное успешно обновлено
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Удалить животное (мягкое удаление через isActive=false)
      operationId: deleteAnimal
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Животное успешно удалено }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}/ownership-history:
    get:
      summary: Получить историю владения животным
      operationId: getAnimalOwnershipHistory
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID животного
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
      responses:
        '200':
          description: Постраничный список записей истории владения
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AnimalOwnershipHistory' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}/deactivate:
    patch:
      summary: Деактивировать животное (мягкое удаление)
      operationId: deactivateAnimal
      description: Эндпоинт перехода состояния — сохраняет guard-based 409 (API_CONVENTIONS §10) вместо If-Match.
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Животное успешно деактивировано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}/reactivate:
    patch:
      summary: Реактивировать животное
      operationId: reactivateAnimal
      description: Эндпоинт перехода состояния — сохраняет guard-based 409 (API_CONVENTIONS §10) вместо If-Match.
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Животное успешно реактивировано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    Animal:
      type: object
      required:
        - id
        - speciesId
        - sex
        - dateOfBirth
        - isActive
        - createdAt
        - updatedAt
        - healthRecords
        - reproductiveData
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на пользователя (null если задан organizationId)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на организацию (null если задан ownerId)
        speciesId:
          type: integer
          description: Внешний ключ на вид (INT-справочник)
        breedId:
          type: integer
          nullable: true
          description: Внешний ключ на породу (INT-справочник; null если кастомная/иная)
        breedTextLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Текст кастомной породы, если breedId null, для ревью модератором (LocalizedString {en, ru})
        nicknameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Отображаемое имя (LocalizedString {en, ru})
        sex:
          type: string
          enum: [Male, Female]
          description: Пол животного
        dateOfBirth:
          type: string
          format: date
          description: Дата рождения
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Свободное текстовое описание (LocalizedString {en, ru})
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Дискретный атрибут цвета/окраса (соответствует столбцу БД color_coat в snake_case, API_CONVENTIONS §12); структурированный, отличается от свободного текста descriptionLocalized
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: ID микрочипа
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: ID тату/тавро (для скота)
        isActive:
          type: boolean
          description: Активность (видно для новых объявлений при true)
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Дата приобретения животного текущим владельцем
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на мать для отслеживания родословной
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на отца для отслеживания родословной
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Тип записи здоровья (напр., вакцинация, дегельминтизация)
              detail:
                type: string
                description: Детали записи здоровья (напр., Rabies, Panacur)
              date:
                type: string
                format: date
                description: Дата события здоровья
              provider:
                type: string
                description: Поставщик/ветклиника
          description: Массив объектов записей здоровья
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Тип события (напр., heat_start, mating)
              date:
                type: string
                format: date
                description: Дата события
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Внешний ключ на животное-партнёра (если применимо)
          description: Массив объектов репродуктивных данных (для самок)
          default: []
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
          description: Метка времени деактивации животного (мягкое удаление)
    AnimalCreate:
      type: object
      required:
        - speciesId
        - sex
        - dateOfBirth
        - nicknameLocalized
      properties:
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на пользователя (задан при личном владении, null при организационном)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на организацию (задан при организационном владении, null при личном)
        speciesId:
          type: integer
          description: Внешний ключ на вид (INT-справочник)
        breedId:
          type: integer
          nullable: true
          description: Внешний ключ на породу (INT-справочник; null если кастомная/иная)
        breedTextLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Текст кастомной породы, если breedId null, для ревью модератором (LocalizedString {en, ru})
        nicknameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Отображаемое имя (LocalizedString {en, ru})
        sex:
          type: string
          enum: [Male, Female]
          description: Пол животного
        dateOfBirth:
          type: string
          format: date
          description: Дата рождения
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Свободное текстовое описание (LocalizedString {en, ru})
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Дискретный атрибут цвета/окраса (соответствует столбцу БД color_coat в snake_case, API_CONVENTIONS §12); структурированный, отличается от свободного текста descriptionLocalized
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: ID микрочипа
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: ID тату/тавро (для скота)
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Дата приобретения животного текущим владельцем
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на мать для отслеживания родословной
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на отца для отслеживания родословной
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Тип записи здоровья (напр., вакцинация, дегельминтизация)
              detail:
                type: string
                description: Детали записи здоровья (напр., Rabies, Panacur)
              date:
                type: string
                format: date
                description: Дата события здоровья
              provider:
                type: string
                description: Поставщик/ветклиника
          description: Массив объектов записей здоровья
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Тип события (напр., heat_start, mating)
              date:
                type: string
                format: date
                description: Дата события
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Внешний ключ на животное-партнёра (если применимо)
          description: Массив объектов репродуктивных данных (для самок)
          default: []
        isActive:
          type: boolean
          description: Активность
          default: true
    AnimalUpdate:
      type: object
      properties:
        nicknameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Отображаемое имя (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Свободное текстовое описание (LocalizedString {en, ru})
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Дискретный атрибут цвета/окраса (соответствует столбцу БД color_coat в snake_case, API_CONVENTIONS §12); изменяемое — патчится (в отличие от неизменяемых вида/пола/даты рождения)
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: ID микрочипа
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: ID тату/тавро (для скота)
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Тип записи здоровья (напр., вакцинация, дегельминтизация)
              detail:
                type: string
                description: Детали записи здоровья (напр., Rabies, Panacur)
              date:
                type: string
                format: date
                description: Дата события здоровья
              provider:
                type: string
                description: Поставщик/ветклиника
          description: Массив объектов записей здоровья
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Тип события (напр., heat_start, mating)
              date:
                type: string
                format: date
                description: Дата события
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Внешний ключ на животное-партнёра (если применимо)
          description: Массив объектов репродуктивных данных (для самок)
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Дата приобретения животного текущим владельцем
        isActive:
          type: boolean
          description: Активность
    AnimalOwnershipHistory:
      type: object
      description: >
        Свершившийся интервал владения (неизменяемый след). Владелец интервала — **ровно один из**
        `ownerId` (пользователь) или `organizationId` (организация), повторяя owner/org-разделение
        животного — ADR-0013 добавил org-передачу в scope MVP (OQ-1). ЗАМЕЧАНИЕ: подкладывающая
        таблица `animal_ownership_history` сейчас имеет только `owner_id NOT NULL REFERENCES users`;
        колонка `organization_id` + CHECK ровно-одно-из — **открытая дельта схемы, владелец —
        архитектор (ADR-0013 OQ-1, рекомендованный вариант (a))**, и она должна приземлиться до
        поставки пути org-передачи. Контракт несёт org-способную форму, чтобы не меняться при
        приземлении этой дельты.
      required:
        - id
        - animalId
        - startDate
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        animalId:
          type: string
          format: uuid
          description: Внешний ключ на животное
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Владелец-пользователь этого интервала (ровно-одно-из с organizationId; nullable для org-owned интервалов — OQ-1)
        organizationId:
          type: string
          format: uuid
          nullable: true
