openapi: 3.0.3
info:
  title: ZooLink Payment API
  version: 1.0.0
  description: >-
    Payment intents, gateway webhooks, and refunds (spec 14, payment_state_machine).
    Amounts are stored as minor units (BIGINT, e.g. kopecks) — never floats.
    The whole domain is gated behind feature_toggles.payments (off until post-MVP).
servers:
  - url: /api/v1
    description: ZooLink API v1
paths:
  /payments:
    post:
      summary: Create a payment intent
      operationId: createPaymentIntent
      description: >-
        Creates a PENDING payment_transactions row and a gateway intent.
        Requires a unique idempotency_key to prevent double-charging.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentIntentRequest'
      responses:
        '201':
          description: Intent created (PENDING)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentResponse'
        '200':
          description: Existing intent returned (idempotency_key already seen)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          description: Payments disabled (feature_toggles.payments=false) or gateway unavailable
    get:
      summary: List the current user's payment transactions
      operationId: listPayments
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, COMPLETED, FAILED, REFUNDED, DISPUTED]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Transactions page
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentTransaction'
                  page:
                    type: integer
                  total:
                    type: integer
  /payments/{id}:
    get:
      summary: Get a payment transaction status
      operationId: getPayment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentTransaction'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments/{id}/refund:
    post:
      summary: Process a refund for a completed transaction
      operationId: refundPayment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Transaction not COMPLETED or already refunded
        '422':
          $ref: '#/components/responses/ValidationError'
  /payments/webhook:
    post:
      summary: Payment gateway webhook (source of truth for status)
      operationId: paymentWebhook
      description: >-
        Signature-verified, idempotently processed gateway events.
        payment_succeeded -> COMPLETED; payment_failed -> FAILED;
        dispute_created -> DISPUTED. Replays must not double-transition.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEvent'
      responses:
        '200':
          description: Event accepted (idempotent)
        '400':
          description: Invalid or unverifiable signature
components:
  schemas:
    PaymentIntentRequest:
      type: object
      required: [amount_minor, currency, purpose_type, idempotency_key]
      properties:
        amount_minor:
          type: integer
          format: int64
          minimum: 0
          description: Amount in minor units (e.g. kopecks); never a float
        currency:
          type: string
          maxLength: 3
          default: RUB
        purpose_type:
          type: string
          description: e.g., ListingPromotion, PremiumSubscription
        purpose_id:
          type: string
          format: uuid
          nullable: true
          description: Entity the payment relates to (e.g., listings.id)
        idempotency_key:
          type: string
          description: Unique key to prevent duplicate charges
    PaymentIntentResponse:
      type: object
      properties:
        transaction:
          $ref: '#/components/schemas/PaymentTransaction'
        client_secret:
          type: string
          description: Gateway client secret for client-side confirmation
    PaymentTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        gateway_transaction_id:
          type: string
          nullable: true
        amount_minor:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED, REFUNDED, DISPUTED]
        purpose_type:
          type: string
        purpose_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RefundRequest:
      type: object
      required: [amount_minor]
      properties:
        amount_minor:
          type: integer
          format: int64
          minimum: 0
        reason:
          type: string
          nullable: true
    Refund:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payment_transaction_id:
          type: string
          format: uuid
        gateway_refund_id:
          type: string
          nullable: true
        amount_minor:
          type: integer
          format: int64
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        created_at:
          type: string
          format: date-time
    WebhookEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [payment_succeeded, payment_failed, dispute_created]
        gateway_transaction_id:
          type: string
        signature:
          type: string
          description: Gateway signature (verified server-side)
        data:
          type: object
          description: Raw gateway payload
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Caller not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
