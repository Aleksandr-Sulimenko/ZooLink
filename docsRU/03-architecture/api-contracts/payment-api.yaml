openapi: 3.0.3
info:
  title: ZooLink Payment API
  version: 1.0.0
  description: >-
    Платёжные интенты, webhooks шлюза и возвраты (спека 14, payment_state_machine).
    Суммы хранятся в минорных единицах (BIGINT, напр. копейки) — никогда не float.
    Весь домен гейтится feature_toggles.payments (выкл до post-MVP).
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth (§2), x-required-roles (§3),
    ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5), деньги в минорных единицах (§7).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /payments:
    post:
      summary: Создать платёжный интент
      operationId: createPaymentIntent
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      description: >-
        Создаёт PENDING-строку payment_transactions и интент шлюза.
        Требует уникальный idempotencyKey для предотвращения двойного списания.
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Идемпотентность HTTP-слоя (API_CONVENTIONS §11); дополняет body idempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentIntentRequest' }
      responses:
        '201':
          description: Интент создан (PENDING)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntentResponse' }
        '200':
          description: Возвращён существующий интент (idempotencyKey уже виден)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntentResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '503': { $ref: '#/components/responses/Problem' }
    get:
      summary: Список платёжных транзакций текущего пользователя
      operationId: listPayments
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, COMPLETED, FAILED, REFUNDED, DISPUTED] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Страница транзакций
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PaymentTransaction' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /payments/{id}:
    get:
      summary: Получить статус платёжной транзакции
      operationId: getPayment
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Транзакция
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentTransaction' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /payments/{id}/refund:
    post:
      summary: Обработать возврат для завершённой транзакции
      operationId: refundPayment
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefundRequest' }
      responses:
        '201':
          description: Возврат создан
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Refund' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /payments/webhook:
    post:
      summary: Webhook платёжного шлюза (источник истины по статусу)
      operationId: paymentWebhook
      x-internal: true
      security: []
      description: >-
        Внутренний/только для шлюза (проверка подписи, не bearer-auth — security opt-out).
        Идемпотентно обрабатываемые события шлюза.
        payment_succeeded -> COMPLETED; payment_failed -> FAILED;
        dispute_created -> DISPUTED. Повторы не должны дважды переводить статус.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEvent' }
      responses:
        '200': { description: Событие принято (идемпотентно) }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    PaymentIntentRequest:
      type: object
      required: [amountMinor, currency, purposeType, idempotencyKey]
      properties:
        amountMinor:
          type: integer
          format: int64
          minimum: 0
          description: Сумма в минорных единицах (напр. копейки); никогда не float
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
        purposeType:
          type: string
          description: напр., ListingPromotion, PremiumSubscription
        purposeId:
          type: string
          format: uuid
          nullable: true
          description: Сущность, к которой относится платёж (напр., listings.id)
        idempotencyKey:
          type: string
          description: Уникальный ключ против дублей списания (UNIQUE-ограничение БД)
    PaymentIntentResponse:
      type: object
      properties:
        transaction:
          $ref: '#/components/schemas/PaymentTransaction'
        clientSecret:
          type: string
          description: Client secret шлюза для подтверждения на клиенте
    PaymentTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        gatewayTransactionId:
          type: string
          nullable: true
        amountMinor:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED, REFUNDED, DISPUTED]
        purposeType:
          type: string
        purposeId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RefundRequest:
      type: object
      required: [amountMinor]
      properties:
        amountMinor:
          type: integer
          format: int64
          minimum: 0
        reason:
          type: string
          nullable: true
    Refund:
      type: object
      properties:
        id:
          type: string
          format: uuid
        paymentTransactionId:
          type: string
          format: uuid
        gatewayRefundId:
          type: string
          nullable: true
        amountMinor:
          type: integer
          format: int64
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        createdAt:
          type: string
          format: date-time
    WebhookEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [payment_succeeded, payment_failed, dispute_created]
        gatewayTransactionId:
          type: string
        signature:
          type: string
          description: Подпись шлюза (проверяется на сервере)
        data:
          type: object
          description: Сырой payload шлюза
  responses:
    Problem:
      description: Проблема RFC7807 (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
