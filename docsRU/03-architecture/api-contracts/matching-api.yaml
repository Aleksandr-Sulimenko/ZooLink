openapi: 3.0.3
info:
  title: ZooLink Matching API
  version: 1.0.0
  description: >
    API подбора совместимых партнёров для вязки/разведения в ZooLink.
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth (§2), x-required-roles (§3),
    ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5), LocalizedString (§6),
    ограничение скорости (§8).
    **Объём MVP (spec 05):** подбор — это *stateless eligible-set* поиск: кандидат пригоден тогда и
    только тогда, когда выполнены все жёсткие предикаты (тот же вид, противоположный пол, оба INTACT,
    оба видимы в поиске разведения, оба активны, разные владельцы, в пределах радиуса). Скоринг
    совместимости, scoreBreakdown, персистенция матчей, история и обратная связь — **Фаза 2+**
    (помечено `x-phase: 2`; null/отсутствует в MVP).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /matching/new-target/{animal_id}:
    get:
      summary: Проверка целевого животного для подбора
      operationId: getMatchingTarget
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: animal_id
          required: true
          schema: { type: string, format: uuid }
          description: ID животного, для которого ищем пары
        - in: query
          name: includeSuggestions
          schema: { type: boolean, default: false }
          description: Включать ли начальные предложения подбора
      responses:
        '200':
          description: Проверка животного и опциональные начальные подборы
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchingTargetResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/find-matches:
    post:
      summary: Найти пары для целевого животного с предпочтениями
      operationId: findMatches
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FindMatchesRequest' }
      responses:
        '200':
          description: Список потенциальных пар с баллами и пояснениями
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FindMatchesResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '429': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/{id}:
    get:
      summary: '[Фаза 2] Получить детали конкретного подбора по ID'
      operationId: getMatchById
      x-phase: 2
      description: >-
        **Фаза 2+.** Подбор в MVP — это **stateless eligible-set** поиск (spec 05): нет
        персистируемых записей `matches`/`match_history`/`match_feedback`, поэтому нет `id` подбора
        для выборки и нет балла совместимости. Этот эндпоинт (и его scored-ответ) вычисляется в
        Фазе 2; отсутствует в MVP.
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID подбора
      responses:
        '200':
          description: Детали подбора
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchDetails' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/history:
    get:
      summary: '[Фаза 2] История просмотров/действий пользователя по подборам'
      operationId: getMatchingHistory
      x-phase: 2
      description: >-
        **Фаза 2+.** Подбор в MVP stateless (нет таблицы `match_history` по spec 05), поэтому нет
        истории действий для возврата. Вычисляется в Фазе 2; отсутствует в MVP.
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
        - in: query
          name: minScore
          schema: { type: integer, minimum: 0, maximum: 100 }
          description: Фильтр по минимальному баллу совместимости
        - in: query
          name: fromDate
          schema: { type: string, format: date }
          description: Начальная дата фильтра (включительно)
        - in: query
          name: toDate
          schema: { type: string, format: date }
          description: Конечная дата фильтра (включительно)
      responses:
        '200':
          description: Постраничная история подборов
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchingHistoryResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/{id}/feedback:
    post:
      summary: '[Фаза 2] Отправить отзыв о качестве подбора'
      operationId: submitMatchFeedback
      x-phase: 2
      description: >-
        **Фаза 2+.** Отзыв питает контур скоринга совместимости (в MVP нет таблицы
        `match_feedback` по spec 05). Вычисляется в Фазе 2; отсутствует в MVP.
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID подбора
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MatchFeedbackRequest' }
      responses:
        '200': { description: Отзыв успешно отправлен }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    MatchingTargetResponse:
      type: object
      required:
        - animal
        - eligibleForMatching
      properties:
        animal:
          $ref: '#/components/schemas/AnimalSummary'
        eligibleForMatching:
          type: boolean
          description: Допустимо ли животное к подбору (активно, брачный возраст и т.п.)
        ineligibilityReason:
          type: string
          nullable: true
          enum: [SPECIES_MISMATCH, BREED_RULE, NOT_BREEDING_VISIBLE, REPRODUCTIVE_STATUS, SELF, INACTIVE, GEO_OUT_OF_RANGE]
          description: >-
            Стабильный машинный код причины недопустимости (null если допустимо). Соответствует
            жёстким предикатам MVP из spec 05 §"Breeding eligibility": SPECIES_MISMATCH (тот же вид),
            BREED_RULE (правило по породе), NOT_BREEDING_VISIBLE
            (is_visible_in_breeding_search=false), REPRODUCTIVE_STATUS (не INTACT),
            SELF (тот же владелец / self-match), INACTIVE (не активно), GEO_OUT_OF_RANGE (вне радиуса).
        species:
          $ref: '#/components/schemas/SpeciesSummary'
        breed:
          $ref: '#/components/schemas/BreedSummary'
        initialMatches:
          type: array
          items: { $ref: '#/components/schemas/MatchSummary' }
          default: []
          description: Начальные предложения подбора (если запрошены и доступны)
    AnimalSummary:
      type: object
      required:
        - id
        - speciesId
        - sex
        - dateOfBirth
        - isActive
      properties:
        id:
          type: string
          format: uuid
          description: ID животного
        speciesId:
          type: integer
          description: Ссылка на вид (INT-справочник)
        breedId:
          type: integer
          nullable: true
          description: Ссылка на породу (INT-справочник; null если кастомная/иная)
        breedText:
          type: string
          maxLength: 100
          nullable: true
          description: Текст кастомной породы, если breedId null
        nickname:
          type: string
          maxLength: 50
          nullable: true
          description: Кличка/отображаемое имя животного
        sex:
          type: string
          enum: [Male, Female]
          description: Пол животного
        dateOfBirth:
          type: string
          format: date
          description: Дата рождения животного
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Окрас/тип шерсти животного
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: ID микрочипа животного
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: ID тату/тавро животного (для скота)
        isActive:
          type: boolean
          description: Активность животного
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Дата приобретения животного текущим владельцем
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на мать для родословной
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на отца для родословной
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Тип записи здоровья (вакцинация, тест и т.п.)
              detail:
                type: string
                description: Детали записи здоровья
              date:
                type: string
                format: date
                description: Дата события здоровья
              provider:
                type: string
                description: Поставщик/ветклиника
          description: Записи здоровья животного
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Тип события (heat_start, mating и т.п.)
              date:
                type: string
                format: date
                description: Дата события
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: ID животного-партнёра (если применимо)
          description: Репродуктивные данные животного (для самок)
          default: []
        photos:
          type: array
          items:
            type: string
            format: uri
          description: URL фотографий животного
          default: []
    SpeciesSummary:
      type: object
      required:
        - id
        - code
        - nameLocalized
      properties:
        id:
          type: integer
          description: ID вида (INT-справочник)
        code:
          type: string
          maxLength: 50
          description: Код вида (напр. 'dog', 'cattle')
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Название вида (LocalizedString {en, ru})
    BreedSummary:
      type: object
      required:
        - id
        - code
        - nameLocalized
        - speciesId
      properties:
        id:
          type: integer
          description: ID породы (INT-справочник)
        code:
          type: string
          maxLength: 50
          description: Код породы
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Название породы (LocalizedString {en, ru})
        speciesId:
          type: integer
          description: Ссылка на вид (INT-справочник)
    FindMatchesRequest:
      type: object
      required:
        - targetAnimalId
      properties:
        targetAnimalId:
          type: string
          format: uuid
          description: ID животного, для которого ищем пары
        maxDistanceKm:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
          description: Максимальное расстояние поиска в километрах
        breedingGoals:
          type: array
          items: { type: string }
          description: Конкретные цели разведения для приоритизации (напр. ['milk_production', 'temperament'])
        minScore:
          type: integer
          minimum: 0
          maximum: 100
          default: 60
          x-phase: 2
          description: >-
            Порог минимального балла совместимости (0-100). **Фаза 2+ фильтр; игнорируется в MVP**
            (eligible-set поиск без скоринга — spec 05).
        maxResults:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          description: Максимальное число возвращаемых результатов
        excludePreviouslyMatched:
          type: boolean
          default: true
          description: Исключать животных, с которыми пользователь уже подбирался
        includeDetails:
          type: boolean
          default: false
          description: Включать полные детали животного в результаты (для перфа, по умолчанию false)
    FindMatchesResponse:
      type: object
      required:
        - matches
        - searchParameters
      properties:
        matches:
          type: array
          items: { $ref: '#/components/schemas/MatchSummary' }
          description: >-
            MVP: **eligible-set** (животные, прошедшие жёсткие предикаты spec 05), без ранжирования.
            **Фаза 2+:** отсортировано по баллу совместимости.
        searchParameters:
          $ref: '#/components/schemas/SearchParametersUsed'
        totalFound:
          type: integer
          description: Общее число найденных пар (до пагинации/лимитов)
        searchDurationMs:
          type: integer
          description: Время вычисления подборов в миллисекундах
    SearchParametersUsed:
      type: object
      properties:
        targetAnimalId:
          type: string
          format: uuid
        maxDistanceKm:
          type: integer
        breedingGoals:
          type: array
          items: { type: string }
        minScore:
          type: integer
        maxResults:
          type: integer
        excludePreviouslyMatched:
          type: boolean
    MatchSummary:
      type: object
      required:
        - id
        - targetAnimalId
        - candidateAnimalId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: ID экземпляра подбора
        targetAnimalId:
          type: string
          format: uuid
          description: ID целевого животного
        candidateAnimalId:
          type: string
          format: uuid
          description: ID животного-кандидата
        compatibilityScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          x-phase: 2
          description: >-
            Общий балл совместимости (0-100). **Вычисляется в Фазе 2; null/отсутствует в MVP** —
            MVP возвращает eligible-set (жёсткие предикаты spec 05), а не ранжирование.
        scoreBreakdown:
          allOf: [ { $ref: '#/components/schemas/ScoreBreakdown' } ]
          nullable: true
          x-phase: 2
          description: Детальная разбивка балла по категориям факторов. **Вычисляется в Фазе 2; null/отсутствует в MVP.**
        matchReasons:
          type: array
          items: { type: string }
          maxItems: 5
          description: Топ положительных факторов подбора
        matchConcerns:
          type: array
          items: { type: string }
          maxItems: 3
          description: Возможные опасения или негативные факторы
        candidateSummary:
          allOf: [ { $ref: '#/components/schemas/AnimalSummary' } ]
          description: Сводка по животному-кандидату (всегда включается)
        targetSummary:
          type: string
          format: uuid
          description: Ссылка на целевое животное (во избежание дублирования)
        createdAt:
          type: string
          format: date-time
          description: Когда подбор был сгенерирован
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Когда подбор устаревает (по умолчанию 7 дней с создания)
    ScoreBreakdown:
      type: object
      x-phase: 2
      description: >-
        **Артефакт ранжирования Фазы 2+.** Все суб-баллы вычисляются в Фазе 2; весь объект
        null/отсутствует в MVP (eligible-set поиск без скоринга). См. spec 05.
      properties:
        geneticScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Подбалл генетической совместимости (0-100)
        healthScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Подбалл совместимости по здоровью (0-100)
        reproductiveScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Подбалл репродуктивного тайминга (0-100)
        productionScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Подбалл продуктивности/конформации (0-100)
        logisticsScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Подбалл локации/логистики (0-100)
        weightsApplied:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
          description: Вес каждой категории факторов (сумма = 1.0)
    MatchDetails:
      type: object
      required:
        - id
        - targetAnimalId
        - candidateAnimalId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: ID экземпляра подбора
        targetAnimalId:
          type: string
          format: uuid
          description: ID целевого животного
        candidateAnimalId:
          type: string
          format: uuid
          description: ID животного-кандидата
        compatibilityScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          x-phase: 2
          description: >-
            Общий балл совместимости (0-100). **Вычисляется в Фазе 2; null/отсутствует в MVP** —
            MVP возвращает eligible-set (жёсткие предикаты spec 05), а не ранжирование.
        scoreBreakdown:
          allOf: [ { $ref: '#/components/schemas/ScoreBreakdown' } ]
          nullable: true
          x-phase: 2
          description: Детальная разбивка балла по категориям факторов. **Вычисляется в Фазе 2; null/отсутствует в MVP.**
        matchReasons:
          type: array
          items: { type: string }
          maxItems: 10
          description: Все положительные факторы подбора
        matchConcerns:
          type: array
          items: { type: string }
          maxItems: 10
          description: Все возможные опасения или негативные факторы
        targetAnimal:
          allOf: [ { $ref: '#/components/schemas/AnimalSummary' } ]
          description: Полные детали целевого животного
        candidateAnimal:
          allOf: [ { $ref: '#/components/schemas/AnimalSummary' } ]
          description: Полные детали животного-кандидата
        targetListings:
          type: array
          items: { $ref: '#/components/schemas/ListingReference' }
          description: Активные объявления MATING/STUD_SERVICE для целевого животного
          default: []
        candidateListings:
          type: array
          items: { $ref: '#/components/schemas/ListingReference' }
          description: Активные объявления MATING/STUD_SERVICE для животного-кандидата
          default: []
        createdAt:
          type: string
          format: date-time
          description: Когда подбор был сгенерирован
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Когда подбор устаревает (по умолчанию 7 дней с создания)
        metadata:
          type: object
          description: Видоспецифичные или экспериментальные данные
          additionalProperties: true
    ListingReference:
      type: object
      required:
        - id
        - listingType
        - titleLocalized
        - priceCents
      properties:
        id:
          type: string
          format: uuid
          description: ID объявления
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Тип объявления
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Количество
        isActive:
          type: boolean
          description: Активность объявления
        createdAt:
          type: string
          format: date-time
          description: Метка создания объявления
    MatchingHistoryResponse:
      type: object
      required:
        - items
        - meta
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/HistoryEntry' }
          description: Массив записей истории подборов
        meta:
          $ref: '#/components/schemas/PageMeta'
    HistoryEntry:
      type: object
      required:
        - id
        - targetAnimalId
        - candidateAnimalId
        - compatibilityScore
        - actionType
        - timestamp
      properties:
        id:
          type: string
          format: uuid
          description: ID записи истории
        targetAnimalId:
          type: string
          format: uuid
          description: ID целевого животного
        candidateAnimalId:
          type: string
          format: uuid
          description: ID животного-кандидата
        compatibilityScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Балл совместимости для этого подбора (если применимо)
        actionType:
          type: string
          enum: [viewed, engaged, contacted, feedback]
          description: Тип действия пользователя с этим подбором
        timestamp:
          type: string
          format: date-time
          description: Когда произошло действие
        userNotes:
          type: string
          maxLength: 500
          nullable: true
          description: Заметки/отзыв пользователя (если actionType = 'feedback')
        matchId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на запись подбора (если применимо)
    MatchFeedbackRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Оценка качества подбора пользователем (1-5 звёзд)
        isUseful:
          type: boolean
          description: Счёл ли пользователь подбор полезным
        feedbackText:
          type: string
          maxLength: 1000
          nullable: true
          description: Детальный отзыв, почему подбор был полезен/бесполезен
        wouldRecommend:
          type: boolean
          nullable: true
          description: Порекомендовал бы пользователь этот подбор другим
        tags:
          type: array
          items: { type: string }
          maxItems: 10
          description: Теги для категоризации отзыва (напр. ['accurate_genetics', 'poor_location'])
  responses:
    Problem:
      description: Проблема RFC7807 (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
