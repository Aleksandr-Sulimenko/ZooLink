openapi: 3.0.3
info:
  title: ZooLink Admin API
  version: 1.0.0
  description: >-
    API управления справочными данными, процессами модерации и системными настройками в ZooLink.
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth (§2), x-required-roles (§3),
    ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5), LocalizedString (§6, admin
    возвращает обе локали), конвенция sort §12, If-Match/ETag на мутирующих PATCH (§10).


    Реконсиляция `dataset` справочных данных (round-9 → A3, нормативно) — выровнено по фактической схеме
    (`database_schema.sql`) и rbac-matrix.md.

    ЧТО: enum `dataset` — это **5 управляемых INT-ключевых lookup-таблиц**, существующих как CRUD-able
    admin-справочники: `species`, `breeds`, `cities`, `health_certifications`, `genetic_markers`.
    Последние две добавлены в A3 (ADMIN_PHASE_ACTION_PLAN) как словари разведения **форма-сейчас /
    поведение-потом** (livestock health-certs и генетические маркеры): управляемая lookup-форма + CRUD
    существуют уже сейчас, тогда как их **фильтрация** в маркетплейсе отложена (Фаза 2) — анти-переписывание
    по IMPLEMENTATION_PLAYBOOK §5.
    НЕ admin-управляемые датасеты (исключены из enum):
      - `listing-types`  → фиксированный DB CHECK-enum на `listings.listing_type`
                           ('sale','breeding','show','adoption','stud_service'); смена схемы/ADR, не CRUD.
      - `animal-statuses`→ фиксированные DB CHECK lifecycle-enum на `listings.status` / `animals`; то же.
      - `traits` / `temperament_tags` / `health_flags` → soft-теги свободным текстом/JSONB, не управляемые
                           lookup'ы; lookup-таблицу можно добавить аддитивно в Фазе 2 без переписывания.

    ПОЧЕМУ: species/breeds/cities/health_certifications/genetic_markers — это INT-ключевые управляемые
    lookup в схеме (= код `DATASETS`); контракт не должен ни перечислять датасеты без backing-таблицы
    (404/дрейф хендлеров), ни опускать уже существующие (дрейф код↔контракт).

    ПОЧЕМУ ЛУЧШЕ: контракт совпадает с источником истины (схема + RBAC + код DATASETS), держит MVP-scope
    честным (форма сейчас, поведение фильтрации gated), а реестр датасетов поглощает новые lookup'ы без
    изменения формы CRUD/audit/локализации.

    Также (round-9): `id` записи справочника — **integer** (SERIAL lookup-ключи по конвенции id-типов:
    lookups=INT, entities=UUID), не UUID; list-ответы используют стандартный конверт
    `{ items, meta: PageMeta }` (API_CONVENTIONS.md §5).

    B0.6 (сделано, ADR-0011 §6): actor-bearing-ответы несут agent-badge `{ actorId, principalType }`
    (общая схема `Actor`). AuditLogEntry/ModerationLogEntry/ModerationActionResponse отдают `actor`
    (заменяя плоские `performedBy`/`moderatorId`; `performedByName` сворачивается в `actor.actorDisplayName`);
    SystemSetting.updatedBy — это `Actor`. Query-параметр аудита `actorId` заменяет `performedBy`.
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /reference-data/{dataset}:
    get:
      summary: Получить все активные записи справочного датасета
      operationId: getReferenceData
      description: >-
        Публичное чтение (security opt-out по API_CONVENTIONS §3): справочные данные — это публичный
        reference-контент (rbac-matrix.md "Reference data = R/R/CRUD" + список публичных эндпоинтов §3).
        PUBLIC-чтения возвращают разрешённое `name` (Accept-Language); аутентифицированное чтение
        ADMIN/редактора возвращает `nameLocalized` (§6). `includeInactive=true` учитывается только для ADMIN.
      security: []
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Имя справочного датасета
        - in: query
          name: includeInactive
          schema: { type: boolean, default: false }
          description: Включать неактивные/деактивированные записи
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Элементов на странице
        - in: query
          name: search
          schema: { type: string, maxLength: 100 }
          description: Поисковый запрос для фильтрации (имя или код)
      responses:
        '200':
          description: Постраничный список записей справочника
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReferenceDataEntry' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Создать новую запись справочника
      operationId: createReferenceData
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Имя справочного датасета
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReferenceDataCreateRequest' }
      responses:
        '201':
          description: Запись справочника успешно создана
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/new:
    get:
      summary: Получить форму/шаблон для создания записи справочника
      operationId: getReferenceDataForm
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Имя справочного датасета
      responses:
        '200':
          description: Шаблон формы для создания записи справочника
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataForm' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/{id}:
    get:
      summary: Получить конкретную запись справочника по ID
      operationId: getReferenceDataById
      description: >-
        Публичное чтение (security opt-out по API_CONVENTIONS §3): справочные данные — публичный контент
        (rbac-matrix.md "Reference data = R/R/CRUD"). PUBLIC-чтения возвращают разрешённое `name`
        (Accept-Language); аутентифицированное чтение ADMIN/редактора возвращает `nameLocalized` (§6).
      security: []
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Имя справочного датасета
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: ID записи справочника (integer SERIAL; lookups=INT по конвенции id-типов)
      responses:
        '200':
          description: Детали записи справочника
          headers:
            ETag:
              schema: { type: string }
              description: Weak-валидатор для отправки в If-Match на PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Обновить запись справочника
      operationId: updateReferenceData
      description: Оптимистичная конкуренция (§10) — требует If-Match с ETag из предыдущего GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Имя справочного датасета
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: ID записи справочника (integer SERIAL; lookups=INT по конвенции id-типов)
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего GET
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReferenceDataUpdateRequest' }
      responses:
        '200':
          description: Запись справочника успешно обновлена
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/{id}/toggle-active:
    patch:
      summary: Активировать или деактивировать запись справочника
      operationId: toggleReferenceDataActive
      description: Эндпоинт перехода состояния — сохраняет guard-based 409 (API_CONVENTIONS §10) вместо If-Match.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Имя справочного датасета
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: ID записи справочника (integer SERIAL; lookups=INT по конвенции id-типов)
      responses:
        '200':
          description: Статус активности записи справочника успешно переключён
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/queue:
    get:
      summary: '[SUPERSEDED] Очередь модерации — использовать moderation-api'
      operationId: getModerationQueue
      deprecated: true
      description: >-
        **SUPERSEDED — не реализовывать.** Модерация принадлежит **moderation-api.yaml**, где
        живёт единый словарь решений (APPROVED / REJECTED / CHANGES_REQUESTED), claim/lock, SLA и
        модель actor-as-principal. Этот блок модерации в admin-api оставлен лишь как deprecated-
        указатель, чтобы не было второго расходящегося контракта модерации (DIV-2/3).
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: query
          name: listing_type
          schema: { type: string, enum: [sale, breeding, show, adoption, stud_service] }
          description: Фильтр по типу объявления
        - in: query
          name: species_id
          schema: { type: integer }
          description: Фильтр по виду (INT-справочник)
        - in: query
          name: breed_id
          schema: { type: integer }
          description: Фильтр по породе (INT-справочник)
        - in: query
          name: price_min
          schema: { type: integer }
          description: Минимальная цена в минорных единицах
        - in: query
          name: price_max
          schema: { type: integer }
          description: Максимальная цена в минорных единицах
        - in: query
          name: city_id
          schema: { type: integer }
          description: Фильтр по городу/региону (INT-справочник)
        - in: query
          name: radius_km
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Радиус поиска в километрах от локации
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Элементов на странице
        - in: query
          name: sort
          schema: { type: string, default: 'created_at:desc' }
          description: 'Сортировка (§12): <field>:<asc|desc>, напр. created_at:desc | price_cents:asc'
      responses:
        '200':
          description: Постраничный список объявлений на модерации
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ModerationQueueItem' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/listing/{id}:
    get:
      summary: '[SUPERSEDED] Детали объявления для модерации — использовать moderation-api'
      operationId: getListingForModeration
      deprecated: true
      description: '**SUPERSEDED — не реализовывать.** Модерация принадлежит moderation-api.yaml (единый словарь решений + actor-модель). Оставлено лишь как deprecated-указатель.'
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID объявления
      responses:
        '200':
          description: Детали объявления для модерации
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationListingDetails' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/action:
    post:
      summary: '[SUPERSEDED] Действие модерации — использовать moderation-api'
      operationId: performModerationAction
      deprecated: true
      description: >-
        **SUPERSEDED — не реализовывать.** Канонический эндпоинт действия модерации живёт в
        **moderation-api.yaml**; единый словарь решений — APPROVED / REJECTED / CHANGES_REQUESTED
        (устаревший глагол FLAG выведен из обращения). Оставлено лишь как deprecated-указатель.
        Эндпоинт перехода состояния — сохраняет guard-based 409 (API_CONVENTIONS §10).
      x-required-roles: [MODERATOR, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationActionRequest' }
      responses:
        '200':
          description: Действие модерации успешно выполнено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationActionResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/log/{listing_id}:
    get:
      summary: '[SUPERSEDED] История модерации — использовать moderation-api'
      operationId: getModerationLog
      deprecated: true
      description: '**SUPERSEDED — не реализовывать.** История модерации принадлежит moderation-api.yaml. Оставлено лишь как deprecated-указатель.'
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: path
          name: listing_id
          required: true
          schema: { type: string, format: uuid }
          description: ID объявления
      responses:
        '200':
          description: История модерации объявления
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ModerationLogEntry' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/ban-user:
    post:
      summary: '[SUPERSEDED] Бан пользователя — использовать moderation-api'
      operationId: banUser
      deprecated: true
      description: '**SUPERSEDED — не реализовывать.** Бан пользователя как действие модерации принадлежит moderation-api.yaml (единый словарь решений + actor-модель). Оставлено лишь как deprecated-указатель.'
      x-required-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BanUserRequest' }
      responses:
        '200':
          description: Пользователь успешно забанен
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BanUserResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /system/settings:
    get:
      summary: Получить текущие системные настройки
      operationId: getSystemSettings
      x-required-roles: [ADMIN]
      responses:
        '200':
          description: Системные настройки успешно получены
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/SystemSetting'
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /system/settings/{key}:
    patch:
      summary: Обновить системную настройку
      operationId: updateSystemSetting
      description: Оптимистичная конкуренция (§10) — требует If-Match с ETag из предыдущего GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
          description: Ключ настройки для обновления
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего чтения настройки
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemSettingUpdateRequest' }
      responses:
        '200':
          description: Системная настройка успешно обновлена
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemSetting' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /audit/log:
    get:
      summary: Получить записи аудит-журнала
      operationId: getAuditLog
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: entityType
          schema: { type: string, enum: [listing, user, organization, reference-data, moderation-action] }
          description: Фильтр по типу сущности
        - in: query
          name: entityId
          schema: { type: string, format: uuid }
          description: Фильтр по ID сущности
        - in: query
          name: actionType
          schema: { type: string, enum: [created, updated, deleted, approved, rejected, banned, role-changed] }
          description: Фильтр по типу действия
        - in: query
          name: actorId
          schema: { type: string, format: uuid }
          description: Фильтр по действующему принципалу (users.id), выполнившему действие (был performedBy)
        - in: query
          name: startDate
          schema: { type: string, format: date }
          description: Начальная дата фильтра (включительно)
        - in: query
          name: endDate
          schema: { type: string, format: date }
          description: Конечная дата фильтра (включительно)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Элементов на странице
        - in: query
          name: sort
          schema: { type: string, default: 'created_at:desc' }
          description: 'Сортировка (§12): <field>:<asc|desc>, напр. created_at:desc'
      responses:
        '200':
          description: Постраничные записи аудит-журнала
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditLogEntry' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /users/roles:
    get:
      summary: Получить пользователей с их ролями
      operationId: getUsersWithRoles
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: role
          schema: { type: string, enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER] }
          description: Фильтр по роли
        - in: query
          name: isActive
          schema: { type: boolean }
          description: Фильтр по активности
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Элементов на странице
        - in: query
          name: search
          schema: { type: string, maxLength: 100 }
          description: Поисковый запрос для фильтрации (полное имя или email)
      responses:
        '200':
          description: Постраничный список пользователей с ролями
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UserRoleInfo' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /users/{id}/role:
    patch:
      summary: '[SUPERSEDED] Смена роли — использовать auth-api PATCH /admin/users/{userId}/role'
      operationId: changeUserRole
      deprecated: true
      description: >-
        **SUPERSEDED — не реализовывать.** Канонический, *реализованный* эндпоинт смены роли —
        `PATCH /admin/users/{userId}/role` (`adminSetUserRole`) в **auth-api.yaml**, владеющий
        процессом повышения роли (7-ролевой enum, аудит, снимок actor-as-principal). Этот дубль в
        admin-api оставлен лишь как deprecated-указатель, чтобы не было двух расходящихся контрактов
        одной операции (DIV-2/3). Оптимистичная конкуренция (§10) — требует If-Match с ETag из
        предыдущего GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID пользователя
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего чтения пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeUserRoleRequest' }
      responses:
        '200':
          description: Роль пользователя успешно изменена
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserRoleInfo' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    Actor:
      type: object
      description: >-
        Actor-badge: действующий принципал в любом actor-bearing-ответе (ADR-0011 §6). principalType — это
        снапшот users.principal_type (HUMAN|AGENT) на момент действия; он позволяет потребителю отличить
        решение человека от решения агента без второго запроса. DEFAULT HUMAN в MVP (AGENT не активен до гейта).
      required: [actorId, principalType]
      properties:
        actorId:
          type: string
          format: uuid
          description: Действующий принципал (users.id).
        principalType:
          type: string
          enum: [HUMAN, AGENT]
          description: Снапшот типа действующего принципала на момент действия (ADR-0011 §1).
        actorDisplayName:
          type: string
          maxLength: 100
          nullable: true
          description: Опциональная человекочитаемая метка актёра (удобство операторского UI).
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    # round-9 / B0 / A2: выровнено по database_schema.sql (миграция 0018). Lookup-таблицы
    # (species/breeds/cities) локализуют имя через name_localized JSONB {ru,en} — единый
    # LocalizedString, не плоские name_ru/name_en. По API_CONVENTIONS §6 форма чтения зависит от
    # контекста: чтение ADMIN/редактора возвращает полный `nameLocalized` (обе локали); PUBLIC-чтение
    # возвращает разрешённую строку `name` для Accept-Language (фолбэк на en). Объявлены оба поля;
    # заполняется ровно одно, подходящее по контексту. `code` присутствует только у species/breeds
    # (UNIQUE: species глобально, breeds по виду); у cities кода нет. `speciesId` ОБЯЗАТЕЛЕН для
    # breeds (FK → species). `sortOrder` — порядок отображения (миграция 0018). Нет колонок
    # description/version/deactivated_at; soft-delete = isActive boolean.
    ReferenceDataEntry:
      type: object
      required:
        - id
        - isActive
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          minimum: 1
          description: Уникальный идентификатор (SERIAL; lookups=INT по конвенции id-типов)
        code:
          type: string
          maxLength: 50
          nullable: true
          description: Уникальный код в датасете (только species/breeds; null для cities)
        speciesId:
          type: integer
          minimum: 1
          nullable: true
          description: ID родительского вида (только breeds; иначе null)
        name:
          type: string
          nullable: true
          description: >-
            Разрешённое отображаемое имя для запрошенного Accept-Language (фолбэк на en). Заполняется на
            PUBLIC-чтениях (API_CONVENTIONS §6); null на ADMIN-чтениях (используйте nameLocalized).
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          nullable: true
          description: >-
            Отображаемое имя как LocalizedString {en, ru} (обе локали). Заполняется на чтениях
            ADMIN/редактора; null на PUBLIC-чтениях (используйте разрешённое `name`).
        sortOrder:
          type: integer
          description: Порядок отображения внутри датасета (по возрастанию; по умолчанию 0)
        market:
          type: string
          enum: [pet, livestock]
          nullable: true
          description: Рынок вида (только species; ADR-0002)
        isActive:
          type: boolean
          description: Активность (деактивация через isActive=false, не удаление)
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
    ReferenceDataCreateRequest:
      type: object
      required:
        - nameLocalized
      properties:
        code:
          type: string
          maxLength: 50
          description: Уникальный код (обязателен для species/breeds; отклоняется для cities)
        speciesId:
          type: integer
          minimum: 1
          description: ID родительского вида (обязателен для breeds; отклоняется для species/cities)
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Отображаемое имя (LocalizedString {en, ru})
        market:
          type: string
          enum: [pet, livestock]
          description: Рынок (только species; по умолчанию 'pet' при отсутствии)
        sortOrder:
          type: integer
          default: 0
          description: Порядок отображения внутри датасета (по возрастанию)
        isActive:
          type: boolean
          default: true
          description: Активность при создании
    ReferenceDataUpdateRequest:
      type: object
      description: >-
        Частичное обновление. `code`/`speciesId` неизменяемы (идентичность lookup-строки); меняться
        могут только отображаемое имя, market (species) и isActive.
      properties:
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Отображаемое имя (LocalizedString {en, ru})
        market:
          type: string
          enum: [pet, livestock]
          description: Рынок (только species)
        sortOrder:
          type: integer
          description: Порядок отображения внутри датасета (по возрастанию)
        isActive:
          type: boolean
          description: Активность
    ReferenceDataForm:
      type: object
      properties:
        fields:
          type: object
          additionalProperties:
            type: object
            properties:
              type:
                type: string
                enum: [text, textarea, number, boolean, select, date, datetime]
              label:
                type: string
                description: Подпись поля
              required:
                type: boolean
                default: false
              maxLength:
                type: integer
                nullable: true
              minLength:
                type: integer
                nullable: true
              pattern:
                type: string
                nullable: true
              options:
                type: array
                items:
                  type: object
                  properties:
                    label:
                      type: string
                    value:
                      type: string
                nullable: true
    ModerationQueueItem:
      type: object
      required:
        - id
        - listingId
        - animalId
        - sellerId
        - listingType
        - titleLocalized
        - createdAt
        - speciesId
        - breedId
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор записи очереди
        listingId:
          type: string
          format: uuid
          description: ID объявления
        animalId:
          type: string
          format: uuid
          description: ID животного, связанного с объявлением
        sellerId:
          type: string
          format: uuid
          description: ID пользователя-создателя объявления
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Тип объявления
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Количество
        locationPoint:
          type: object
          description: GeoPoint для гео-поиска
          nullable: true
        searchRadiusM:
          type: integer
          nullable: true
          description: Радиус поиска в метрах
        speciesId:
          type: integer
          description: Ссылка на вид животного (INT-справочник)
        breedId:
          type: integer
          nullable: true
          description: Ссылка на породу животного (INT-справочник; null если кастомная/иная)
        breedText:
          type: string
          maxLength: 100
          nullable: true
          description: Текст кастомной породы, если breedId null
        nickname:
          type: string
          maxLength: 50
          nullable: true
          description: Кличка/отображаемое имя животного
        sex:
          type: string
          enum: [Male, Female]
          description: Пол животного
        dateOfBirth:
          type: string
          format: date
          description: Дата рождения животного
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Окрас/тип шерсти животного
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: ID микрочипа животного
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: ID тату/тавро животного (для скота)
        isActive:
          type: boolean
          description: Активность объявления
        createdAt:
          type: string
          format: date-time
          description: Метка создания объявления
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления объявления
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Метка истечения объявления
        photos:
          type: array
          items:
            type: string
            format: uri
          description: URL фотографий объявления
          default: []
        moderationNotes:
          type: string
          maxLength: 500
          nullable: true
          description: Заметки от предыдущих попыток модерации
        moderationCount:
          type: integer
          default: 0
          description: Сколько раз объявление модерировалось
    ModerationListingDetails:
      type: object
      required:
        - id
        - listingId
        - animal
        - seller
        - listingType
        - titleLocalized
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: ID записи очереди модерации
        listingId:
          type: string
          format: uuid
          description: ID объявления
        animal:
          $ref: '#/components/schemas/AnimalSummary'
        seller:
          $ref: '#/components/schemas/UserSummary'
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Тип объявления
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Количество
        locationPoint:
          type: object
          description: GeoPoint для гео-поиска
          nullable: true
        searchRadiusM:
          type: integer
          nullable: true
          description: Радиус поиска в метрах
        isActive:
          type: boolean
          description: Активность объявления
        createdAt:
          type: string
          format: date-time
          description: Метка создания объявления
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления объявления
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Метка истечения объявления
        photos:
          type: array
          items:
            type: string
            format: uri
          description: URL фотографий объявления
          default: []
        moderationHistory:
          type: array
          items: { $ref: '#/components/schemas/ModerationLogEntry' }
          description: Предыдущие действия модерации по этому объявлению
          default: []
    AnimalSummary:
      type: object
      required:
        - id
        - speciesId
        - sex
        - dateOfBirth
        - isActive
      properties:
        id:
          type: string
          format: uuid
          description: ID животного
        speciesId:
          type: integer
          description: Ссылка на вид (INT-справочник)
        breedId:
          type: integer
          nullable: true
          description: Ссылка на породу (INT-справочник; null если кастомная/иная)
        breedText:
          type: string
          maxLength: 100
          nullable: true
          description: Текст кастомной породы, если breedId null
        nickname:
          type: string
          maxLength: 50
          nullable: true
          description: Кличка/отображаемое имя животного
        sex:
          type: string
          enum: [Male, Female]
          description: Пол животного
        dateOfBirth:
          type: string
          format: date
          description: Дата рождения животного
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Окрас/тип шерсти животного
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: ID микрочипа животного
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: ID тату/тавро животного (для скота)
        isActive:
          type: boolean
          description: Активность животного
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Дата приобретения животного текущим владельцем
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на мать для родословной
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Ссылка на отца для родословной
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Тип записи здоровья
              detail:
                type: string
                description: Детали записи здоровья
              date:
                type: string
                format: date
                description: Дата события здоровья
              provider:
                type: string
                description: Поставщик/ветклиника
          description: Записи здоровья животного
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Тип события (heat_start, mating и т.п.)
              date:
                type: string
                format: date
                description: Дата события
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: ID животного-партнёра (если применимо)
          description: Репродуктивные данные животного (для самок)
          default: []
    UserSummary:
      type: object
      required:
        - id
        - fullName
        - role
        - isActive
      properties:
        id:
          type: string
          format: uuid
          description: ID пользователя
        fullName:
          type: string
          maxLength: 100
          description: Полное имя пользователя
        cityId:
          type: integer
          nullable: true
          description: Ссылка на город для гео-поиска (INT-справочник)
        avatarUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 500
          description: URL аватара в объектном хранилище
        email:
          type: string
          format: email
          nullable: true
          maxLength: 255
          description: Email для уведомлений
        emailVerified:
          type: boolean
          default: false
          description: True, если email подтверждён по ссылке
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: Роль пользователя
        isActive:
          type: boolean
          description: True = может логиниться; False = деактивирован
        createdAt:
          type: string
          format: date-time
          description: Метка регистрации
        updatedAt:
          type: string
          format: date-time
          description: Последнее обновление профиля
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Метка последнего входа
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
          description: Когда пользователь решил деактивироваться (null если активен)
    ModerationLogEntry:
      type: object
      required:
        - id
        - listingId
        - actor
        - action
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        listingId:
          type: string
          format: uuid
          description: ID объявления
        actor:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          description: >-
            Действующий принципал как agent-badge {actorId, principalType} (ADR-0011 §6); заменяет прежний
            плоский moderatorId. principalType — снапшот на момент записи (moderation_decisions.actor_principal_type).
        action:
          type: string
          enum: [approved, rejected, flagged]
          description: Выполненное действие модерации
        reason:
          type: string
          maxLength: 500
          nullable: true
          description: Причина отклонения (обязательна для rejected)
        createdAt:
          type: string
          format: date-time
          description: Метка времени действия модерации
    ModerationActionRequest:
      type: object
      required:
        - listingId
        - action
      properties:
        listingId:
          type: string
          format: uuid
          description: ID объявления для модерации
        action:
          type: string
          enum: [approve, reject, flag]
          description: Действие модерации для выполнения
        reason:
          type: string
          maxLength: 500
          description: Причина отклонения (обязательна при action 'reject')
    ModerationActionResponse:
      type: object
      required:
        - listingId
        - action
        - actor
        - processedAt
      properties:
        listingId:
          type: string
          format: uuid
          description: ID объявления, прошедшего модерацию
        action:
          type: string
          enum: [approved, rejected, flagged]
          description: Выполненное действие модерации
        reason:
          type: string
          maxLength: 500
          nullable: true
          description: Причина отклонения (если применимо)
        actor:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          description: >-
            Действующий принципал как agent-badge {actorId, principalType} (ADR-0011 §6); заменяет прежний
            плоский moderatorId. principalType — снапшот на момент записи (moderation_decisions.actor_principal_type).
        processedAt:
          type: string
          format: date-time
          description: Метка времени обработки действия
        listingStatus:
          type: string
          enum: [draft, pending, published, rejected]
          description: Результирующий статус объявления после модерации
    BanUserRequest:
      type: object
      required:
        - userId
        - reason
        - durationDays
      properties:
        userId:
          type: string
          format: uuid
          description: ID пользователя для бана
        reason:
          type: string
          maxLength: 500
          description: Причина бана
        durationDays:
          type: integer
          minimum: 1
          maximum: 365
          description: Длительность бана в днях (null для постоянного бана)
        isPermanent:
          type: boolean
          default: false
          description: Постоянный ли бан (перекрывает durationDays при true)
    BanUserResponse:
      type: object
      required:
        - userId
        - bannedAt
        - expiresAt
      properties:
        userId:
          type: string
          format: uuid
          description: ID забаненного пользователя
        reason:
          type: string
          maxLength: 500
          description: Причина бана
        bannedAt:
          type: string
          format: date-time
          description: Метка времени применения бана
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Когда бан истекает (null для постоянного)
        isPermanent:
          type: boolean
          description: Постоянный ли бан
    SystemSetting:
      type: object
      required:
        - key
        - value
        - updatedAt
      properties:
        key:
          type: string
          description: Ключ настройки
        value:
          type: string
          description: Значение настройки (JSON-строка для сложных значений)
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Описание настройки
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
        updatedBy:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          nullable: true
          description: >-
            Действующий принципал, последним обновивший настройку, как agent-badge {actorId, principalType}
            (ADR-0011 §6); заменяет прежний плоский updatedBy uuid. Null, если никогда не обновлялась.
    SystemSettingUpdateRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          description: Новое значение настройки
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Обновлённое описание настройки
    AuditLogEntry:
      type: object
      required:
        - id
        - entityType
        - entityId
        - actionType
        - actor
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        entityType:
          type: string
          enum: [listing, user, organization, reference-data, moderation-action]
          description: Тип сущности, над которой выполнено действие
        entityId:
          type: string
          format: uuid
          nullable: true
          description: ID сущности (null для системных действий)
        actionType:
          type: string
          enum: [created, updated, deleted, approved, rejected, banned, role-changed, login, logout]
          description: Тип выполненного действия
        actor:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          description: >-
            Действующий принципал как agent-badge {actorId, principalType} (ADR-0011 §6); заменяет прежний
            плоский performedBy uuid. principalType — снапшот на момент записи (audit_log.actor_principal_type);
            отображаемое имя (прежний performedByName) несётся как actor.actorDisplayName.
        details:
          type: string
          maxLength: 1000
          nullable: true
          description: Дополнительные детали действия (JSON-строка)
        ipAddress:
          type: string
          pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
          nullable: true
          description: IP-адрес, откуда инициировано действие
        userAgent:
          type: string
          maxLength: 500
          nullable: true
          description: User agent клиента
        createdAt:
          type: string
          format: date-time
          description: Метка времени логирования действия
    UserRoleInfo:
      type: object
      required:
        - id
        - fullName
        - role
        - isActive
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: ID пользователя
        fullName:
          type: string
          maxLength: 100
          description: Полное имя пользователя
        email:
          type: string
          format: email
          nullable: true
          maxLength: 255
          description: Email для уведомлений
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: Роль пользователя
        isActive:
          type: boolean
          description: True = может логиниться; False = деактивирован
        createdAt:
          type: string
          format: date-time
          description: Метка регистрации
        updatedAt:
          type: string
          format: date-time
          description: Последнее обновление профиля
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Метка последнего входа
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
          description: Когда пользователь решил деактивироваться (null если активен)
        cityId:
          type: integer
          nullable: true
          description: Ссылка на город для гео-поиска (INT-справочник)
        avatarUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 500
          description: URL аватара в объектном хранилище
    ChangeUserRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: Новая роль для пользователя
  responses:
    Problem:
      description: Проблема RFC7807 (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
