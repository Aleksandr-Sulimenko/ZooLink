openapi: 3.0.3
info:
  title: ZooLink Branch API
  version: 1.0.0
  description: API for managing branches in ZooLink.
servers:
  - url: /api/v1
    description: ZooLink API v1
paths:
  /branches:
    get:
      summary: List branches
      operationId: listBranches
      parameters:
        - in: query
          name: organization_id
          schema:
            type: string
            format: uuid
          description: Filter by organization ID
        - in: query
          name: city_id
          schema:
            type: string
            format: uuid
          description: Filter by city ID
        - in: query
          name: is_headquarters
          schema:
            type: boolean
          description: Filter by headquarters flag
        - in: query
          name: is_active
          schema:
            type: boolean
          description: Filter by active status
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of branches
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Branch'
                  total:
                    type: integer
                    description: Total number of branches
                  page:
                    type: integer
                    description: Current page number
                  limit:
                    type: integer
                    description: Items per page
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Create a new branch
      operationId: createBranch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchCreate'
      responses:
        '201':
          description: Branch created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Branch'
        '400':
          description: Bad request (validation error)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
  /branches/{id}:
    get:
      summary: Get branch by ID
      operationId: getBranchById
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Branch details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Branch'
        '404':
          description: Branch not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    patch:
      summary: Update branch
      operationId: updateBranch
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchUpdate'
      responses:
        '200':
          description: Branch updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Branch'
        '400':
          description: Bad request (validation error)
        '404':
          description: Branch not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
    delete:
      summary: Delete branch (soft delete)
      operationId: deleteBranch
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Branch deleted successfully
        '404':
          description: Branch not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Branch:
      type: object
      required:
        - id
        - organization_id
        - city_id
        - address
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        organization_id:
          type: string
          format: uuid
          description: Foreign key to organization
        city_id:
          type: string
          format: uuid
          description: Foreign key to city for geo-search
        address:
          type: string
          description: Detailed branch address
        phone:
          type: string
          maxLength: 30
          description: Branch phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Branch email (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (branch-specific attributes)
          default: {}
        is_headquarters:
          type: boolean
          description: Flag indicating headquarters
          default: false
        is_active:
          type: boolean
          description: Active status
          default: true
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    BranchCreate:
      type: object
      required:
        - organization_id
        - city_id
        - address
      properties:
        organization_id:
          type: string
          format: uuid
          description: Foreign key to organization
        city_id:
          type: string
          format: uuid
          description: Foreign key to city for geo-search
        address:
          type: string
          description: Detailed branch address
        phone:
          type: string
          maxLength: 30
          description: Branch phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Branch email (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (branch-specific attributes)
          default: {}
        is_headquarters:
          type: boolean
          description: Flag indicating headquarters
          default: false
        is_active:
          type: boolean
          description: Active status
          default: true
    BranchUpdate:
      type: object
      properties:
        organization_id:
          type: string
          format: uuid
          description: Foreign key to organization
        city_id:
          type: string
          format: uuid
          description: Foreign key to city for geo-search
        address:
          type: string
          description: Detailed branch address
        phone:
          type: string
          maxLength: 30
          description: Branch phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Branch email (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (branch-specific attributes)
        is_headquarters:
          type: boolean
          description: Flag indicating headquarters
        is_active:
          type: boolean
          description: Active status