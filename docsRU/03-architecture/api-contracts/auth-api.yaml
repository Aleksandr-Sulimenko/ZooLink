openapi: 3.0.3
info:
  title: ZooLink Auth API
  version: 1.0.0
  description: API for user authentication, authorization, and profile management in ZooLink.
servers:
  - url: /api/v1
    description: ZooLink API v1
paths:
  /auth/register/phone:
    post:
      summary: Register user via phone/SMS — sends an OTP (passwordless, OTP-first)
      operationId: registerPhone
      description: >-
        (round-4/Phase-2, normative) Creates the account in PENDING_VERIFICATION and sends a
        6-digit SMS OTP. No tokens are issued here — the session is minted by /auth/verify-phone
        after the code is confirmed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPhoneRequest'
      responses:
        '202':
          description: OTP sent; phone verification required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterPhoneResponse'
        '400':
          description: Bad request (validation error)
        '409':
          description: Conflict (phone already registered)
        '429':
          description: Too Many Requests (rate limit / resend cooldown)
  /auth/register/oauth/{provider}:
    post:
      summary: Register/Login user via OAuth provider
      operationId: registerOAuth
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [google, apple, telegram, vk]
            description: OAuth provider name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthRequest'
      responses:
        '200':
          description: User logged in successfully (existing user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '201':
          description: User registered successfully (new user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request (validation error)
        '401':
          description: Unauthorized (invalid OAuth code/token)
        '429':
          description: Too Many Requests (rate limit exceeded)
  /auth/verify-phone:
    post:
      summary: Verify phone with SMS code — activates the account and issues a session
      operationId: verifyPhone
      description: >-
        (round-4/Phase-2, normative) Validates the OTP, transitions the user to ACTIVE and returns
        the session (access + refresh) plus the profile. 5 failed attempts → 15-min lockout.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPhoneRequest'
      responses:
        '200':
          description: Phone verified; session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request (invalid or expired code)
        '429':
          description: Too Many Requests (too many attempts / locked out)
  /auth/recover/email/request:
    post:
      summary: Запрос восстановления доступа через подтверждённый email (отправляет OTP)
      operationId: recoverEmailRequest
      description: >-
        (Slice-4, нормативно) Восстановление доступа для пользователя, потерявшего телефон/OAuth,
        с которыми он регистрировался, но имеющего ПОДТВЕРЖДЁННЫЙ email. Отправляет 6-значный OTP
        на этот email. Из соображений приватности ВСЕГДА возвращает 202, даже если совпадения
        нет (защита от перечисления аккаунтов). OTP активирует сессию восстановления только при
        вызове /auth/recover/email/verify с реальным кодом. Если аккаунт DEACTIVATED в пределах
        30-дневного grace, успешное восстановление также реактивирует его.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverEmailRequest'
      responses:
        '202':
          description: Если восстанавливаемый аккаунт с таким подтверждённым email есть — OTP отправлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoverEmailRequestResponse'
        '400':
          description: Bad request (ошибка валидации)
        '429':
          description: Too Many Requests (rate limit / кулдаун повторной отправки)
  /auth/recover/email/verify:
    post:
      summary: Проверка OTP восстановления по email — выдаёт сессию
      operationId: recoverEmailVerify
      description: >-
        (Slice-4, нормативно) Проверяет OTP восстановления, отправленный на подтверждённый email,
        и возвращает свежую сессию (access + refresh) и профиль. 5 неудачных попыток → блокировка
        на 15 минут. SUSPENDED-аккаунты восстановить нельзя (требуется действие оператора).
        DEACTIVATED в пределах grace реактивируется; после grace — восстановление невозможно.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoverEmailVerifyRequest'
      responses:
        '200':
          description: Восстановление подтверждено; сессия выдана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request (неверный или истёкший код)
        '403':
          description: Forbidden (аккаунт не подлежит восстановлению — SUSPENDED или grace истёк)
        '429':
          description: Too Many Requests (слишком много попыток / блокировка)
  /admin/users/{userId}/role:
    patch:
      summary: '[ADMIN] Назначение/смена роли пользователя (повышение роли)'
      operationId: adminSetUserRole
      description: >-
        (Slice-4, нормативно) USER → BREEDER/FARMER/VETERINARIAN/GROOMER (и операторские роли)
        назначаются ADMIN, а не заявляются самим пользователем. Записывается в аудит; смена роли
        отзывает ВСЕ семейства refresh-токенов целевого пользователя (round-4 «смена роли → отзыв
        всех семейств»).
      security:
        - bearerAuth: []
      x-required-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRoleRequest'
      responses:
        '200':
          description: Роль обновлена; сессии цели отозваны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Bad request (недопустимая роль)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (вызывающий не ADMIN)
        '404':
          description: Пользователь не найден
  /admin/users/{userId}/rebind:
    post:
      summary: '[ADMIN] Перепривязка телефона/OAuth-идентификатора (ассистированное восстановление)'
      operationId: adminRebindIdentifier
      description: >-
        (Slice-4, нормативно) ADMIN-ассистированная, записываемая в аудит перепривязка телефона
        или OAuth-идентификатора для пользователя, потерявшего доступ и не имеющего подтверждённого
        email. Никакого тихого захвата — действие атрибутируется ADMIN в audit_log. Перепривязка
        отзывает ВСЕ сессии цели. Ровно один идентификатор (newPhone ЛИБО провайдер+id, либо
        очистка) за вызов.
      security:
        - bearerAuth: []
      x-required-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RebindRequest'
      responses:
        '200':
          description: Идентификатор перепривязан; сессии цели отозваны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Bad request (валидация — не ровно один идентификатор, неверный телефон)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (вызывающий не ADMIN)
        '404':
          description: Пользователь не найден
        '409':
          description: Conflict (новый идентификатор уже используется другим аккаунтом)
  /admin/users/{userId}/erase:
    post:
      summary: '[ADMIN] Стереть (анонимизировать на месте) пользователя — право на забвение ФЗ-152'
      operationId: adminEraseUser
      description: >-
        (Slice-4, нормативно) Выполняет процедуру `erase_user` (data-governance.md §2):
        анонимизирует PII в users (UUID сохраняется, чтобы строки FK RESTRICT остались валидными),
        освобождает идентификаторы (phone_hash / oauth_* / email → NULL), отзывает все сессии,
        редактирует recipient/content в notification_logs, обнуляет avatar_url. Append-only
        audit_log/moderation_decisions СОХРАНЯЮТСЯ под юридическим удержанием. Идемпотентно —
        стирание уже стёртого аккаунта это no-op 200. Статус становится DEACTIVATED с меткой
        `erased_at`.
      security:
        - bearerAuth: []
      x-required-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: Пользователь стёрт (или уже стёрт — идемпотентно)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (вызывающий не ADMIN)
        '404':
          description: Пользователь не найден
  /me/erase:
    post:
      summary: Запрос на стирание текущего аккаунта (ФЗ-152)
      operationId: eraseMe
      description: >-
        (Slice-4, нормативно) Самостоятельное право на забвение. По data-governance.md §2
        канонический путь: деактивация → 30-дневный grace → стирание. Этот эндпоинт немедленно
        деактивирует аккаунт, если он ещё ACTIVE, затем планирует/выполняет стирание. В MVP (нет
        планировщика для grace-задачи) он деактивирует и фиксирует запрос на стирание; собственно
        анонимизацию выполняет retention-задача / ADMIN после grace. См. Open Questions.
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Стирание запрошено; аккаунт деактивирован, анонимизация запланирована после grace
        '401':
          description: Unauthorized
  /auth/refresh:
    post:
      summary: Refresh access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized (invalid or expired refresh token)
        '403':
          description: Forbidden (refresh token reused or revoked)
  /auth/logout:
    post:
      summary: Logout user (invalidate tokens)
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out successfully
        '401':
          description: Unauthorized
  /me:
    get:
      summary: Get current user profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile (returns a weak ETag for optimistic concurrency)
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on PATCH
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '304':
          description: Not Modified (If-None-Match matched)
        '401':
          description: Unauthorized
    patch:
      summary: Update current user profile
      operationId: updateMe
      description: >-
        Optimistic concurrency (API_CONVENTIONS §10): requires the If-Match header carrying the
        ETag from a prior GET /me.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from GET /me
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Bad request (validation error)
        '401':
          description: Unauthorized
        '412':
          description: Precondition Failed (stale ETag — re-fetch and retry)
        '428':
          description: Precondition Required (If-Match header missing)
    post:
      summary: Deactivate current user account
      operationId: deactivateMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account deactivated successfully
        '401':
          description: Unauthorized
  /me/reactivate:
    post:
      summary: Reactivate deactivated user account
      operationId: reactivateMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account reactivated successfully
        '400':
          description: Bad request (account not deactivated or other error)
        '401':
          description: Unauthorized
  /auth/whoami:
    get:
      summary: '[internal] Вернуть аутентифицированный принципал (self-check авторизации)'
      operationId: whoami
      description: >-
        Внутренний/диагностический эндпоинт, не часть публичной продуктовой поверхности.
        Возвращает аутентифицированный принципал, чтобы прогнать JwtAuthGuard end-to-end
        (smoke/health цепочки авторизации). Данные не изменяются.
      x-internal: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Аутентифицированный принципал
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPrincipal'
        '401':
          description: Unauthorized
  /auth/operator-check:
    get:
      summary: '[internal] Проверить операторскую авторизацию end-to-end (роль + политика)'
      operationId: operatorCheck
      description: >-
        Внутренний/диагностический эндпоинт, не часть публичной продуктовой поверхности.
        Требует роль MODERATOR плюс политику `read ModerationQueue`, так что прогоняет и
        RolesGuard, и CASL PoliciesGuard за один вызов. Данные не изменяются.
      x-internal: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Операторская авторизация успешна
          content:
            application/json:
              schema:
                type: object
                required: [ok, role]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  role:
                    type: string
                    description: Роль вызывающего (операторская роль при успехе)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (нет операторской роли или политики)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
      description: Идентификатор целевого пользователя (users.id)
  schemas:
    AuthPrincipal:
      type: object
      description: Аутентифицированный актёр, прикрепляемый к запросу после успешного JwtAuthGuard.
      required:
        - userId
        - role
        - principalType
      properties:
        userId:
          type: string
          format: uuid
          description: users.id аутентифицированного актёра
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: Каноническая роль (должна совпадать с DB CHECK на users.role)
        principalType:
          type: string
          enum: [HUMAN, AGENT]
          description: Принципалом может быть человек или ИИ-агент (ADR-0006)
    RecoverEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Подтверждённый email, привязанный к восстанавливаемому аккаунту
    RecoverEmailRequestResponse:
      type: object
      required:
        - status
        - expiresInSeconds
      properties:
        status:
          type: string
          enum: [VERIFICATION_REQUIRED]
          description: Всегда VERIFICATION_REQUIRED — подтвердите через /auth/recover/email/verify
        expiresInSeconds:
          type: integer
          description: Окно действия OTP в секундах (напр. 300)
    RecoverEmailVerifyRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Подтверждённый email, на который был отправлен OTP восстановления
        code:
          type: string
          pattern: '^\\d{6}$'
          description: 6-значный код восстановления из письма
    SetRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: Новая назначаемая роль (канонический набор из 7 ролей)
    RebindRequest:
      type: object
      description: >-
        Должно быть указано ровно одно из: `newPhone`, (`oauthProvider` + `oauthId`) или очистка
        (`oauthProvider` + `clear: true`).
      properties:
        newPhone:
          type: string
          pattern: '^\\+?[1-9]\\d{1,14}$'
          description: Новый номер телефона (E.164) для привязки (повторно хешируется на сервере)
        oauthProvider:
          type: string
          enum: [google, apple, telegram, vk]
          description: OAuth-провайдер, идентификатор которого перепривязать или очистить
        oauthId:
          type: string
          description: Новый id на стороне провайдера для привязки (опустить при clear=true)
        clear:
          type: boolean
          description: При true с oauthProvider — отвязывает данный OAuth-идентификатор
        reason:
          type: string
          maxLength: 500
          description: Причина, указанная оператором (записывается в audit_log)
    RegisterPhoneRequest:
      type: object
      # (Phase-2/round-7, normative) Aligned with spec 01 round-4: end-user auth is PASSWORDLESS
      # (phone OTP) — `password` removed (password_hash is operator-only). `cityId` is an INTEGER
      # lookup (id-type convention: lookups=INT) and optional (set later via PATCH /me).
      required:
        - phone
        - fullName
      properties:
        phone:
          type: string
          pattern: '^\\+?[1-9]\\d{1,14}$'
          description: Phone number in E.164 format
        fullName:
          type: string
          maxLength: 100
          minLength: 2
          description: User's full name for display
        cityId:
          type: integer
          description: Reference to city (cities.id) for geo-search (optional)
        email:
          type: string
          format: email
          maxLength: 255
          description: Email address for notifications (optional)
        avatarUrl:
          type: string
          format: uri
          maxLength: 500
          description: URL to avatar image in object storage (optional)
        preferredLanguage:
          type: string
          enum: [ru, en]
          description: Preferred language (supported_languages.code); defaults to ru
    OAuthRequest:
      type: object
      required:
        - code
        - fullName
      properties:
        code:
          type: string
          description: Authorization code from OAuth provider
        fullName:
          type: string
          maxLength: 100
          minLength: 2
          description: User's full name (can be overridden by provider data)
        cityId:
          type: integer
          description: Reference to city (cities.id) for geo-search (optional)
        email:
          type: string
          format: email
          maxLength: 255
          description: Email address from provider (optional)
        avatarUrl:
          type: string
          format: uri
          maxLength: 500
          description: URL to avatar image from provider (optional)
    VerifyPhoneRequest:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          pattern: '^\\+?[1-9]\\d{1,14}$'
          description: Phone number in E.164 format
        code:
          type: string
          pattern: '^\\d{6}$'
          description: 6-digit SMS verification code
    RegisterPhoneResponse:
      type: object
      required:
        - status
        - expiresInSeconds
      properties:
        status:
          type: string
          enum: [VERIFICATION_REQUIRED]
          description: Always VERIFICATION_REQUIRED — confirm via /auth/verify-phone
        expiresInSeconds:
          type: integer
          description: OTP validity window in seconds (e.g. 300)
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: Refresh token obtained during login/registration
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token to invalidate (optional, if not provided all tokens for user are invalidated)
    AuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - user
      properties:
        accessToken:
          type: string
          description: JWT access token (expires in 15 min; refresh TTL 7 d — spec 01 round-4)
        refreshToken:
          type: string
          description: Refresh token for obtaining new access tokens
        user:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      required:
        - id
        - fullName
        - role
        - isActive
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        # (Phase-2/round-7, normative) phone_hash is a credential-derived secret and is NEVER
        # returned in profile responses — removed from this schema.
        oauthGoogleId:
          type: string
          nullable: true
          description: Unique ID from Google (null if not linked)
        oauthAppleId:
          type: string
          nullable: true
          description: Unique ID from Apple (null if not linked)
        oauthTelegramId:
          type: string
          nullable: true
          description: Unique ID from Telegram (null if not linked)
        oauthVkId:
          type: string
          nullable: true
          description: Unique ID from VK (null if not linked)
        fullName:
          type: string
          maxLength: 100
          description: Display name
        cityId:
          type: integer
          nullable: true
          description: Reference to city (cities.id) for geo-search
        avatarUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 500
          description: URL to avatar in object storage
        email:
          type: string
          format: email
          nullable: true
          maxLength: 255
          description: Email address for notifications
        emailVerified:
          type: boolean
          default: false
          description: True if email confirmed via link
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: User role defining permissions (canonical 7-role set, spec 01 round-4)
        status:
          type: string
          enum: [UNVERIFIED, PENDING_VERIFICATION, VERIFIED, ACTIVE, SUSPENDED, DEACTIVATED]
          description: Lifecycle state (single source of truth; isActive is derived)
        preferredLanguage:
          type: string
          enum: [ru, en]
          description: Preferred language (supported_languages.code)
        isActive:
          type: boolean
          description: Derived from status (true unless SUSPENDED/DEACTIVATED)
        createdAt:
          type: string
          format: date-time
          description: Registration timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last profile update
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Last login timestamp
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
          description: When user chose to deactivate (null if active)
    UpdateProfileRequest:
      type: object
      # (Phase-2/round-7, normative) passwordless — `password` removed; cityId is INTEGER (lookup).
      # All fields optional (partial update); at least one should be present.
      properties:
        fullName:
          type: string
          maxLength: 100
          minLength: 2
          description: User's full name for display
        cityId:
          type: integer
          nullable: true
          description: Reference to city (cities.id) for geo-search (null clears it)
        avatarUrl:
          type: string
          format: uri
          maxLength: 500
          nullable: true
          description: URL to avatar image in object storage
        email:
          type: string
          format: email
          maxLength: 255
          nullable: true
          description: Email address for notifications
        preferredLanguage:
          type: string
          enum: [ru, en]
          description: Preferred language (supported_languages.code)