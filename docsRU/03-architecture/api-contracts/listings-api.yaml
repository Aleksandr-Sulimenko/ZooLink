openapi: 3.0.3
info:
  title: ZooLink Listings API
  version: 1.0.0
  description: >
    API управления объявлениями (продажа, вязка, выставка, пристройство) в ZooLink.
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth с public opt-out (§2),
    x-required-roles (§3), ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5),
    LocalizedString (§6), деньги в минорных единицах (§7), If-Match/ETag на мутирующих PATCH (§10).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /listings:
    get:
      summary: Список объявлений с фильтрацией
      operationId: listListings
      description: Публично для активных объявлений (security opt-out). Query-параметры filter/sort — snake_case (§12).
      security: []
      parameters:
        - in: query
          name: animal_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID животного
        - in: query
          name: seller_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID продавца
        - in: query
          name: organization_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID организации (для организационных объявлений)
        - in: query
          name: branch_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID филиала
        - in: query
          name: listing_type
          schema: { type: string, enum: [sale, breeding, show, adoption, stud_service] }
          description: Фильтр по типу объявления
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Фильтр по активности
        - in: query
          name: price_min
          schema: { type: integer }
          description: Минимальная цена в минорных единицах
        - in: query
          name: price_max
          schema: { type: integer }
          description: Максимальная цена в минорных единицах
        - in: query
          name: currency
          schema: { type: string, minLength: 3, maxLength: 3, pattern: '^[A-Z]{3}$' }
          description: Код валюты (ISO 4217, напр. RUB, USD)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
      responses:
        '200':
          description: Постраничный список объявлений
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Listing' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Создать новое объявление
      operationId: createListing
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingCreate' }
      responses:
        '201':
          description: Объявление успешно создано
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}:
    get:
      summary: Получить объявление по ID
      operationId: getListingById
      description: Публично для активных объявлений (security opt-out). Шлёт weak ETag для conditional-read (§13).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Детали объявления
          headers:
            ETag:
              schema: { type: string }
              description: Weak-валидатор для отправки в If-Match на PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Обновить объявление
      operationId: updateListing
      description: Оптимистичная конкуренция (§10) — требует If-Match с ETag из предыдущего GET.
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего GET /listings/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingUpdate' }
      responses:
        '200':
          description: Объявление успешно обновлено
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Удалить объявление (мягкое удаление через isActive=false)
      operationId: deleteListing
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Объявление успешно удалено }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/photos:
    get:
      summary: Получить фото объявления
      operationId: getListingPhotos
      description: Публично для активных объявлений (security opt-out).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Фото объявления
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ListingPhoto' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Добавить фото к объявлению
      operationId: createListingPhoto
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID объявления
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingPhotoCreate' }
      responses:
        '201':
          description: Фото успешно добавлено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingPhoto' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/photos/{photoId}:
    delete:
      summary: Удалить фото из объявления
      operationId: deleteListingPhoto
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID объявления
        - in: path
          name: photoId
          required: true
          schema: { type: string, format: uuid }
          description: ID фото
      responses:
        '204': { description: Фото успешно удалено }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/conversations:
    get:
      summary: Получить переписки по объявлению
      operationId: getListingConversations
      deprecated: true
      description: >
        DEPRECATED — чат это Фаза 2+ и вне MVP (ADR-0005). Сервер шлёт заголовки Deprecation + Sunset
        (API_CONVENTIONS §9/§14).
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Переписки по объявлению
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Conversation' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    Listing:
      type: object
      required:
        - id
        - animalId
        - sellerId
        - listingType
        - titleLocalized
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        animalId:
          type: string
          format: uuid
          description: Внешний ключ на животное
        sellerId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя (продавца)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на организацию (null для личных объявлений)
        branchId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на филиал (null для личных объявлений или если не указан)
        metadata:
          type: object
          description: JSONB-поле расширяемости (ссылки на соцсети, плейсхолдер видео и т.п.)
          default: {}
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Тип объявления
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений, напр. вязка)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Количество (число единиц/животных)
        locationPoint:
          type: object
          description: "GeoPoint для гео-поиска (требует PostGIS). Структура: { type: \"Point\", coordinates: [longitude, latitude] }"
          nullable: true
        searchRadiusM:
          type: integer
          nullable: true
          description: Радиус поиска в метрах для гео-поиска
        isActive:
          type: boolean
          description: Активность (legacy-булево; жизненный цикл отслеживает `status`)
        status:
          type: string
          enum: [DRAFT, PENDING_MODERATION, ACTIVE, EXPIRED, SOLD, DEACTIVATED]
          default: DRAFT
          description: Состояние жизненного цикла (см. specs/statemachines/listing_state_machine.md). В публичном поиске только ACTIVE.
        moderationStatus:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CHANGES_REQUESTED]
          default: PENDING
          description: Результат модерации (поле отдельно от жизненного `status`)
        publishedAt:
          type: string
          format: date-time
          nullable: true
          description: Устанавливается при переходе `status` в ACTIVE
        soldAt:
          type: string
          format: date-time
          nullable: true
          description: Устанавливается при переходе `status` в SOLD
        transactionId:
          type: string
          format: uuid
          nullable: true
          description: FK на payment_transactions (ставится при продаже)
        lat:
          type: number
          format: double
          nullable: true
          description: Широта (MVP-первичное гео-хранилище; -90..90)
        lng:
          type: number
          format: double
          nullable: true
          description: Долгота (MVP-первичное гео-хранилище; -180..180)
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Дата/время истечения объявления
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
    ListingCreate:
      type: object
      required:
        - animalId
        - sellerId
        - listingType
        - titleLocalized
      properties:
        animalId:
          type: string
          format: uuid
          description: Внешний ключ на животное
        sellerId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя (продавца)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на организацию (null для личных объявлений)
        branchId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на филиал (null для личных объявлений или если не указан)
        metadata:
          type: object
          description: JSONB-поле расширяемости (ссылки на соцсети, плейсхолдер видео и т.п.)
          default: {}
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Тип объявления
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений, напр. вязка)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Количество (число единиц/животных)
        locationPoint:
          type: object
          description: "GeoPoint для гео-поиска (требует PostGIS). Структура: { type: \"Point\", coordinates: [longitude, latitude] }"
          nullable: true
        searchRadiusM:
          type: integer
          nullable: true
          description: Радиус поиска в метрах для гео-поиска
        isActive:
          type: boolean
          description: Активность
          default: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Дата/время истечения объявления
    ListingUpdate:
      type: object
      properties:
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений, напр. вязка)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          description: Количество (число единиц/животных)
        locationPoint:
          type: object
          description: "GeoPoint для гео-поиска (требует PostGIS). Структура: { type: \"Point\", coordinates: [longitude, latitude] }"
          nullable: true
        searchRadiusM:
          type: integer
          nullable: true
          description: Радиус поиска в метрах для гео-поиска
        isActive:
          type: boolean
          description: Активность
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Дата/время истечения объявления
        metadata:
          type: object
          description: JSONB-поле расширяемости (ссылки на соцсети, плейсхолдер видео и т.п.)
    ListingPhoto:
      type: object
      required:
        - id
        - listingId
        - url
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        listingId:
          type: string
          format: uuid
          description: Внешний ключ на объявление
        url:
          type: string
          format: uri
          description: URL фото
        orderIndex:
          type: integer
          default: 0
          description: Индекс порядка отображения
        createdAt:
          type: string
          format: date-time
          description: Метка создания
    ListingPhotoCreate:
      type: object
      required:
        - listingId
        - url
      properties:
        listingId:
          type: string
          format: uuid
          description: Внешний ключ на объявление
        url:
          type: string
          format: uri
          description: URL фото
        orderIndex:
          type: integer
          default: 0
          description: Индекс порядка отображения
    Conversation:
      type: object
      deprecated: true
      required:
        - id
        - listingId
        - participantAId
        - participantBId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        listingId:
          type: string
          format: uuid
          description: Внешний ключ на объявление
        participantAId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя (участник A)
        participantBId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя (участник B)
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
  responses:
    Problem:
      description: Проблема RFC7807 (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
