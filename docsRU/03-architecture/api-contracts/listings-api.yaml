openapi: 3.0.3
info:
  title: ZooLink Listings API
  version: 1.0.0
  description: >
    API управления объявлениями (продажа, вязка, выставка, пристройство) в ZooLink.
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth с public opt-out (§2),
    x-required-roles (§3), ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5),
    LocalizedString (§6), деньги в минорных единицах (§7), If-Match/ETag на мутирующих PATCH (§10).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /listings:
    get:
      summary: Список объявлений с фильтрацией
      operationId: listListings
      description: Публично для активных объявлений (security opt-out). Query-параметры filter/sort — snake_case (§12).
      security: []
      parameters:
        - in: query
          name: animal_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID животного
        - in: query
          name: seller_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID продавца
        - in: query
          name: organization_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID организации (для организационных объявлений)
        - in: query
          name: branch_id
          schema: { type: string, format: uuid }
          description: Фильтр по ID филиала
        - in: query
          name: listing_type
          schema: { type: string, enum: [sale, breeding, show, adoption, stud_service, leasing] }
          description: Фильтр по типу объявления (`leasing` — только форма, поведение Фаза 2 — миграция 0021)
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Фильтр по активности
        - in: query
          name: price_min
          schema: { type: integer }
          description: Минимальная цена в минорных единицах
        - in: query
          name: price_max
          schema: { type: integer }
          description: Максимальная цена в минорных единицах
        - in: query
          name: currency
          schema: { type: string, minLength: 3, maxLength: 3, pattern: '^[A-Z]{3}$' }
          description: Код валюты (ISO 4217, напр. RUB, USD)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Номер страницы для пагинации
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Количество элементов на странице
      responses:
        '200':
          description: Постраничный список объявлений
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Listing' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Создать новое объявление (DRAFT)
      operationId: createListing
      description: >
        Создаёт объявление в DRAFT. **Продавец выводится из аутентифицированного актора**
        на сервере (`seller_id := actor`); `sellerId` в теле **отклоняется (400, неизвестное поле)**
        — whitelist неизвестных полей отклоняет его, а не молча игнорирует (D2, класс IDOR —
        согласованно с каждым другим модулем). Актор ДОЛЖЕН владеть указанным животным (его `owner_id`,
        или org-admin его `organization_id`) → иначе 403. Личное vs организационное владение
        должно удовлетворять `chk_listing_ownership` (личное: organizationId+branchId оба null; орг.:
        organizationId задан, branchId опционально) → нарушение 422. Рынок **выводится** из
        вида животного (ADR-0002), никогда не задаётся клиентом. `status`/`moderationStatus` **не**
        записываемы — жизненный цикл движется только через действия (POST /submit). MODERATOR — **R-only** на
        объявлениях (rbac-matrix §64/§99) → исключён из create.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11, окно 24ч)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingCreate' }
      responses:
        '201':
          description: Объявление успешно создано (DRAFT)
          headers:
            ETag:
              schema: { type: string }
              description: Weak-валидатор нового объявления (отправить как If-Match на update/submit, §10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }   # actor does not own the animal
        '404': { $ref: '#/components/responses/Problem' }   # animal not found
        '422': { $ref: '#/components/responses/Problem' }   # chk_listing_ownership / value CHECK violation / Idempotency-Key reuse w/ different body
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}:
    get:
      summary: Получить объявление по ID
      operationId: getListingById
      description: Публично для активных объявлений (security opt-out). Шлёт weak ETag для conditional-read (§13).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Детали объявления
          headers:
            ETag:
              schema: { type: string }
              description: Weak-валидатор для отправки в If-Match на PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Обновить объявление
      operationId: updateListing
      description: >
        Оптимистичная конкуренция (§10) — требует If-Match с ETag из предыдущего GET.
        Объектное правило: изменяемо только продавцом объявления (`seller_id == actor`) или
        org-admin его организации (rbac-matrix §99) → иначе 403. `status`/`moderationStatus`/
        `sellerId` здесь **не** записываемы (жизненный цикл движется через действия; продавец выводится).
        MODERATOR — R-only на объявлениях → исключён.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего GET /listings/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingUpdate' }
      responses:
        '200':
          description: Объявление успешно обновлено
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после обновления
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Отозвать объявление (мягкий снос → DEACTIVATED)
      operationId: deleteListing
      description: >
        **Мягкий отзыв** (никогда не жёсткое удаление). Переводит объявление в **DEACTIVATED**
        (`is_active=false`), сохраняя его историю/аудит. Это единственный owner-driven путь
        отзыва (нет отдельного эндпоинта `/withdraw`). Разрешён из управляемых владельцем
        состояний (DRAFT, PENDING_MODERATION и ACTIVE — владелец отзывает; ACTIVE→DEACTIVATED по
        стейт-машине); no-op-или-409 на уже-терминальном DEACTIVATED/SOLD/EXPIRED состоянии
        (guard-based 409, §10 — это state-transition действие). Объектное правило: только продавец или
        org-admin (rbac-matrix §99); MODERATOR-driven удаление — отдельный operator-путь
        (Admin Slice 4), здесь исключён. Переход audit/principal-stamped.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Объявление отозвано (теперь DEACTIVATED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }   # not the seller / org-admin
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }   # already terminal (SOLD/DEACTIVATED/EXPIRED)
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/submit:
    post:
      summary: Отправить DRAFT-объявление на модерацию (DRAFT → PENDING_MODERATION)
      operationId: submitListing
      description: >
        Владелец отправляет (или переотправляет после CHANGES_REQUESTED) DRAFT-объявление на модерацию
        (D1). Переводит DRAFT → PENDING_MODERATION и ставит `moderationStatus='PENDING'`.
        **Guard (стейт-машина):** все обязательные поля валидны И **≥1 фото** И (цена ≥
        MIN_LISTING_PRICE **только если** `listingType='sale'`). Это state-transition действие,
        не мутация тела — `status` никогда не задаётся клиентом. **Инвариант P0:** этот путь НЕ
        и НЕ МОЖЕТ ставить ACTIVE — только апрув модератора (Admin Slice 4) двигает
        PENDING_MODERATION → ACTIVE (`trg_listing_active_requires_approval`). Объектное правило:
        только продавец или org-admin; MODERATOR исключён (R-only). Идемпотентно под Idempotency-Key;
        If-Match защищает от действия по устаревшему виду.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (§11)
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag из предыдущего GET /listings/{id} (§10)
      responses:
        '200':
          description: Объявление отправлено (теперь PENDING_MODERATION)
          headers:
            ETag:
              schema: { type: string }
              description: Новый weak-валидатор после перехода
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }   # not the seller / org-admin
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }   # not in DRAFT (LISTING_NOT_DRAFT)
        '412': { $ref: '#/components/responses/Problem' }   # STALE_RESOURCE (If-Match mismatch)
        '422': { $ref: '#/components/responses/Problem' }   # submit guard failed (no photo / price<min for sale / required fields)
        '428': { $ref: '#/components/responses/Problem' }   # If-Match missing
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/photos:
    get:
      summary: Получить фото объявления
      operationId: getListingPhotos
      description: Публично для активных объявлений (security opt-out).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Фото объявления
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ListingPhoto' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Добавить фото к объявлению
      operationId: createListingPhoto
      description: >
        Добавляет фото к объявлению, которым актор владеет (продавец или org-admin → иначе 403). MODERATOR —
        R-only на объявлениях → исключён. `MAX_MEDIA_ITEMS=10` на объявление → 422 при переполнении.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID объявления
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingPhotoCreate' }
      responses:
        '201':
          description: Фото успешно добавлено
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingPhoto' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/photos/{photoId}:
    delete:
      summary: Удалить фото из объявления
      operationId: deleteListingPhoto
      description: Только продавец или org-admin (→ иначе 403); MODERATOR R-only на объявлениях, исключён.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID объявления
        - in: path
          name: photoId
          required: true
          schema: { type: string, format: uuid }
          description: ID фото
      responses:
        '204': { description: Фото успешно удалено }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/analytics:
    get:
      summary: Получить аналитику по объявлению (доступ продавцу)
      operationId: getListingAnalytics
      description: >
        Аналитика по одному объявлению для продавца (BR pet-marketplace §5 «Просмотры: 15, Показано
        контактов: 3»). Доступ ограничен владельцем: продавец объявления ИЛИ org-admin организации
        объявления (object-level ownership проверяется на сервисном слое по rbac-matrix.md). Сейчас —
        снимок-счётчики; форма series-ready (§16) — опциональный временной ряд `series` помечен x-phase:2
        и в MVP отсутствует/пуст. Применяются конвенции публичного чтения (weak ETag + Cache-Control, §13).
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID объявления
      responses:
        '200':
          description: Снимок аналитики объявления
          headers:
            ETag:
              schema: { type: string }
              description: Слабый валидатор для условных чтений (§13)
            Cache-Control:
              schema: { type: string }
              description: Директива кэширования для снимка аналитики (§13)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingAnalytics' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/conversations:
    get:
      summary: Получить переписки по объявлению
      operationId: getListingConversations
      deprecated: true
      description: >
        DEPRECATED — чат это Фаза 2+ и вне MVP (ADR-0005). Сервер шлёт заголовки Deprecation + Sunset
        (API_CONVENTIONS §9/§14).
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Переписки по объявлению
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Conversation' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    Listing:
      type: object
      required:
        - id
        - animalId
        - sellerId
        - listingType
        - titleLocalized
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        animalId:
          type: string
          format: uuid
          description: Внешний ключ на животное
        sellerId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя (продавца)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на организацию (null для личных объявлений)
        branchId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на филиал (null для личных объявлений или если не указан)
        metadata:
          type: object
          description: JSONB-поле расширяемости (ссылки на соцсети, плейсхолдер видео и т.п.)
          default: {}
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service, leasing]
          description: Тип объявления (`leasing` — только форма, поведение Фаза 2 — миграция 0021)
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений, напр. вязка)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Количество (число единиц/животных)
        isActive:
          type: boolean
          description: Активность (legacy-булево; жизненный цикл отслеживает `status`)
        status:
          type: string
          enum: [DRAFT, PENDING_MODERATION, ACTIVE, EXPIRED, SOLD, DEACTIVATED]
          default: DRAFT
          readOnly: true
          description: >
            Состояние жизненного цикла (см. specs/statemachines/listing_state_machine.md). **Read-only** —
            устанавливается сервером; движется только через действия (create→DRAFT, /submit→PENDING_MODERATION,
            апрув модератора→ACTIVE, DELETE→DEACTIVATED). В публичном поиске только ACTIVE-объявления.
            **Инвариант P0:** ACTIVE требует `moderationStatus=APPROVED`
            (`trg_listing_active_requires_approval`); ни один путь Slice-1 не ставит ACTIVE.
        moderationStatus:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CHANGES_REQUESTED]
          default: PENDING
          readOnly: true
          description: Результат модерации (поле отдельно от жизненного `status`). **Read-only** — ставится модератором (Admin Slice 4).
        publishedAt:
          type: string
          format: date-time
          nullable: true
          description: Устанавливается при переходе `status` в ACTIVE
        soldAt:
          type: string
          format: date-time
          nullable: true
          description: Устанавливается при переходе `status` в SOLD
        transactionId:
          type: string
          format: uuid
          nullable: true
          description: FK на payment_transactions (ставится при продаже)
        lat:
          type: number
          format: double
          nullable: true
          description: Широта (MVP-первичное гео-хранилище; -90..90)
        lng:
          type: number
          format: double
          nullable: true
          description: Долгота (MVP-первичное гео-хранилище; -180..180)
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Дата/время истечения объявления
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
    ListingCreate:
      type: object
      description: >
        Тело создания объявления. **`sellerId` НЕ принимается** — продавец выводится из
        аутентифицированного актора на сервере (D2, класс IDOR); `sellerId` в теле **отклоняется (400,
        неизвестное поле)** whitelist'ом неизвестных полей (не молча игнорируется). `status`/
        `moderationStatus` не записываемы — новое объявление всегда DRAFT; жизненный цикл движется только
        через действия (POST /submit). `market` выводится из вида животного (ADR-0002), не
        задаётся клиентом.
      required:
        - animalId
        - listingType
        - titleLocalized
      properties:
        animalId:
          type: string
          format: uuid
          description: Внешний ключ на животное
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на организацию (null для личных объявлений)
        branchId:
          type: string
          format: uuid
          nullable: true
          description: Внешний ключ на филиал (null для личных объявлений или если не указан)
        metadata:
          type: object
          description: JSONB-поле расширяемости (ссылки на соцсети, плейсхолдер видео и т.п.)
          default: {}
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service, leasing]
          description: Тип объявления (`leasing` — только форма, поведение Фаза 2 — миграция 0021)
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений, напр. вязка)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Количество (число единиц/животных)
        lat:
          type: number
          format: double
          nullable: true
          description: >
            Широта (MVP-первичное гео-хранилище; -90..90, `chk_listings_latlng`). Только форма в
            Slice 1 — хранится, но гео-поиск — Slice 2. lat/lng должны быть оба-null или оба-заданы.
        lng:
          type: number
          format: double
          nullable: true
          description: Долгота (MVP-первичное гео-хранилище; -180..180, `chk_listings_latlng`). Только форма в Slice 1.
        isActive:
          type: boolean
          description: Активность
          default: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Дата/время истечения объявления
    ListingUpdate:
      type: object
      properties:
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Заголовок объявления (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Описание объявления (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Цена в минорных единицах (null для беспрайсовых объявлений, напр. вязка)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          description: Код валюты (ISO 4217)
        quantity:
          type: integer
          description: Количество (число единиц/животных)
        lat:
          type: number
          format: double
          nullable: true
          description: Широта (MVP-первичное гео-хранилище; -90..90, `chk_listings_latlng`). Только форма в Slice 1.
        lng:
          type: number
          format: double
          nullable: true
          description: Долгота (MVP-первичное гео-хранилище; -180..180, `chk_listings_latlng`). Только форма в Slice 1.
        isActive:
          type: boolean
          description: Активность
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Дата/время истечения объявления
        metadata:
          type: object
          description: JSONB-поле расширяемости (ссылки на соцсети, плейсхолдер видео и т.п.)
    ListingPhoto:
      type: object
      required:
        - id
        - listingId
        - url
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        listingId:
          type: string
          format: uuid
          description: Внешний ключ на объявление
        url:
          type: string
          format: uri
          description: URL фото
        orderIndex:
          type: integer
          default: 0
          description: Индекс порядка отображения
        createdAt:
          type: string
          format: date-time
          description: Метка создания
    ListingPhotoCreate:
      type: object
      required:
        - listingId
        - url
      properties:
        listingId:
          type: string
          format: uuid
          description: Внешний ключ на объявление
        url:
          type: string
          format: uri
          description: URL фото
        orderIndex:
          type: integer
          default: 0
          description: Индекс порядка отображения
    AnalyticsSeriesPoint:
      type: object
      description: Одна точка временного ряда (x-phase:2, форма series-ready — §16).
      required: [date]
      properties:
        date:
          type: string
          format: date
          description: Календарный день (UTC), по которому агрегируются метрики
        views:
          type: integer
          description: Просмотры за этот день
        contactReveals:
          type: integer
          description: Показы контактов за этот день
    ListingAnalytics:
      type: object
      description: >
        Аналитика по объявлению для продавца. Сейчас — снимок-счётчики; `series` помечен x-phase:2 и
        аддитивен (в MVP отсутствует/пуст) — принятие поля сейчас исключает слом контракта при появлении
        временного ряда (§16).
      required: [listingId, views, contactReveals]
      properties:
        listingId:
          type: string
          format: uuid
          description: Объявление, которое описывает снимок
        views:
          type: integer
          description: Сколько раз объявление показано/просмотрено (BR `view_count`)
        contactReveals:
          type: integer
          description: Всего показов контактов (BR `contact_shown_count`; источник — `contact_reveals`)
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
          description: Время последней активности (просмотр/показ контактов); null, если активности нет
        series:
          type: array
          nullable: true
          x-phase: 2
          description: >
            Опциональный временной ряд (точки по дням). Форма series-ready (§16) — в MVP отсутствует/пуст,
            добавляется аддитивно в Фазе 2 без смены контракта. Не удалять это поле.
          items: { $ref: '#/components/schemas/AnalyticsSeriesPoint' }
    Conversation:
      type: object
      deprecated: true
      required:
        - id
        - listingId
        - participantAId
        - participantBId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Уникальный идентификатор
        listingId:
          type: string
          format: uuid
          description: Внешний ключ на объявление
        participantAId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя (участник A)
        participantBId:
          type: string
          format: uuid
          description: Внешний ключ на пользователя (участник B)
        createdAt:
          type: string
          format: date-time
          description: Метка создания
        updatedAt:
          type: string
          format: date-time
          description: Метка последнего обновления
  responses:
    Problem:
      description: Проблема RFC7807 (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
