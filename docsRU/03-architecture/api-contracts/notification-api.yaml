openapi: 3.0.3
info:
  title: ZooLink Notification API
  version: 1.0.0
  description: >-
    Шаблоны уведомлений, логи доставки, пользовательские настройки и webhooks
    доставки от провайдера (спека 13, notification_state_machine). Сама отправка
    запускается внутренне доменными событиями; этот API — управление, настройки
    и колбэки статуса доставки.
    Соответствует API_CONVENTIONS.md: camelCase-тела (§0), bearer-auth (§2), x-required-roles (§3),
    ошибки RFC7807 Problem (§4), пагинация {items, meta: PageMeta} (§5).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /notifications/templates:
    get:
      summary: Список шаблонов уведомлений (admin)
      operationId: listNotificationTemplates
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [EMAIL, SMS] }
        - in: query
          name: language
          schema: { type: string, maxLength: 2 }
      responses:
        '200':
          description: Шаблоны
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NotificationTemplate' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Создать шаблон уведомления (admin)
      operationId: createNotificationTemplate
      x-required-roles: [ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Ключ клиента для безопасного повтора (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationTemplateCreate' }
      responses:
        '201':
          description: Шаблон создан
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationTemplate' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /notifications/logs:
    get:
      summary: Список логов доставки уведомлений (admin / свои)
      operationId: listNotificationLogs
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, enum: [SENT, DELIVERED, FAILED, BOUNCED] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Страница логов
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/NotificationLog' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /me/notification-preferences:
    get:
      summary: Получить настройки уведомлений текущего пользователя
      operationId: getNotificationPreferences
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      responses:
        '200':
          description: Настройки (users.notification_prefs)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '401': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Обновить настройки уведомлений текущего пользователя
      operationId: updateNotificationPreferences
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationPreferences' }
      responses:
        '200':
          description: Обновлённые настройки
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '401': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /notifications/webhook:
    post:
      summary: Webhook доставки от провайдера
      operationId: notificationWebhook
      x-internal: true
      security: []
      description: >-
        Внутренний/только для провайдера (проверка подписи, не bearer-auth — security opt-out).
        Идемпотентные колбэки статуса доставки от email/SMS-провайдера.
        delivered -> DELIVERED; hard bounce -> BOUNCED; transient error -> FAILED (повторяемо).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationWebhookEvent' }
      responses:
        '200': { description: Событие принято (идемпотентно) }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    NotificationTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [EMAIL, SMS]
        subjectTemplate:
          type: string
          nullable: true
        bodyTemplate:
          type: string
        language:
          type: string
          maxLength: 2
          description: FK на supported_languages.code
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NotificationTemplateCreate:
      type: object
      required: [name, type, bodyTemplate, language]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [EMAIL, SMS]
        subjectTemplate:
          type: string
          nullable: true
        bodyTemplate:
          type: string
        language:
          type: string
          maxLength: 2
        isActive:
          type: boolean
          default: true
    NotificationLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [EMAIL, SMS]
        templateId:
          type: string
          format: uuid
          nullable: true
        recipient:
          type: string
        status:
          type: string
          enum: [SENT, DELIVERED, FAILED, BOUNCED]
        attempts:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NotificationPreferences:
      type: object
      description: Зеркало users.notification_prefs JSONB
      properties:
        email:
          type: boolean
          default: true
        sms:
          type: boolean
          default: true
        promo:
          type: boolean
          default: false
    NotificationWebhookEvent:
      type: object
      required: [status]
      properties:
        providerMessageId:
          type: string
        status:
          type: string
          enum: [DELIVERED, BOUNCED, FAILED]
        signature:
          type: string
        data:
          type: object
          description: Сырой payload провайдера
  responses:
    Problem:
      description: Проблема RFC7807 (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
