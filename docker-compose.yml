# ZooLink MVP — local/production-ish Docker Compose topology (ADR-0009).
# MVP = modular monolith; NO Kubernetes. Only the reverse proxy is public; db/redis/minio
# live on an internal network and are NEVER published to the host/internet.
# Bring up:  cp .env.example .env  &&  docker compose up -d --build
# The one-shot `provision` service auto-applies the canonical schema + seed before api/worker start
# (no manual migration step). A fresh `down -v && up` reprovisions; a plain `up` is a no-op (idempotent).

name: zoolink

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [api]
    # Caddyfile uses {$PUBLIC_DOMAIN} as the site address; without it the block is parsed as a
    # global-options block and Caddy refuses to start. Pass it through from .env.
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]

  # One-shot DB provisioner: applies the canonical database_schema.sql (guarded — only on an empty
  # DB, since that file is a non-idempotent fresh-bootstrap) then runs the idempotent seed. Mirrors
  # the CI sequence (apply schema → seed). Exits 0; api/worker gate on its successful completion so
  # the stack comes up fully provisioned with no manual step. Built from the Dockerfile `build`
  # stage (has ts-node + pg + source); database_schema.sql and migrations/ live OUTSIDE the backend
  # build context, so they are bind-mounted in (read-only). Applied via node-pg, no psql needed.
  provision:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    command: ["npm", "run", "db:provision"]
    env_file: .env
    environment:
      # Reference/lookup data is non-user data and is intended in every env; the seed runner refuses
      # NODE_ENV=production (compose runs prod) unless forced. The runner stays idempotent.
      SEED_FORCE: "true"
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./database_schema.sql:/database_schema.sql:ro
      - ./migrations:/migrations:ro
    networks: [internal]
    restart: "no"

  api:
    build:
      context: ./backend            # NestJS monolith (created during backend dev)
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      provision: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      # MinIO is not required for API readiness (health = PG + Redis). Gate on start only so a
      # storage health blip never blocks the API; media domain revisits MinIO health in Phase 2.
      minio: { condition: service_started }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [edge, internal]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]   # outbox drain, cron, async jobs
    restart: unless-stopped
    env_file: .env
    # The worker shares the API image (whose HEALTHCHECK probes HTTP /health/live) but runs no HTTP
    # server, so the inherited check would always fail. Disable it; liveness = process running.
    healthcheck:
      disable: true
    depends_on:
      provision: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]          # NOT exposed to host — internal only

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [internal]
    # In production prefer Yandex Object Storage / VK / Selectel (ADR-0008); MinIO is the self-host default.

networks:
  edge:        # public-facing (proxy <-> api)
  internal:    # private (api/worker <-> postgres/redis/minio); no host ports

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
