# ZooLink MVP — local/production-ish Docker Compose topology (ADR-0009).
# MVP = modular monolith; NO Kubernetes. Only the reverse proxy is public; db/redis/minio
# live on an internal network and are NEVER published to the host/internet.
# Bring up:  cp .env.example .env  &&  docker compose up -d  &&  (run migrations — see docs/06-operations/deployment-mvp.md)

name: zoolink

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [api]
    # Caddyfile uses {$PUBLIC_DOMAIN} as the site address; without it the block is parsed as a
    # global-options block and Caddy refuses to start. Pass it through from .env.
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]

  api:
    build:
      context: ./backend            # NestJS monolith (created during backend dev)
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      # MinIO is not required for API readiness (health = PG + Redis). Gate on start only so a
      # storage health blip never blocks the API; media domain revisits MinIO health in Phase 2.
      minio: { condition: service_started }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [edge, internal]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/worker.js"]   # outbox drain, cron, async jobs
    restart: unless-stopped
    env_file: .env
    # The worker shares the API image (whose HEALTHCHECK probes HTTP /health/live) but runs no HTTP
    # server, so the inherited check would always fail. Disable it; liveness = process running.
    healthcheck:
      disable: true
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]          # NOT exposed to host — internal only

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [internal]
    # In production prefer Yandex Object Storage / VK / Selectel (ADR-0008); MinIO is the self-host default.

networks:
  edge:        # public-facing (proxy <-> api)
  internal:    # private (api/worker <-> postgres/redis/minio); no host ports

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
