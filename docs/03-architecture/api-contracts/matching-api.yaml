openapi: 3.0.3
info:
  title: ZooLink Matching API
  version: 1.0.0
  description: >
    API for finding compatible mates for breeding purposes in ZooLink.
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth (§2), x-required-roles (§3),
    RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5), LocalizedString (§6),
    rate limiting (§8).
    **MVP scope (spec 05):** matching is a *stateless eligible-set* search — a candidate is eligible
    iff all hard predicates hold (same species, opposite sex, both INTACT, both breeding-visible,
    both active, different owners, within radius). Compatibility scoring, scoreBreakdown, match
    persistence, history and feedback are **Фаза 2+** (marked `x-phase: 2`; null/absent in MVP).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /matching/new-target/{animal_id}:
    get:
      summary: Get targeting animal verification for matching
      operationId: getMatchingTarget
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: animal_id
          required: true
          schema: { type: string, format: uuid }
          description: ID of the animal for which to find matches
        - in: query
          name: includeSuggestions
          schema: { type: boolean, default: false }
          description: Whether to include initial match suggestions
      responses:
        '200':
          description: Animal verification and optional initial matches
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchingTargetResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/find-matches:
    post:
      summary: Find matches for target animal with preferences
      operationId: findMatches
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FindMatchesRequest' }
      responses:
        '200':
          description: List of potential matches with scores and explanations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FindMatchesResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '429': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/{id}:
    get:
      summary: '[Фаза 2] Get specific match details by ID'
      operationId: getMatchById
      x-phase: 2
      description: >-
        **Фаза 2+.** MVP matching is a **stateless eligible-set** search (spec 05 §"Breeding
        eligibility"): there are no persisted `matches`/`match_history`/`match_feedback` records,
        so there is no match `id` to fetch and no compatibility score. This endpoint (and its
        scored response) is computed in Фаза 2; absent in MVP.
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Match ID
      responses:
        '200':
          description: Match details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchDetails' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/history:
    get:
      summary: "[Фаза 2] Get user's past match views/engagements"
      operationId: getMatchingHistory
      x-phase: 2
      description: >-
        **Фаза 2+.** MVP matching is stateless (no `match_history` table per spec 05), so there is
        no engagement history to return. Computed in Фаза 2; absent in MVP.
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Number of items per page
        - in: query
          name: minScore
          schema: { type: integer, minimum: 0, maximum: 100 }
          description: Minimum compatibility score filter
        - in: query
          name: fromDate
          schema: { type: string, format: date }
          description: Start date for filtering (inclusive)
        - in: query
          name: toDate
          schema: { type: string, format: date }
          description: End date for filtering (inclusive)
      responses:
        '200':
          description: Paginated matching history
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchingHistoryResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /matching/{id}/feedback:
    post:
      summary: '[Фаза 2] Submit feedback on match quality'
      operationId: submitMatchFeedback
      x-phase: 2
      description: >-
        **Фаза 2+.** Feedback feeds the compatibility-scoring loop (no `match_feedback` table in
        MVP per spec 05). Computed in Фаза 2; absent in MVP.
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Match ID
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MatchFeedbackRequest' }
      responses:
        '200': { description: Feedback submitted successfully }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    MatchingTargetResponse:
      type: object
      required:
        - animal
        - eligibleForMatching
      properties:
        animal:
          $ref: '#/components/schemas/AnimalSummary'
        eligibleForMatching:
          type: boolean
          description: Whether animal is eligible for matching (active, mating age, etc.)
        ineligibilityReason:
          type: string
          nullable: true
          enum: [SPECIES_MISMATCH, BREED_RULE, NOT_BREEDING_VISIBLE, REPRODUCTIVE_STATUS, SELF, INACTIVE, GEO_OUT_OF_RANGE]
          description: >-
            Stable machine code for ineligibility (null if eligible). Maps to the MVP hard
            predicates in spec 05 §"Breeding eligibility": SPECIES_MISMATCH (same species),
            BREED_RULE (breed-level rule), NOT_BREEDING_VISIBLE
            (is_visible_in_breeding_search=false), REPRODUCTIVE_STATUS (not INTACT),
            SELF (same owner / self-match), INACTIVE (not active), GEO_OUT_OF_RANGE (outside radius).
        species:
          $ref: '#/components/schemas/SpeciesSummary'
        breed:
          $ref: '#/components/schemas/BreedSummary'
        initialMatches:
          type: array
          items: { $ref: '#/components/schemas/MatchSummary' }
          default: []
          description: Initial match suggestions (if requested and available)
    AnimalSummary:
      type: object
      required:
        - id
        - speciesId
        - sex
        - dateOfBirth
        - isActive
      properties:
        id:
          type: string
          format: uuid
          description: Animal ID
        speciesId:
          type: integer
          description: Species reference (INT lookup)
        breedId:
          type: integer
          nullable: true
          description: Breed reference (INT lookup; null if custom/other)
        breedText:
          type: string
          maxLength: 100
          nullable: true
          description: Custom breed text if breedId is null
        nickname:
          type: string
          maxLength: 50
          nullable: true
          description: Animal nickname/display name
        sex:
          type: string
          enum: [Male, Female]
          description: Animal sex
        dateOfBirth:
          type: string
          format: date
          description: Animal date of birth
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Animal color/coat pattern
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: Animal microchip ID
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: Animal tattoo/brand ID (for livestock)
        isActive:
          type: boolean
          description: Animal active status
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Date when current owner acquired the animal
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to mother for pedigree
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to father for pedigree
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Type of health record (vaccination, test, etc.)
              detail:
                type: string
                description: Detail of health record
              date:
                type: string
                format: date
                description: Date of health event
              provider:
                type: string
                description: Provider/veterinary clinic
          description: Animal health records
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Event type (heat_start, mating, etc.)
              date:
                type: string
                format: date
                description: Date of event
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Partner animal ID (if applicable)
          description: Animal reproductive data (for females)
          default: []
        photos:
          type: array
          items:
            type: string
            format: uri
          description: Animal photo URLs
          default: []
    SpeciesSummary:
      type: object
      required:
        - id
        - code
        - nameLocalized
      properties:
        id:
          type: integer
          description: Species ID (INT lookup)
        code:
          type: string
          maxLength: 50
          description: Species code (e.g., 'dog', 'cattle')
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Species name (LocalizedString {en, ru})
    BreedSummary:
      type: object
      required:
        - id
        - code
        - nameLocalized
        - speciesId
      properties:
        id:
          type: integer
          description: Breed ID (INT lookup)
        code:
          type: string
          maxLength: 50
          description: Breed code
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Breed name (LocalizedString {en, ru})
        speciesId:
          type: integer
          description: Reference to species (INT lookup)
    FindMatchesRequest:
      type: object
      required:
        - targetAnimalId
      properties:
        targetAnimalId:
          type: string
          format: uuid
          description: ID of the animal for which to find matches
        maxDistanceKm:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
          description: Maximum distance in kilometers for search
        breedingGoals:
          type: array
          items: { type: string }
          description: Specific breeding goals to prioritize (e.g., ['milk_production', 'temperament'])
        minScore:
          type: integer
          minimum: 0
          maximum: 100
          default: 60
          x-phase: 2
          description: >-
            Minimum compatibility score threshold (0-100). **Фаза 2+ filter; ignored in MVP**
            (eligible-set search is unscored — spec 05).
        maxResults:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          description: Maximum number of results to return
        excludePreviouslyMatched:
          type: boolean
          default: true
          description: Exclude animals user has previously matched with
        includeDetails:
          type: boolean
          default: false
          description: Include full animal details in results (for performance, default false)
    FindMatchesResponse:
      type: object
      required:
        - matches
        - searchParameters
      properties:
        matches:
          type: array
          items: { $ref: '#/components/schemas/MatchSummary' }
          description: >-
            MVP: the **eligible set** (animals passing the spec 05 hard predicates), unranked.
            **Фаза 2+:** sorted by compatibility score.
        searchParameters:
          $ref: '#/components/schemas/SearchParametersUsed'
        totalFound:
          type: integer
          description: Total number of matches found (before pagination/limits)
        searchDurationMs:
          type: integer
          description: Time taken to compute matches in milliseconds
    SearchParametersUsed:
      type: object
      properties:
        targetAnimalId:
          type: string
          format: uuid
        maxDistanceKm:
          type: integer
        breedingGoals:
          type: array
          items: { type: string }
        minScore:
          type: integer
        maxResults:
          type: integer
        excludePreviouslyMatched:
          type: boolean
    MatchSummary:
      type: object
      required:
        - id
        - targetAnimalId
        - candidateAnimalId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Match instance ID
        targetAnimalId:
          type: string
          format: uuid
          description: Target animal ID
        candidateAnimalId:
          type: string
          format: uuid
          description: Candidate animal ID
        compatibilityScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          x-phase: 2
          description: >-
            Overall compatibility score (0-100). **Computed in Фаза 2; null/absent in MVP** —
            MVP returns an eligible set (hard predicates of spec 05), not a ranking.
        scoreBreakdown:
          allOf: [ { $ref: '#/components/schemas/ScoreBreakdown' } ]
          nullable: true
          x-phase: 2
          description: Detailed score breakdown by factor category. **Computed in Фаза 2; null/absent in MVP.**
        matchReasons:
          type: array
          items: { type: string }
          maxItems: 5
          description: Top positive factors contributing to match
        matchConcerns:
          type: array
          items: { type: string }
          maxItems: 3
          description: Potential concerns or negative factors
        candidateSummary:
          allOf: [ { $ref: '#/components/schemas/AnimalSummary' } ]
          description: Summary of candidate animal (always included)
        targetSummary:
          type: string
          format: uuid
          description: Reference to target animal (to avoid duplication)
        createdAt:
          type: string
          format: date-time
          description: When match was generated
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: When match becomes stale (default 7 days from creation)
    ScoreBreakdown:
      type: object
      x-phase: 2
      description: >-
        **Фаза 2+ ranking artifact.** All sub-scores are computed in Фаза 2; the whole object is
        null/absent in MVP (eligible-set search has no scoring). See spec 05.
      properties:
        geneticScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Genetic compatibility sub-score (0-100)
        healthScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Health compatibility sub-score (0-100)
        reproductiveScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Reproductive timing sub-score (0-100)
        productionScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Production/conformation sub-score (0-100)
        logisticsScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Location/logistics sub-score (0-100)
        weightsApplied:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
          description: Weight applied to each factor category (sums to 1.0)
    MatchDetails:
      type: object
      required:
        - id
        - targetAnimalId
        - candidateAnimalId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Match instance ID
        targetAnimalId:
          type: string
          format: uuid
          description: Target animal ID
        candidateAnimalId:
          type: string
          format: uuid
          description: Candidate animal ID
        compatibilityScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          x-phase: 2
          description: >-
            Overall compatibility score (0-100). **Computed in Фаза 2; null/absent in MVP** —
            MVP returns an eligible set (hard predicates of spec 05), not a ranking.
        scoreBreakdown:
          allOf: [ { $ref: '#/components/schemas/ScoreBreakdown' } ]
          nullable: true
          x-phase: 2
          description: Detailed score breakdown by factor category. **Computed in Фаза 2; null/absent in MVP.**
        matchReasons:
          type: array
          items: { type: string }
          maxItems: 10
          description: All positive factors contributing to match
        matchConcerns:
          type: array
          items: { type: string }
          maxItems: 10
          description: All potential concerns or negative factors
        targetAnimal:
          allOf: [ { $ref: '#/components/schemas/AnimalSummary' } ]
          description: Full target animal details
        candidateAnimal:
          allOf: [ { $ref: '#/components/schemas/AnimalSummary' } ]
          description: Full candidate animal details
        targetListings:
          type: array
          items: { $ref: '#/components/schemas/ListingReference' }
          description: Active MATING/STUD_SERVICE listings for target animal
          default: []
        candidateListings:
          type: array
          items: { $ref: '#/components/schemas/ListingReference' }
          description: Active MATING/STUD_SERVICE listings for candidate animal
          default: []
        createdAt:
          type: string
          format: date-time
          description: When match was generated
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: When match becomes stale (default 7 days from creation)
        metadata:
          type: object
          description: Species-specific or experimental data
          additionalProperties: true
    ListingReference:
      type: object
      required:
        - id
        - listingType
        - titleLocalized
        - priceCents
      properties:
        id:
          type: string
          format: uuid
          description: Listing ID
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Type of listing
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing title (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Price in minor units (null for non-price listings)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Currency code (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Quantity
        isActive:
          type: boolean
          description: Listing active status
        createdAt:
          type: string
          format: date-time
          description: Listing creation timestamp
    MatchingHistoryResponse:
      type: object
      required:
        - items
        - meta
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/HistoryEntry' }
          description: Array of matching history entries
        meta:
          $ref: '#/components/schemas/PageMeta'
    HistoryEntry:
      type: object
      required:
        - id
        - targetAnimalId
        - candidateAnimalId
        - compatibilityScore
        - actionType
        - timestamp
      properties:
        id:
          type: string
          format: uuid
          description: History entry ID
        targetAnimalId:
          type: string
          format: uuid
          description: Target animal ID
        candidateAnimalId:
          type: string
          format: uuid
          description: Candidate animal ID
        compatibilityScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          description: Compatibility score for this match (if applicable)
        actionType:
          type: string
          enum: [viewed, engaged, contacted, feedback]
          description: Type of user action with this match
        timestamp:
          type: string
          format: date-time
          description: When the action occurred
        userNotes:
          type: string
          maxLength: 500
          nullable: true
          description: User notes or feedback (if actionType is 'feedback')
        matchId:
          type: string
          format: uuid
          nullable: true
          description: Reference to match record (if applicable)
    MatchFeedbackRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: User rating of match quality (1-5 stars)
        isUseful:
          type: boolean
          description: Whether user found the match useful
        feedbackText:
          type: string
          maxLength: 1000
          nullable: true
          description: Detailed feedback on why match was useful/not useful
        wouldRecommend:
          type: boolean
          nullable: true
          description: Whether user would recommend this match to others
        tags:
          type: array
          items: { type: string }
          maxItems: 10
          description: Tags for categorizing feedback (e.g., ['accurate_genetics', 'poor_location'])
  responses:
    Problem:
      description: RFC7807 problem (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
