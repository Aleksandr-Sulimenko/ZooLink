openapi: 3.0.3
info:
  title: ZooLink Organization API
  version: 1.0.0
  description: API for managing organizations, branches, and organization-user affiliations in ZooLink.
servers:
  - url: /api/v1
    description: ZooLink API v1
paths:
  /organizations:
    get:
      summary: List organizations
      operationId: listOrganizations
      parameters:
        - in: query
          name: name
          schema:
            type: string
          description: Filter by organization name (case-insensitive, partial match)
        - in: query
          name: is_active
          schema:
            type: boolean
          description: Filter by active status
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'
                  total:
                    type: integer
                    description: Total number of organizations
                  page:
                    type: integer
                    description: Current page number
                  limit:
                    type: integer
                    description: Items per page
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Create a new organization
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreate'
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: Bad request (validation error)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
  /organizations/{id}:
    get:
      summary: Get organization by ID
      operationId: getOrganizationById
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          description: Organization not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    patch:
      summary: Update organization
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdate'
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: Bad request (validation error)
        '404':
          description: Organization not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
    delete:
      summary: Delete organization (soft delete)
      operationId: deleteOrganization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Organization deleted successfully
        '404':
          description: Organization not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
  /organizations/{id}/branches:
    get:
      summary: List branches for an organization
      operationId: listOrganizationBranches
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Organization ID
        - in: query
          name: is_headquarters
          schema:
            type: boolean
          description: Filter by headquarters flag
        - in: query
          name: is_active
          schema:
            type: boolean
          description: Filter by active status
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of branches
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Branch'
                  total:
                    type: integer
                    description: Total number of branches
                  page:
                    type: integer
                    description: Current page number
                  limit:
                    type: integer
                    description: Items per page
        '404':
          description: Organization not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Create a new branch under an organization
      operationId: createBranch
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: Organization ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchCreate'
      responses:
        '201':
          description: Branch created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Branch'
        '400':
          description: Bad request (validation error)
        '404':
          description: Organization not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
  /organizations/{orgId}/users:
    get:
      summary: List users affiliated with an organization
      operationId: listOrganizationUsers
      parameters:
        - in: path
          name: orgId
          required: true
          schema:
            type: string
            format: uuid
          description: Organization ID
        - in: query
          name: role
          schema:
            type: string
            enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Filter by role in organization
        - in: query
          name: is_primary
          schema:
            type: boolean
          description: Filter by primary affiliation flag
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of organization users
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrganizationUser'
                  total:
                    type: integer
                    description: Total number of organization users
                  page:
                    type: integer
                    description: Current page number
                  limit:
                    type: integer
                    description: Items per page
        '404':
          description: Organization not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      summary: Affiliate a user with an organization
      operationId: createOrganizationUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orgId
          required: true
          schema:
            type: string
            format: uuid
          description: Organization ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUserCreate'
      responses:
        '201':
          description: Organization-user affiliation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationUser'
        '400':
          description: Bad request (validation error)
        '404':
          description: Organization not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
  /organization-users/{id}:
    get:
      summary: Get organization-user affiliation by ID
      operationId: getOrganizationUserById
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organization-user affiliation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationUser'
        '404':
          description: Organization-user affiliation not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    patch:
      summary: Update organization-user affiliation
      operationId: updateOrganizationUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUserUpdate'
      responses:
        '200':
          description: Organization-user affiliation updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationUser'
        '400':
          description: Bad request (validation error)
        '404':
          description: Organization-user affiliation not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
    delete:
      summary: Remove organization-user affiliation
      operationId: deleteOrganizationUser
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Organization-user affiliation removed successfully
        '404':
          description: Organization-user affiliation not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (insufficient permissions)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Organization:
      type: object
      required:
        - id
        - address
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        name_localized:
          type: object
          description: Localized names (e.g., {"en": "Name", "ru": "Название"})
          additionalProperties:
            type: string
            maxLength: 200
        description_localized:
          type: object
          description: Localized description (e.g., {"en": "Description", "ru": "Описание"})
          additionalProperties:
            type: string
        inn:
          type: string
          maxLength: 20
          description: Taxpayer Identification Number (optional)
        kpp:
          type: string
          maxLength: 20
          description: Tax registration reason code (optional)
        address:
          type: string
          description: Headquarters address
        phone:
          type: string
          maxLength: 30
          description: Contact phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Contact email (optional)
        logo_url:
          type: string
          format: uri
          description: URL to organization logo (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (subscription tier, branding preferences, etc.)
          default: {}
        is_active:
          type: boolean
          description: Active status
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    OrganizationCreate:
      type: object
      required:
        - address
      properties:
        name_localized:
          type: object
          description: Localized names (e.g., {"en": "Name", "ru": "Название"})
          additionalProperties:
            type: string
            maxLength: 200
        description_localized:
          type: object
          description: Localized description (e.g., {"en": "Description", "ru": "Описание"})
          additionalProperties:
            type: string
        inn:
          type: string
          maxLength: 20
          description: Taxpayer Identification Number (optional)
        kpp:
          type: string
          maxLength: 20
          description: Tax registration reason code (optional)
        address:
          type: string
          description: Headquarters address
        phone:
          type: string
          maxLength: 30
          description: Contact phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Contact email (optional)
        logo_url:
          type: string
          format: uri
          description: URL to organization logo (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (subscription tier, branding preferences, etc.)
          default: {}
        is_active:
          type: boolean
          description: Active status
          default: true
    OrganizationUpdate:
      type: object
      properties:
        name_ru:
          type: string
          maxLength: 200
          description: Russian name of the organization
        name_en:
          type: string
          maxLength: 200
          description: English name of the organization (optional)
        inn:
          type: string
          maxLength: 20
          description: Taxpayer Identification Number (optional)
        kpp:
          type: string
          maxLength: 20
          description: Tax registration reason code (optional)
        address:
          type: string
          description: Headquarters address
        phone:
          type: string
          maxLength: 30
          description: Contact phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Contact email (optional)
        logo_url:
          type: string
          format: uri
          description: URL to organization logo (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (subscription tier, branding preferences, etc.)
        is_active:
          type: boolean
          description: Active status
    Branch:
      type: object
      required:
        - id
        - organization_id
        - city_id
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        organization_id:
          type: string
          format: uuid
          description: Foreign key to organization
        city_id:
          type: integer
          description: Foreign key to city for geo-search
        address_localized:
          type: object
          description: Localized address (e.g., {"en": "Address", "ru": "Адрес"})
          additionalProperties:
            type: string
        phone:
          type: string
          maxLength: 30
          description: Branch phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Branch email (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (branch-specific attributes)
          default: {}
        is_headquarters:
          type: boolean
          description: Flag indicating headquarters
          default: false
        is_active:
          type: boolean
          description: Active status
          default: true
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    BranchCreate:
      type: object
      required:
        - organization_id
        - city_id
      properties:
        organization_id:
          type: string
          format: uuid
          description: Foreign key to organization
        city_id:
          type: integer
          description: Foreign key to city for geo-search
        address_localized:
          type: object
          description: Localized address (e.g., {"en": "Address", "ru": "Адрес"})
          additionalProperties:
            type: string
        phone:
          type: string
          maxLength: 30
          description: Branch phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Branch email (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (branch-specific attributes)
          default: {}
        is_headquarters:
          type: boolean
          description: Flag indicating headquarters
          default: false
        is_active:
          type: boolean
          description: Active status
          default: true
    OrganizationUser:
      type: object
      required:
        - id
        - organization_id
        - user_id
        - role_in_org
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        organization_id:
          type: string
          format: uuid
          description: Foreign key to organization
        user_id:
          type: string
          format: uuid
          description: Foreign key to user
        role_in_org:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Role in organization
        is_primary:
          type: boolean
          description: Flag indicating primary organization for notifications
          default: false
        joined_at:
          type: string
          format: date
          description: Date when user joined the organization
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
    OrganizationUserCreate:
      type: object
      required:
        - organization_id
        - user_id
        - role_in_org
        - joined_at
      properties:
        organization_id:
          type: string
          format: uuid
          description: Foreign key to organization
        user_id:
          type: string
          format: uuid
          description: Foreign key to user
        role_in_org:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Role in organization
        is_primary:
          type: boolean
          description: Flag indicating primary organization for notifications
          default: false
        joined_at:
          type: string
          format: date
          description: Date when user joined the organization
    OrganizationUserUpdate:
      type: object
      properties:
        role_in_org:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Role in organization
        is_primary:
          type: boolean
          description: Flag indicating primary organization for notifications
        joined_at:
          type: string
          format: date
          description: Date when user joined the organization