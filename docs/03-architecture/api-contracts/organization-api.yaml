openapi: 3.0.3
info:
  title: ZooLink Organization API
  version: 1.0.0
  description: >
    API for managing organizations, branches, and organization-user affiliations in ZooLink.
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth (§2), x-required-roles (§3),
    RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5), LocalizedString (§6),
    If-Match/ETag on mutating PATCH (§10).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /organizations:
    get:
      summary: List organizations
      operationId: listOrganizations
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: name
          schema: { type: string }
          description: Filter by organization name (case-insensitive, partial match)
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Filter by active status
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Organization' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Create a new organization
      operationId: createOrganization
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationCreate' }
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organizations/{id}:
    get:
      summary: Get organization by ID
      operationId: getOrganizationById
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Organization details
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update organization
      operationId: updateOrganization
      description: Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior GET.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior GET /organizations/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationUpdate' }
      responses:
        '200':
          description: Organization updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Delete organization (soft delete)
      operationId: deleteOrganization
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Organization deleted successfully }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organizations/{id}/branches:
    get:
      summary: List branches for an organization
      operationId: listOrganizationBranches
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Organization ID
        - in: query
          name: is_headquarters
          schema: { type: boolean }
          description: Filter by headquarters flag
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Filter by active status
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of branches
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Branch' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Create a new branch under an organization
      operationId: createBranch
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Organization ID
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BranchCreate' }
      responses:
        '201':
          description: Branch created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Branch' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organizations/{orgId}/users:
    get:
      summary: List users affiliated with an organization
      operationId: listOrganizationUsers
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string, format: uuid }
          description: Organization ID
        - in: query
          name: role
          schema: { type: string, enum: [OWNER, ADMIN, STAFF, VET, MODERATOR] }
          description: Filter by role in organization
        - in: query
          name: is_primary
          schema: { type: boolean }
          description: Filter by primary affiliation flag
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of organization users
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/OrganizationUser' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Affiliate a user with an organization
      operationId: createOrganizationUser
      x-required-roles: [OWNER, ADMIN]
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string, format: uuid }
          description: Organization ID
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationUserCreate' }
      responses:
        '201':
          description: Organization-user affiliation created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationUser' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /organization-users/{id}:
    get:
      summary: Get organization-user affiliation by ID
      operationId: getOrganizationUserById
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Organization-user affiliation details
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationUser' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update organization-user affiliation
      operationId: updateOrganizationUser
      description: Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior GET.
      x-required-roles: [OWNER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior GET /organization-users/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationUserUpdate' }
      responses:
        '200':
          description: Organization-user affiliation updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrganizationUser' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Remove organization-user affiliation
      operationId: deleteOrganizationUser
      x-required-roles: [OWNER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Organization-user affiliation removed successfully }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    Organization:
      type: object
      required:
        - id
        - address
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized organization name (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized description (LocalizedString {en, ru})
        inn:
          type: string
          maxLength: 20
          description: Taxpayer Identification Number (optional)
        kpp:
          type: string
          maxLength: 20
          description: Tax registration reason code (optional)
        address:
          type: string
          description: Headquarters address
        phone:
          type: string
          maxLength: 30
          description: Contact phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Contact email (optional)
        logoUrl:
          type: string
          format: uri
          description: URL to organization logo (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (subscription tier, branding preferences, etc.)
          default: {}
        isActive:
          type: boolean
          description: Active status
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    OrganizationCreate:
      type: object
      required:
        - address
      properties:
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized organization name (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized description (LocalizedString {en, ru})
        inn:
          type: string
          maxLength: 20
          description: Taxpayer Identification Number (optional)
        kpp:
          type: string
          maxLength: 20
          description: Tax registration reason code (optional)
        address:
          type: string
          description: Headquarters address
        phone:
          type: string
          maxLength: 30
          description: Contact phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Contact email (optional)
        logoUrl:
          type: string
          format: uri
          description: URL to organization logo (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (subscription tier, branding preferences, etc.)
          default: {}
        isActive:
          type: boolean
          description: Active status
          default: true
    OrganizationUpdate:
      type: object
      properties:
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized organization name (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized description (LocalizedString {en, ru})
        inn:
          type: string
          maxLength: 20
          description: Taxpayer Identification Number (optional)
        kpp:
          type: string
          maxLength: 20
          description: Tax registration reason code (optional)
        address:
          type: string
          description: Headquarters address
        phone:
          type: string
          maxLength: 30
          description: Contact phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Contact email (optional)
        logoUrl:
          type: string
          format: uri
          description: URL to organization logo (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (subscription tier, branding preferences, etc.)
        isActive:
          type: boolean
          description: Active status
    Branch:
      type: object
      required:
        - id
        - organizationId
        - cityId
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        organizationId:
          type: string
          format: uuid
          description: Foreign key to organization
        cityId:
          type: integer
          description: Foreign key to city for geo-search
        addressLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized address (LocalizedString {en, ru})
        phone:
          type: string
          maxLength: 30
          description: Branch phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Branch email (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (branch-specific attributes)
          default: {}
        isHeadquarters:
          type: boolean
          description: Flag indicating headquarters
          default: false
        isActive:
          type: boolean
          description: Active status
          default: true
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    BranchCreate:
      type: object
      required:
        - organizationId
        - cityId
      properties:
        organizationId:
          type: string
          format: uuid
          description: Foreign key to organization
        cityId:
          type: integer
          description: Foreign key to city for geo-search
        addressLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Localized address (LocalizedString {en, ru})
        phone:
          type: string
          maxLength: 30
          description: Branch phone (optional)
        email:
          type: string
          maxLength: 255
          format: email
          description: Branch email (optional)
        metadata:
          type: object
          description: JSONB field for extensibility (branch-specific attributes)
          default: {}
        isHeadquarters:
          type: boolean
          description: Flag indicating headquarters
          default: false
        isActive:
          type: boolean
          description: Active status
          default: true
    OrganizationUser:
      type: object
      required:
        - id
        - organizationId
        - userId
        - roleInOrg
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        organizationId:
          type: string
          format: uuid
          description: Foreign key to organization
        userId:
          type: string
          format: uuid
          description: Foreign key to user
        roleInOrg:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Role in organization (organization-scoped enum, separate from platform roles)
        isPrimary:
          type: boolean
          description: Flag indicating primary organization for notifications
          default: false
        joinedAt:
          type: string
          format: date
          description: Date when user joined the organization
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    OrganizationUserCreate:
      type: object
      required:
        - organizationId
        - userId
        - roleInOrg
        - joinedAt
      properties:
        organizationId:
          type: string
          format: uuid
          description: Foreign key to organization
        userId:
          type: string
          format: uuid
          description: Foreign key to user
        roleInOrg:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Role in organization (organization-scoped enum, separate from platform roles)
        isPrimary:
          type: boolean
          description: Flag indicating primary organization for notifications
          default: false
        joinedAt:
          type: string
          format: date
          description: Date when user joined the organization
    OrganizationUserUpdate:
      type: object
      properties:
        roleInOrg:
          type: string
          enum: [OWNER, ADMIN, STAFF, VET, MODERATOR]
          description: Role in organization (organization-scoped enum, separate from platform roles)
        isPrimary:
          type: boolean
          description: Flag indicating primary organization for notifications
        joinedAt:
          type: string
          format: date
          description: Date when user joined the organization
  responses:
    Problem:
      description: RFC7807 problem (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
