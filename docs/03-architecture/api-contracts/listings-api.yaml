openapi: 3.0.3
info:
  title: ZooLink Listings API
  version: 1.0.0
  description: >
    API for managing listings (sale, breeding, show, adoption) in ZooLink.
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth with public opt-out (§2),
    x-required-roles (§3), RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5),
    LocalizedString (§6), minor-unit money (§7), If-Match/ETag on mutating PATCH (§10).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /listings:
    get:
      summary: List & search listings (filter + geo + market)
      operationId: listListings
      description: >
        Public list/search over **ACTIVE** listings (anonymous reads opt out of auth). Slice 2
        adds discovery: market filter (ADR-0002 hard split), geo radius search (Haversine +
        bbox prefilter per `specs/07-geo-search-service.md`), species/breed filters, and a
        whitelisted sort. Filter/sort query params stay **snake_case** (§12).

        **`market` — conditional-required (ADR-0002 no-leak, see D2 note).** `market` is
        **required** on the public/discovery path: any anonymous read, AND any request that
        supplies geo params (`lat`/`lng`/`radius_km`). It MAY be omitted only for an
        **authenticated owner-scoped** read whose results are already constrained to the actor's
        own/org listings (server-side `listScope`). When required and absent → **422
        `MARKET_REQUIRED`**. The market filter is applied via the join
        `listings.animal_id → animals.species_id → species.market` and is **AND-intersected** —
        it can only narrow, never widen — so **no response ever mixes markets** even with a
        crafted `species_id`/`animal_id`/`organization_id`. *(OpenAPI cannot express this
        conditional-required statically; it is a service-enforced invariant — see L2-1 in
        `listing_state_machine.md`. The param is declared non-required here so authenticated
        owner-scoped reads stay valid.)*

        **Geo set (`lat`,`lng`,`radius_km`) is all-or-none.** Supplying some-but-not-all →
        **422 `GEO_PARAMS_INCOMPLETE`**. `radius_km` outside **1–100** → **422
        `RADIUS_OUT_OF_RANGE`**. Listings with NULL `lat`/`lng` are excluded from geo results
        (no centroid fallback). `listings.search_radius_m` is **never** consulted as the search
        radius (geo-spec §153). The antimeridian (±180° lng, RF Chukotka/Kamchatka) bbox is
        split per geo-spec; near-pole `Δlng` is clamped.

        **Sort whitelist:** `created_at`, `price`, `distance`, each `:asc|:desc`. `distance` is
        valid **only** when `lat`/`lng` are present (else **400**). Unknown sort field/direction
        → **400**. Default sort: with geo → `distance:asc` (tie-break `created_at:desc, id:asc`,
        geo-spec §143); without geo → `created_at:desc`.
      security: []
      parameters:
        - in: query
          name: animal_id
          schema: { type: string, format: uuid }
          description: Filter by animal ID
        - in: query
          name: seller_id
          schema: { type: string, format: uuid }
          description: Filter by seller ID
        - in: query
          name: organization_id
          schema: { type: string, format: uuid }
          description: Filter by organization ID (for organizational listings)
        - in: query
          name: branch_id
          schema: { type: string, format: uuid }
          description: Filter by branch ID
        - in: query
          name: market
          schema: { type: string, enum: [pet, livestock] }
          description: >
            Market filter (ADR-0002 hard split). Conditional-required (see op description):
            required on the public/discovery path and whenever geo params are present; optional
            on authenticated owner-scoped reads. Applied via the species join, AND-intersected —
            results never mix markets.
        - in: query
          name: species_id
          schema: { type: integer }
          description: Filter by species (INT lookup; AND-intersected with `market`)
        - in: query
          name: breed_id
          schema: { type: integer }
          description: Filter by breed (INT lookup)
        - in: query
          name: lat
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
          description: Search-center latitude (WGS84). Part of the all-or-none geo set with `lng`+`radius_km`.
        - in: query
          name: lng
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
          description: Search-center longitude (WGS84). Part of the all-or-none geo set with `lat`+`radius_km`.
        - in: query
          name: radius_km
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Search radius in km (1–100; geo-spec §152). Part of the all-or-none geo set. NOT `listings.search_radius_m`.
        - in: query
          name: listing_type
          schema: { type: string, enum: [sale, breeding, show, adoption, stud_service, leasing] }
          description: Filter by listing type (`leasing` is form-only, behaviour Phase 2 — migration 0021)
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Filter by active status
        - in: query
          name: price_min
          schema: { type: integer }
          description: Minimum price in minor units
        - in: query
          name: price_max
          schema: { type: integer }
          description: Maximum price in minor units
        - in: query
          name: currency
          schema: { type: string, minLength: 3, maxLength: 3, pattern: '^[A-Z]{3}$' }
          description: Currency code (ISO 4217, e.g., RUB, USD)
        - in: query
          name: sort
          schema: { type: string, example: 'distance:asc' }
          description: >
            Sort `<field>:<asc|desc>` (§12), whitelist `created_at`|`price`|`distance`.
            `distance` requires `lat`/`lng` (else 400); unknown field/direction → 400. Default:
            geo→`distance:asc`, else `created_at:desc`.
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Listing' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }   # unknown/invalid sort; sort=distance without coords
        '422': { $ref: '#/components/responses/Problem' }   # MARKET_REQUIRED / GEO_PARAMS_INCOMPLETE / RADIUS_OUT_OF_RANGE
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Create a new listing (DRAFT)
      operationId: createListing
      description: >
        Creates a listing in DRAFT. The **seller is derived from the authenticated actor**
        server-side (`seller_id := actor`); a body `sellerId` is **rejected (400, unknown field)**
        — the unknown-field whitelist rejects it rather than silently ignoring (D2, IDOR class —
        consistent with every other module). The actor MUST own the referenced animal (its `owner_id`,
        or an org-admin of its `organization_id`) → else 403. Personal vs organizational ownership
        must satisfy `chk_listing_ownership` (personal: organizationId+branchId both null; org:
        organizationId set, branchId optional) → violation 422. The market is **derived** from the
        animal's species (ADR-0002), never client-set. `status`/`moderationStatus` are **not**
        writable — lifecycle moves only via actions (POST /submit). MODERATOR is **R-only** on
        listings (rbac-matrix §64/§99) → excluded from create.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11, 24h window)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingCreate' }
      responses:
        '201':
          description: Listing created successfully (DRAFT)
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator of the new listing (send as If-Match on update/submit, §10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }   # actor does not own the animal
        '404': { $ref: '#/components/responses/Problem' }   # animal not found
        '422': { $ref: '#/components/responses/Problem' }   # chk_listing_ownership / value CHECK violation / Idempotency-Key reuse w/ different body
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}:
    get:
      summary: Get listing by ID
      operationId: getListingById
      description: Public for active listings (security opt-out). Sends a weak ETag for conditional reads (§13).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Listing details
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update listing
      operationId: updateListing
      description: >
        Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior GET.
        Object-level rule: mutable only by the listing's seller (`seller_id == actor`) or an
        org-admin of its organization (rbac-matrix §99) → else 403. `status`/`moderationStatus`/
        `sellerId` are **not** writable here (lifecycle moves via actions; seller is derived).
        MODERATOR is R-only on listings → excluded.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior GET /listings/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingUpdate' }
      responses:
        '200':
          description: Listing updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Withdraw a listing (soft-delete → DEACTIVATED)
      operationId: deleteListing
      description: >
        **Soft-withdraw** (never a hard delete). Transitions the listing to **DEACTIVATED**
        (`is_active=false`), retaining its history/audit. This is the single owner-driven
        withdraw path (no separate `/withdraw` endpoint). Permitted from owner-controllable
        states (DRAFT, PENDING_MODERATION, and ACTIVE — owner withdraws; ACTIVE→DEACTIVATED per
        the state machine); a no-op-or-409 on an already-terminal DEACTIVATED/SOLD/EXPIRED state
        (guard-based 409, §10 — this is a state-transition action). Object-level rule: seller or
        org-admin only (rbac-matrix §99); MODERATOR-driven removal is a separate operator path
        (Admin Slice 4), excluded here. The transition is audit/principal-stamped.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Listing withdrawn (now DEACTIVATED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }   # not the seller / org-admin
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }   # already terminal (SOLD/DEACTIVATED/EXPIRED)
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/submit:
    post:
      summary: Submit a DRAFT listing for moderation (DRAFT → PENDING_MODERATION)
      operationId: submitListing
      description: >
        Owner submits (or resubmits after CHANGES_REQUESTED) a DRAFT listing for moderation
        (D1). Transitions DRAFT → PENDING_MODERATION and sets `moderationStatus='PENDING'`.
        **Guard (state machine):** all required fields valid AND **≥1 photo** AND (price ≥
        MIN_LISTING_PRICE **only if** `listingType='sale'`). This is a state-transition action,
        not a body mutation — `status` is never client-set. **P0 invariant:** this path does NOT
        and CANNOT set ACTIVE — only a moderator approval (Admin Slice 4) moves
        PENDING_MODERATION → ACTIVE (`trg_listing_active_requires_approval`). Object-level rule:
        seller or org-admin only; MODERATOR excluded (R-only). Idempotent under Idempotency-Key;
        If-Match guards against acting on a stale view.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (§11)
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior GET /listings/{id} (§10)
      responses:
        '200':
          description: Listing submitted (now PENDING_MODERATION)
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after the transition
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Listing' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }   # not the seller / org-admin
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }   # not in DRAFT (LISTING_NOT_DRAFT)
        '412': { $ref: '#/components/responses/Problem' }   # STALE_RESOURCE (If-Match mismatch)
        '422': { $ref: '#/components/responses/Problem' }   # submit guard failed (no photo / price<min for sale / required fields)
        '428': { $ref: '#/components/responses/Problem' }   # If-Match missing
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/photos:
    get:
      summary: Get photos for a listing
      operationId: getListingPhotos
      description: Public for active listings (security opt-out).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Listing photos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ListingPhoto' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Add a photo to a listing
      operationId: createListingPhoto
      description: >
        Adds a photo to a listing the actor owns (seller or org-admin → else 403). MODERATOR is
        R-only on listings → excluded. `MAX_MEDIA_ITEMS=10` per listing → 422 on overflow.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Listing ID
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingPhotoCreate' }
      responses:
        '201':
          description: Photo added successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingPhoto' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/photos/{photoId}:
    delete:
      summary: Remove a photo from a listing
      operationId: deleteListingPhoto
      description: Seller or org-admin only (→ else 403); MODERATOR R-only on listings, excluded.
      x-required-roles: [USER, BREEDER, FARMER, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Listing ID
        - in: path
          name: photoId
          required: true
          schema: { type: string, format: uuid }
          description: Photo ID
      responses:
        '204': { description: Photo removed successfully }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/analytics:
    get:
      summary: Get analytics for a listing (seller-owned)
      operationId: getListingAnalytics
      description: >
        Seller-facing analytics for one listing (BR pet-marketplace §5 "Views: 15, Contacts shown: 3").
        Access is owner-scoped: the listing's seller, OR an org-admin of the listing's organization
        (object-level ownership enforced at the service layer per rbac-matrix.md). Counts-snapshot now;
        series-ready (§16) — the optional `series` time-series is x-phase:2 and absent/empty in MVP.
        Public read conventions apply (weak ETag + Cache-Control, §13).
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Listing ID
      responses:
        '200':
          description: Listing analytics snapshot
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator for conditional reads (§13)
            Cache-Control:
              schema: { type: string }
              description: Caching directive for the analytics snapshot (§13)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingAnalytics' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /listings/{id}/conversations:
    get:
      summary: Get conversations for a listing
      operationId: getListingConversations
      deprecated: true
      description: >
        DEPRECATED — chat is Phase 2+ and out of MVP (ADR-0005). Server sends Deprecation + Sunset headers
        (API_CONVENTIONS §9/§14).
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Conversations for the listing
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Conversation' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    Listing:
      type: object
      required:
        - id
        - animalId
        - sellerId
        - listingType
        - titleLocalized
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        animalId:
          type: string
          format: uuid
          description: Foreign key to animal
        sellerId:
          type: string
          format: uuid
          description: Foreign key to user (seller)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to organization (nullable for personal listings)
        branchId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to branch (nullable for personal listings or when not specified)
        metadata:
          type: object
          description: JSONB field for extensibility (social media links, video URL placeholder, etc.)
          default: {}
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service, leasing]
          description: Type of listing (`leasing` form-only, behaviour Phase 2 — migration 0021)
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing title (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing description (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Price in minor units (nullable for non-price listings e.g., breeding)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Currency code (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Quantity (number of items/animals)
        isActive:
          type: boolean
          description: Active status (legacy boolean; lifecycle is tracked by `status`)
        status:
          type: string
          enum: [DRAFT, PENDING_MODERATION, ACTIVE, EXPIRED, SOLD, DEACTIVATED]
          default: DRAFT
          readOnly: true
          description: >
            Lifecycle state (see specs/statemachines/listing_state_machine.md). **Read-only** —
            server-set; moves only via actions (create→DRAFT, /submit→PENDING_MODERATION,
            moderator approve→ACTIVE, DELETE→DEACTIVATED). Only ACTIVE listings appear in public
            search. **P0 invariant:** ACTIVE requires `moderationStatus=APPROVED`
            (`trg_listing_active_requires_approval`); no Slice-1 path sets ACTIVE.
        moderationStatus:
          type: string
          enum: [PENDING, APPROVED, REJECTED, CHANGES_REQUESTED]
          default: PENDING
          readOnly: true
          description: Moderation review outcome (separate field from lifecycle `status`). **Read-only** — moderator-set (Admin Slice 4).
        publishedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when `status` transitions to ACTIVE
        soldAt:
          type: string
          format: date-time
          nullable: true
          description: Set when `status` transitions to SOLD
        transactionId:
          type: string
          format: uuid
          nullable: true
          description: FK to payment_transactions (set on sale)
        lat:
          type: number
          format: double
          nullable: true
          description: Latitude (MVP-primary geo storage; -90..90)
        lng:
          type: number
          format: double
          nullable: true
          description: Longitude (MVP-primary geo storage; -180..180)
        distanceM:
          type: integer
          nullable: true
          readOnly: true
          description: >
            Distance in **meters** from the search center to this listing (Haversine, rounded).
            Populated **only** when the request supplied `lat`/`lng` (a geo search); null
            otherwise. Lets a `sort=distance` client render the distance. Computed, not stored.
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiration date/time for the listing
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    ListingCreate:
      type: object
      description: >
        Create-listing body. **`sellerId` is NOT accepted** — the seller is derived from the
        authenticated actor server-side (D2, IDOR class); a body `sellerId` is **rejected (400,
        unknown field)** by the unknown-field whitelist (not silently ignored). `status`/
        `moderationStatus` are not writable — a new listing is always DRAFT; lifecycle moves only
        via actions (POST /submit). `market` is derived from the animal's species (ADR-0002), not
        client-set.
      required:
        - animalId
        - listingType
        - titleLocalized
      properties:
        animalId:
          type: string
          format: uuid
          description: Foreign key to animal
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to organization (nullable for personal listings)
        branchId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to branch (nullable for personal listings or when not specified)
        metadata:
          type: object
          description: JSONB field for extensibility (social media links, video URL placeholder, etc.)
          default: {}
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service, leasing]
          description: Type of listing (`leasing` form-only, behaviour Phase 2 — migration 0021)
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing title (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing description (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Price in minor units (nullable for non-price listings e.g., breeding)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Currency code (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Quantity (number of items/animals)
        lat:
          type: number
          format: double
          nullable: true
          description: >
            Latitude (MVP-primary geo storage; -90..90, `chk_listings_latlng`). Form-only in
            Slice 1 — stored, but geo-search is Slice 2. lat/lng must be both-null or both-set.
        lng:
          type: number
          format: double
          nullable: true
          description: Longitude (MVP-primary geo storage; -180..180, `chk_listings_latlng`). Form-only in Slice 1.
        isActive:
          type: boolean
          description: Active status
          default: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiration date/time for the listing
    ListingUpdate:
      type: object
      properties:
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing title (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing description (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Price in minor units (nullable for non-price listings e.g., breeding)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          description: Currency code (ISO 4217)
        quantity:
          type: integer
          description: Quantity (number of items/animals)
        lat:
          type: number
          format: double
          nullable: true
          description: Latitude (MVP-primary geo storage; -90..90, `chk_listings_latlng`). Form-only in Slice 1.
        lng:
          type: number
          format: double
          nullable: true
          description: Longitude (MVP-primary geo storage; -180..180, `chk_listings_latlng`). Form-only in Slice 1.
        isActive:
          type: boolean
          description: Active status
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiration date/time for the listing
        metadata:
          type: object
          description: JSONB field for extensibility (social media links, video URL placeholder, etc.)
    ListingPhoto:
      type: object
      required:
        - id
        - listingId
        - url
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        listingId:
          type: string
          format: uuid
          description: Foreign key to listing
        url:
          type: string
          format: uri
          description: Photo URL
        orderIndex:
          type: integer
          default: 0
          description: Display order index
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
    ListingPhotoCreate:
      type: object
      required:
        - listingId
        - url
      properties:
        listingId:
          type: string
          format: uuid
          description: Foreign key to listing
        url:
          type: string
          format: uri
          description: Photo URL
        orderIndex:
          type: integer
          default: 0
          description: Display order index
    AnalyticsSeriesPoint:
      type: object
      description: One time-series data point (x-phase:2, series-ready form — §16).
      required: [date]
      properties:
        date:
          type: string
          format: date
          description: Calendar day (UTC) the metrics aggregate over
        views:
          type: integer
          description: Views on this day
        contactReveals:
          type: integer
          description: Contact reveals on this day
    ListingAnalytics:
      type: object
      description: >
        Seller-facing per-listing analytics. Counts-snapshot now; `series` is x-phase:2 and additive
        (absent/empty in MVP) — adopting the field now avoids a contract break when time-series ships (§16).
      required: [listingId, views, contactReveals]
      properties:
        listingId:
          type: string
          format: uuid
          description: Listing this snapshot describes
        views:
          type: integer
          description: Total times the listing appeared/was viewed (BR `view_count`)
        contactReveals:
          type: integer
          description: Total contact reveals (BR `contact_shown_count`; sourced from `contact_reveals`)
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent view/contact-reveal activity (null if none)
        series:
          type: array
          nullable: true
          x-phase: 2
          description: >
            Optional time-series (per-day points). Series-ready form (§16) — absent/empty in MVP,
            added additively in Фаза 2 without a contract change. Do not remove this field.
          items: { $ref: '#/components/schemas/AnalyticsSeriesPoint' }
    Conversation:
      type: object
      deprecated: true
      required:
        - id
        - listingId
        - participantAId
        - participantBId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        listingId:
          type: string
          format: uuid
          description: Foreign key to listing
        participantAId:
          type: string
          format: uuid
          description: Foreign key to user (participant A)
        participantBId:
          type: string
          format: uuid
          description: Foreign key to user (participant B)
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
  responses:
    Problem:
      description: RFC7807 problem (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
