openapi: 3.0.3
info:
  title: ZooLink Payment API
  version: 1.0.0
  description: >-
    Payment intents, gateway webhooks, and refunds (spec 14, payment_state_machine).
    Amounts are stored as minor units (BIGINT, e.g. kopecks) — never floats.
    The whole domain is gated behind feature_toggles.payments (off until post-MVP).
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth (§2), x-required-roles (§3),
    RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5), minor-unit money (§7).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /payments:
    post:
      summary: Create a payment intent
      operationId: createPaymentIntent
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      description: >-
        Creates a PENDING payment_transactions row and a gateway intent.
        Requires a unique idempotencyKey to prevent double-charging.
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: HTTP-layer idempotency (API_CONVENTIONS §11); complements the body idempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentIntentRequest' }
      responses:
        '201':
          description: Intent created (PENDING)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntentResponse' }
        '200':
          description: Existing intent returned (idempotencyKey already seen)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntentResponse' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '503': { $ref: '#/components/responses/Problem' }
    get:
      summary: List the current user's payment transactions
      operationId: listPayments
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, COMPLETED, FAILED, REFUNDED, DISPUTED] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Transactions page
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PaymentTransaction' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /payments/{id}:
    get:
      summary: Get a payment transaction status
      operationId: getPayment
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Transaction
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentTransaction' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /payments/{id}/refund:
    post:
      summary: Process a refund for a completed transaction
      operationId: refundPayment
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefundRequest' }
      responses:
        '201':
          description: Refund created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Refund' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /payments/webhook:
    post:
      summary: Payment gateway webhook (source of truth for status)
      operationId: paymentWebhook
      x-internal: true
      security: []
      description: >-
        Internal/gateway-only (signature-verified, not bearer auth — security opt-out).
        Idempotently processed gateway events.
        payment_succeeded -> COMPLETED; payment_failed -> FAILED;
        dispute_created -> DISPUTED. Replays must not double-transition.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebhookEvent' }
      responses:
        '200': { description: Event accepted (idempotent) }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    PaymentIntentRequest:
      type: object
      required: [amountMinor, currency, purposeType, idempotencyKey]
      properties:
        amountMinor:
          type: integer
          format: int64
          minimum: 0
          description: Amount in minor units (e.g. kopecks); never a float
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
        purposeType:
          type: string
          description: e.g., ListingPromotion, PremiumSubscription
        purposeId:
          type: string
          format: uuid
          nullable: true
          description: Entity the payment relates to (e.g., listings.id)
        idempotencyKey:
          type: string
          description: Unique key to prevent duplicate charges (DB unique constraint)
    PaymentIntentResponse:
      type: object
      properties:
        transaction:
          $ref: '#/components/schemas/PaymentTransaction'
        clientSecret:
          type: string
          description: Gateway client secret for client-side confirmation
    PaymentTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        gatewayTransactionId:
          type: string
          nullable: true
        amountMinor:
          type: integer
          format: int64
        currency:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED, REFUNDED, DISPUTED]
        purposeType:
          type: string
        purposeId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RefundRequest:
      type: object
      required: [amountMinor]
      properties:
        amountMinor:
          type: integer
          format: int64
          minimum: 0
        reason:
          type: string
          nullable: true
    Refund:
      type: object
      properties:
        id:
          type: string
          format: uuid
        paymentTransactionId:
          type: string
          format: uuid
        gatewayRefundId:
          type: string
          nullable: true
        amountMinor:
          type: integer
          format: int64
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        createdAt:
          type: string
          format: date-time
    WebhookEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [payment_succeeded, payment_failed, dispute_created]
        gatewayTransactionId:
          type: string
        signature:
          type: string
          description: Gateway signature (verified server-side)
        data:
          type: object
          description: Raw gateway payload
  responses:
    Problem:
      description: RFC7807 problem (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
