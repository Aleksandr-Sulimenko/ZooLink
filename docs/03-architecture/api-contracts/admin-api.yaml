openapi: 3.0.3
info:
  title: ZooLink Admin API
  version: 1.0.0
  description: >-
    API for managing reference data, moderation workflows, and system settings in ZooLink.
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth (§2), x-required-roles (§3),
    RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5), LocalizedString (§6, admin
    returns both locales), §12 sort convention, If-Match/ETag on mutating PATCH (§10).


    Reference-data `dataset` reconciliation (round-9 → A3, normative) — aligned to the actual schema
    (`database_schema.sql`) and rbac-matrix.md.

    WHAT: the `dataset` enum is the **5 managed INT-keyed lookup tables** that exist as CRUD-able admin
    reference data: `species`, `breeds`, `cities`, `health_certifications`, `genetic_markers`.
    The last two were added in A3 (ADMIN_PHASE_ACTION_PLAN) as **form-now / behaviour-later** breeding
    dictionaries (livestock health-certs & genetic markers): the managed lookup form + CRUD exists now,
    while their marketplace **filtering** is deferred (Фаза 2) — anti-rewrite per IMPLEMENTATION_PLAYBOOK §5.
    NOT admin-managed datasets (excluded from the enum):
      - `listing-types`  → fixed DB CHECK enum on `listings.listing_type`
                           ('sale','breeding','show','adoption','stud_service'); schema/ADR change, not CRUD.
      - `animal-statuses`→ fixed DB CHECK lifecycle enums on `listings.status` / `animals`; same as above.
      - `traits` / `temperament_tags` / `health_flags` → free text/JSONB soft tags, not controlled lookups;
                           a lookup table can be added additively in Фаза 2 without a rewrite.

    WHY: species/breeds/cities/health_certifications/genetic_markers are the INT-keyed managed lookups in
    the schema (= code `DATASETS`); the contract must neither list datasets with no backing managed table
    (404/handler drift) nor omit ones that now exist (code↔contract drift).

    WHY BETTER: the contract matches the source of truth (schema + RBAC + code DATASETS), keeps MVP scope
    honest (form now, filtering behaviour gated), and the dataset registry absorbs new lookups without
    changing the CRUD/audit/localization shape.

    Also (round-9): reference-data entry `id` is an **integer** (SERIAL lookup keys per the id-type
    convention: lookups=INT, entities=UUID), not a UUID; and list responses use the standard
    `{ items, meta: PageMeta }` envelope (API_CONVENTIONS.md §5).

    B0.6 (done, ADR-0011 §6): actor-bearing responses carry the `{ actorId, principalType }` agent-badge
    (the shared `Actor` schema). AuditLogEntry/ModerationLogEntry/ModerationActionResponse expose `actor`
    (replacing flat `performedBy`/`moderatorId`; `performedByName` folds into `actor.actorDisplayName`);
    SystemSetting.updatedBy is an `Actor`. The audit-log `actorId` query param replaces `performedBy`.
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /reference-data/{dataset}:
    get:
      summary: Get all active entries in a reference dataset
      operationId: getReferenceData
      description: >-
        Public read (security opt-out per API_CONVENTIONS §3): reference data is reference-grade public
        content (rbac-matrix.md "Reference data = R/R/CRUD" + §3 public-endpoint list). PUBLIC reads return
        the resolved `name` (Accept-Language); an authenticated ADMIN/editor read returns `nameLocalized`
        (§6). `includeInactive=true` is honoured for ADMIN only.
      security: []
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: query
          name: includeInactive
          schema: { type: boolean, default: false }
          description: Include inactive/deactivated entries
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Items per page
        - in: query
          name: search
          schema: { type: string, maxLength: 100 }
          description: Search term for filtering (name or code)
      responses:
        '200':
          description: Paginated list of reference data entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReferenceDataEntry' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Create new reference data entry
      operationId: createReferenceData
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReferenceDataCreateRequest' }
      responses:
        '201':
          description: Reference data entry created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/new:
    get:
      summary: Get form/template for creating new reference data entry
      operationId: getReferenceDataForm
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
      responses:
        '200':
          description: Form template for creating reference data entry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataForm' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/{id}:
    get:
      summary: Get specific reference data entry by ID
      operationId: getReferenceDataById
      description: >-
        Public read (security opt-out per API_CONVENTIONS §3): reference data is public content
        (rbac-matrix.md "Reference data = R/R/CRUD"). PUBLIC reads return the resolved `name`
        (Accept-Language); an authenticated ADMIN/editor read returns `nameLocalized` (§6).
      security: []
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: Reference data entry ID (integer SERIAL key; lookups=INT per id-type convention)
      responses:
        '200':
          description: Reference data entry details
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update reference data entry
      operationId: updateReferenceData
      description: Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: Reference data entry ID (integer SERIAL key; lookups=INT per id-type convention)
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior GET
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReferenceDataUpdateRequest' }
      responses:
        '200':
          description: Reference data entry updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/{id}/toggle-active:
    patch:
      summary: Activate or deactivate reference data entry
      operationId: toggleReferenceDataActive
      description: State-transition endpoint — keeps guard-based 409 (API_CONVENTIONS §10) instead of If-Match.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: Reference data entry ID (integer SERIAL key; lookups=INT per id-type convention)
      responses:
        '200':
          description: Reference data entry activation status toggled successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/queue:
    get:
      summary: '[SUPERSEDED] Get pending listings — use moderation-api'
      operationId: getModerationQueue
      deprecated: true
      description: >-
        **SUPERSEDED — do not implement.** Moderation is owned by **moderation-api.yaml**, which
        holds the single decision vocabulary (APPROVED / REJECTED / CHANGES_REQUESTED), claim/lock,
        SLA and the agent-as-principal actor model. This admin-api moderation block is kept only as
        a deprecated pointer to prevent a divergent second moderation contract (DIV-2/3).
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: query
          name: listing_type
          schema: { type: string, enum: [sale, breeding, show, adoption, stud_service] }
          description: Filter by listing type
        - in: query
          name: species_id
          schema: { type: integer }
          description: Filter by species (INT lookup)
        - in: query
          name: breed_id
          schema: { type: integer }
          description: Filter by breed (INT lookup)
        - in: query
          name: price_min
          schema: { type: integer }
          description: Minimum price in minor units
        - in: query
          name: price_max
          schema: { type: integer }
          description: Maximum price in minor units
        - in: query
          name: city_id
          schema: { type: integer }
          description: Filter by city/region (INT lookup)
        - in: query
          name: radius_km
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Search radius in kilometers from location
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Items per page
        - in: query
          name: sort
          schema: { type: string, default: 'created_at:desc' }
          description: 'Sort (§12): <field>:<asc|desc>, e.g. created_at:desc | price_cents:asc'
      responses:
        '200':
          description: Paginated list of pending listings for moderation
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ModerationQueueItem' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/listing/{id}:
    get:
      summary: '[SUPERSEDED] Get listing for moderation — use moderation-api'
      operationId: getListingForModeration
      deprecated: true
      description: '**SUPERSEDED — do not implement.** Moderation is owned by moderation-api.yaml (single decision vocabulary + actor model). Kept only as a deprecated pointer.'
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Listing ID
      responses:
        '200':
          description: Listing details for moderation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationListingDetails' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/action:
    post:
      summary: '[SUPERSEDED] Perform moderation action — use moderation-api'
      operationId: performModerationAction
      deprecated: true
      description: >-
        **SUPERSEDED — do not implement.** The canonical moderation action endpoint lives in
        **moderation-api.yaml**; the single decision vocabulary is APPROVED / REJECTED /
        CHANGES_REQUESTED (the legacy FLAG verb is retired). Kept only as a deprecated pointer.
        State-transition endpoint — keeps guard-based 409 (API_CONVENTIONS §10).
      x-required-roles: [MODERATOR, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationActionRequest' }
      responses:
        '200':
          description: Moderation action performed successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationActionResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/log/{listing_id}:
    get:
      summary: '[SUPERSEDED] Get moderation history — use moderation-api'
      operationId: getModerationLog
      deprecated: true
      description: '**SUPERSEDED — do not implement.** Moderation history is owned by moderation-api.yaml. Kept only as a deprecated pointer.'
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: path
          name: listing_id
          required: true
          schema: { type: string, format: uuid }
          description: Listing ID
      responses:
        '200':
          description: Moderation history for listing
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ModerationLogEntry' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/ban-user:
    post:
      summary: '[SUPERSEDED] Ban user — use moderation-api'
      operationId: banUser
      deprecated: true
      description: '**SUPERSEDED — do not implement.** User-ban as a moderation action is owned by moderation-api.yaml (single decision vocabulary + actor model). Kept only as a deprecated pointer.'
      x-required-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BanUserRequest' }
      responses:
        '200':
          description: User banned successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BanUserResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /system/settings:
    get:
      summary: Get current system settings
      operationId: getSystemSettings
      x-required-roles: [ADMIN]
      responses:
        '200':
          description: System settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/SystemSetting'
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /system/settings/{key}:
    patch:
      summary: Update system setting
      operationId: updateSystemSetting
      description: Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
          description: Setting key to update
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior read of the setting
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemSettingUpdateRequest' }
      responses:
        '200':
          description: System setting updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemSetting' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /audit/log:
    get:
      summary: Get audit trail entries
      operationId: getAuditLog
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: entityType
          schema: { type: string, enum: [listing, user, organization, reference-data, moderation-action] }
          description: Filter by entity type
        - in: query
          name: entityId
          schema: { type: string, format: uuid }
          description: Filter by entity ID
        - in: query
          name: actionType
          schema: { type: string, enum: [created, updated, deleted, approved, rejected, banned, role-changed] }
          description: Filter by action type
        - in: query
          name: actorId
          schema: { type: string, format: uuid }
          description: Filter by the acting principal (users.id) who performed the action (was performedBy)
        - in: query
          name: startDate
          schema: { type: string, format: date }
          description: Start date for filtering (inclusive)
        - in: query
          name: endDate
          schema: { type: string, format: date }
          description: End date for filtering (inclusive)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Items per page
        - in: query
          name: sort
          schema: { type: string, default: 'created_at:desc' }
          description: 'Sort (§12): <field>:<asc|desc>, e.g. created_at:desc'
      responses:
        '200':
          description: Paginated audit trail entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditLogEntry' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /users/roles:
    get:
      summary: Get users with their roles
      operationId: getUsersWithRoles
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: role
          schema: { type: string, enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER] }
          description: Filter by role
        - in: query
          name: isActive
          schema: { type: boolean }
          description: Filter by active status
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Items per page
        - in: query
          name: search
          schema: { type: string, maxLength: 100 }
          description: Search term for filtering (full name or email)
      responses:
        '200':
          description: Paginated list of users with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UserRoleInfo' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /users/{id}/role:
    patch:
      summary: '[SUPERSEDED] Change user role — use auth-api PATCH /admin/users/{userId}/role'
      operationId: changeUserRole
      deprecated: true
      description: >-
        **SUPERSEDED — do not implement.** The canonical, *implemented* role-change endpoint is
        `PATCH /admin/users/{userId}/role` (`adminSetUserRole`) in **auth-api.yaml**, which owns
        the role-elevation flow (7-role enum, audit, agent-as-principal actor snapshot). This
        admin-api duplicate is kept only as a deprecated pointer to avoid two divergent contracts
        for the same operation (DIV-2/3). Optimistic concurrency (§10) — requires If-Match
        carrying the ETag from a prior GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: User ID
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior read of the user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeUserRoleRequest' }
      responses:
        '200':
          description: User role changed successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserRoleInfo' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    Actor:
      type: object
      description: >-
        Actor-badge: the acting principal on any actor-bearing response (ADR-0011 §6). principalType is the
        write-time snapshot of users.principal_type (HUMAN|AGENT); it lets a consumer tell a human-decided from
        an agent-decided action without a second lookup. DEFAULT HUMAN in MVP (no AGENT active until gated).
      required: [actorId, principalType]
      properties:
        actorId:
          type: string
          format: uuid
          description: Acting principal (users.id).
        principalType:
          type: string
          enum: [HUMAN, AGENT]
          description: Snapshot of the acting principal's type at the moment of the action (ADR-0011 §1).
        actorDisplayName:
          type: string
          maxLength: 100
          nullable: true
          description: Optional human-readable label of the actor (operator UI convenience).
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    # round-9 / B0 / A2: reconciled to database_schema.sql (migration 0018). Lookup tables
    # (species/breeds/cities) localize the name via name_localized JSONB {ru,en} — a single
    # LocalizedString, not flat name_ru/name_en. Per API_CONVENTIONS §6 the read shape depends on
    # context: an ADMIN/editor read returns the full `nameLocalized` (both locales); a PUBLIC read
    # returns the resolved `name` string for Accept-Language (en fallback). Both fields are declared;
    # exactly the context-appropriate one is populated. `code` is present only on species/breeds
    # (UNIQUE: species globally, breeds per-species); cities have no code. `speciesId` is REQUIRED for
    # breeds (FK → species). `sortOrder` is the display ordering (migration 0018). No
    # description/version/deactivated_at columns; soft-delete = isActive boolean.
    ReferenceDataEntry:
      type: object
      required:
        - id
        - isActive
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          minimum: 1
          description: Unique identifier (SERIAL; lookups=INT per id-type convention)
        code:
          type: string
          maxLength: 50
          nullable: true
          description: Unique code within dataset (species/breeds only; null for cities)
        speciesId:
          type: integer
          minimum: 1
          nullable: true
          description: Parent species id (breeds only; null otherwise)
        name:
          type: string
          nullable: true
          description: >-
            Resolved display name for the requested Accept-Language (en fallback). Populated on PUBLIC
            reads (API_CONVENTIONS §6); null on ADMIN reads (use nameLocalized instead).
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          nullable: true
          description: >-
            Display name as LocalizedString {en, ru} (both locales). Populated on ADMIN/editor reads;
            null on PUBLIC reads (use the resolved `name` instead).
        sortOrder:
          type: integer
          description: Display ordering within the dataset (ascending; default 0)
        market:
          type: string
          enum: [pet, livestock]
          nullable: true
          description: Market the species belongs to (species only; ADR-0002)
        isActive:
          type: boolean
          description: Whether entry is active (deactivated via isActive=false, not deleted)
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    ReferenceDataCreateRequest:
      type: object
      required:
        - nameLocalized
      properties:
        code:
          type: string
          maxLength: 50
          description: Unique code (required for species/breeds; rejected for cities)
        speciesId:
          type: integer
          minimum: 1
          description: Parent species id (required for breeds; rejected for species/cities)
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Display name (LocalizedString {en, ru})
        market:
          type: string
          enum: [pet, livestock]
          description: Market (species only; defaults to 'pet' when omitted)
        sortOrder:
          type: integer
          default: 0
          description: Display ordering within the dataset (ascending)
        isActive:
          type: boolean
          default: true
          description: Whether entry is active upon creation
    ReferenceDataUpdateRequest:
      type: object
      description: >-
        Partial update. `code`/`speciesId` are immutable (identity of the lookup row); only the
        display name, market (species) and isActive may change.
      properties:
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Display name (LocalizedString {en, ru})
        market:
          type: string
          enum: [pet, livestock]
          description: Market (species only)
        sortOrder:
          type: integer
          description: Display ordering within the dataset (ascending)
        isActive:
          type: boolean
          description: Whether entry is active
    ReferenceDataForm:
      type: object
      properties:
        fields:
          type: object
          additionalProperties:
            type: object
            properties:
              type:
                type: string
                enum: [text, textarea, number, boolean, select, date, datetime]
              label:
                type: string
                description: Field label
              required:
                type: boolean
                default: false
              maxLength:
                type: integer
                nullable: true
              minLength:
                type: integer
                nullable: true
              pattern:
                type: string
                nullable: true
              options:
                type: array
                items:
                  type: object
                  properties:
                    label:
                      type: string
                    value:
                      type: string
                nullable: true
