openapi: 3.0.3
info:
  title: ZooLink Admin API
  version: 1.0.0
  description: >-
    API for managing reference data, moderation workflows, and system settings in ZooLink.
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth (§2), x-required-roles (§3),
    RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5), LocalizedString (§6, admin
    returns both locales), §12 sort convention, If-Match/ETag on mutating PATCH (§10).


    Reference-data `dataset` reconciliation (round-9 → A3, normative) — aligned to the actual schema
    (`database_schema.sql`) and rbac-matrix.md.

    WHAT: the `dataset` enum is the **5 managed INT-keyed lookup tables** that exist as CRUD-able admin
    reference data: `species`, `breeds`, `cities`, `health_certifications`, `genetic_markers`.
    The last two were added in A3 (ADMIN_PHASE_ACTION_PLAN) as **form-now / behaviour-later** breeding
    dictionaries (livestock health-certs & genetic markers): the managed lookup form + CRUD exists now,
    while their marketplace **filtering** is deferred (Фаза 2) — anti-rewrite per IMPLEMENTATION_PLAYBOOK §5.
    NOT admin-managed datasets (excluded from the enum):
      - `listing-types`  → fixed DB CHECK enum on `listings.listing_type`
                           ('sale','breeding','show','adoption','stud_service'); schema/ADR change, not CRUD.
      - `animal-statuses`→ fixed DB CHECK lifecycle enums on `listings.status` / `animals`; same as above.
      - `traits` / `temperament_tags` / `health_flags` → free text/JSONB soft tags, not controlled lookups;
                           a lookup table can be added additively in Фаза 2 without a rewrite.

    WHY: species/breeds/cities/health_certifications/genetic_markers are the INT-keyed managed lookups in
    the schema (= code `DATASETS`); the contract must neither list datasets with no backing managed table
    (404/handler drift) nor omit ones that now exist (code↔contract drift).

    WHY BETTER: the contract matches the source of truth (schema + RBAC + code DATASETS), keeps MVP scope
    honest (form now, filtering behaviour gated), and the dataset registry absorbs new lookups without
    changing the CRUD/audit/localization shape.

    Also (round-9): reference-data entry `id` is an **integer** (SERIAL lookup keys per the id-type
    convention: lookups=INT, entities=UUID), not a UUID; and list responses use the standard
    `{ items, meta: PageMeta }` envelope (API_CONVENTIONS.md §5).

    B0.6 (done, ADR-0011 §6): actor-bearing responses carry the `{ actorId, principalType }` agent-badge
    (the shared `Actor` schema). AuditLogEntry/ModerationLogEntry/ModerationActionResponse expose `actor`
    (replacing flat `performedBy`/`moderatorId`; `performedByName` folds into `actor.actorDisplayName`);
    SystemSetting.updatedBy is an `Actor`. The audit-log `actorId` query param replaces `performedBy`.


    Audit-log INT-entity filtering (D4 flag → Slice-2 contract-owner resolution, normative).
    WHAT: `getAuditLog` gains an `entityIdInt` (integer) query filter and `AuditLogEntry` gains an
    `entityIdInt` (integer, nullable) field, parallel to the existing UUID `entityId`. Exactly one of
    the two is populated per row — `entityId` for UUID-keyed entities (listing/user/organization/
    moderation-action), `entityIdInt` for INT-keyed lookup entities (entityType=reference-data:
    species/breeds/cities/health_certifications/genetic_markers). The two query filters are mutually
    exclusive (both → 400 VALIDATION_ERROR; `400` added to getAuditLog responses).
    WHY: `audit_log` records reference-data (INT lookup) CRUD via `entity_id_int` (migration 0018) while
    UUID entities use `entity_id` — but the contract only exposed a `format:uuid` `entityId`, so the D4
    reference-data change-history (spec 06) was written but **not filterable** by its subject id. The
    schema column already exists (database_schema.sql: "Exactly one is populated per row"); the contract
    must mirror it or the audit-viewer cannot reach reference-data entities.
    WHY BETTER: the contract now matches the source of truth (schema A2/0018 `entity_id`+`entity_id_int`),
    closes the D4 read-path loop (write→read) with no new abstraction and no break to existing UUID
    consumers (`entityIdInt` is purely additive); the typed split (uuid vs int) is forward-compatible —
    any new INT lookup added to the dataset registry is auditable & filterable with zero contract change.
    Alternative considered: a single polymorphic `entityRef {type, id}` string — rejected as a breaking
    reshape of the existing `entityId` consumers and a needless abstraction over a schema that already
    keys the two id spaces in separate columns.


    Audit vocabulary reconciliation (Slice-2 contract↔code divergence → doc-first fix, normative).
    WHAT: the `audit_log` write-side stores a **richer vocabulary** than the contract previously modelled,
    and the contract is widened to match the source of truth (database_schema.sql: `action VARCHAR(100)`
    and `entity_type VARCHAR(40)` — free text, **no CHECK enum**):
      (1) `actionType` was a small closed enum (`created/updated/deleted/approved/rejected/banned/
          role-changed/login/logout`), but every domain actually writes a **namespaced dotted verb**
          `{domain}.{verb}` (e.g. `identity.role_changed`, `identity.recovery_succeeded`, `user.erased`,
          `reference_data.created`, `listing.auto_expired`, `feature_toggle.flip`, `identity.oauth_login`).
          `actionType` becomes a **`{domain}.{verb}` string** (lower_snake segments, dot-separated) with a
          `pattern` + an open, documented **known-values list** (`x-known-values`) — not a closed enum.
      (2) `entityType` stays a **clean closed enum** of the bare logical entity names, but the set is
          extended to the entities that actually appear on the ledger (`feature-toggle` added). The
          reference-data **dataset** is split into its own additive `referenceDataset` field rather than
          being smuggled in as the stored `reference-data:{dataset}` suffix — `entityType` never carries
          the colon form on the wire.
    WHY: code wrote values **outside** the contract enums (`reference_data.created`, `identity.*`,
    `reference-data:species`, …), which the doc-code protocol forbids (no silent code↔doc divergence).
    The schema columns are deliberately free text (append-only ledger, VARCHAR not enum) precisely so the
    vocabulary can grow per domain without a migration; the contract must mirror that openness, not a
    narrower invented enum that forces a lossy read-side remap.
    WHY BETTER: the dotted `{domain}.{verb}` namespace is information-rich and already uniform across all
    domains — preserving it keeps full audit fidelity (an admin sees `identity.recovery_succeeded`, not a
    lossy `login`) and removes the read-layer's lossy `toActionType` collapse; widening the contract is
    purely **additive & forward-compatible** (a new domain's verbs need zero contract change — they match
    the pattern and are appended to `x-known-values`), and it is consistent with the schema's free-text
    columns and with the `entityIdInt` split already adopted above. The `referenceDataset` split keeps
    `entityType` a stable filterable enum while exposing the dataset losslessly. Tightening the write-side
    instead (collapse every module to the 9-value enum) was **rejected**: it would lose audit information,
    churn 8+ modules across identity/admin/scheduler/feature-toggle, and fight the schema's free-text design.
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /reference-data/{dataset}:
    get:
      summary: Get all active entries in a reference dataset
      operationId: getReferenceData
      description: >-
        Public read (security opt-out per API_CONVENTIONS §3): reference data is reference-grade public
        content (rbac-matrix.md "Reference data = R/R/CRUD" + §3 public-endpoint list). PUBLIC reads return
        the resolved `name` (Accept-Language); an authenticated ADMIN/editor read returns `nameLocalized`
        (§6). `includeInactive=true` is honoured for ADMIN only.
      security: []
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: query
          name: includeInactive
          schema: { type: boolean, default: false }
          description: Include inactive/deactivated entries
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Items per page
        - in: query
          name: search
          schema: { type: string, maxLength: 100 }
          description: Search term for filtering (name or code)
      responses:
        '200':
          description: Paginated list of reference data entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReferenceDataEntry' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Create new reference data entry
      operationId: createReferenceData
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReferenceDataCreateRequest' }
      responses:
        '201':
          description: Reference data entry created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/new:
    get:
      summary: Get form/template for creating new reference data entry
      operationId: getReferenceDataForm
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
      responses:
        '200':
          description: Form template for creating reference data entry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataForm' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/{id}:
    get:
      summary: Get specific reference data entry by ID
      operationId: getReferenceDataById
      description: >-
        Public read (security opt-out per API_CONVENTIONS §3): reference data is public content
        (rbac-matrix.md "Reference data = R/R/CRUD"). PUBLIC reads return the resolved `name`
        (Accept-Language); an authenticated ADMIN/editor read returns `nameLocalized` (§6).
      security: []
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: Reference data entry ID (integer SERIAL key; lookups=INT per id-type convention)
      responses:
        '200':
          description: Reference data entry details
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update reference data entry
      operationId: updateReferenceData
      description: Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: Reference data entry ID (integer SERIAL key; lookups=INT per id-type convention)
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior GET
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReferenceDataUpdateRequest' }
      responses:
        '200':
          description: Reference data entry updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /reference-data/{dataset}/{id}/toggle-active:
    patch:
      summary: Activate or deactivate reference data entry
      operationId: toggleReferenceDataActive
      description: State-transition endpoint — keeps guard-based 409 (API_CONVENTIONS §10) instead of If-Match.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: dataset
          required: true
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: Reference dataset name
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
          description: Reference data entry ID (integer SERIAL key; lookups=INT per id-type convention)
      responses:
        '200':
          description: Reference data entry activation status toggled successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceDataEntry' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/queue:
    get:
      summary: '[SUPERSEDED] Get pending listings — use moderation-api'
      operationId: getModerationQueue
      deprecated: true
      description: >-
        **SUPERSEDED — do not implement.** Moderation is owned by **moderation-api.yaml**, which
        holds the single decision vocabulary (APPROVED / REJECTED / CHANGES_REQUESTED), claim/lock,
        SLA and the agent-as-principal actor model. This admin-api moderation block is kept only as
        a deprecated pointer to prevent a divergent second moderation contract (DIV-2/3).
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: query
          name: listing_type
          schema: { type: string, enum: [sale, breeding, show, adoption, stud_service] }
          description: Filter by listing type
        - in: query
          name: species_id
          schema: { type: integer }
          description: Filter by species (INT lookup)
        - in: query
          name: breed_id
          schema: { type: integer }
          description: Filter by breed (INT lookup)
        - in: query
          name: price_min
          schema: { type: integer }
          description: Minimum price in minor units
        - in: query
          name: price_max
          schema: { type: integer }
          description: Maximum price in minor units
        - in: query
          name: city_id
          schema: { type: integer }
          description: Filter by city/region (INT lookup)
        - in: query
          name: radius_km
          schema: { type: integer, minimum: 1, maximum: 100 }
          description: Search radius in kilometers from location
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Items per page
        - in: query
          name: sort
          schema: { type: string, default: 'created_at:desc' }
          description: 'Sort (§12): <field>:<asc|desc>, e.g. created_at:desc | price_cents:asc'
      responses:
        '200':
          description: Paginated list of pending listings for moderation
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ModerationQueueItem' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/listing/{id}:
    get:
      summary: '[SUPERSEDED] Get listing for moderation — use moderation-api'
      operationId: getListingForModeration
      deprecated: true
      description: '**SUPERSEDED — do not implement.** Moderation is owned by moderation-api.yaml (single decision vocabulary + actor model). Kept only as a deprecated pointer.'
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Listing ID
      responses:
        '200':
          description: Listing details for moderation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationListingDetails' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/action:
    post:
      summary: '[SUPERSEDED] Perform moderation action — use moderation-api'
      operationId: performModerationAction
      deprecated: true
      description: >-
        **SUPERSEDED — do not implement.** The canonical moderation action endpoint lives in
        **moderation-api.yaml**; the single decision vocabulary is APPROVED / REJECTED /
        CHANGES_REQUESTED (the legacy FLAG verb is retired). Kept only as a deprecated pointer.
        State-transition endpoint — keeps guard-based 409 (API_CONVENTIONS §10).
      x-required-roles: [MODERATOR, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationActionRequest' }
      responses:
        '200':
          description: Moderation action performed successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModerationActionResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/log/{listing_id}:
    get:
      summary: '[SUPERSEDED] Get moderation history — use moderation-api'
      operationId: getModerationLog
      deprecated: true
      description: '**SUPERSEDED — do not implement.** Moderation history is owned by moderation-api.yaml. Kept only as a deprecated pointer.'
      x-required-roles: [MODERATOR, ADMIN]
      parameters:
        - in: path
          name: listing_id
          required: true
          schema: { type: string, format: uuid }
          description: Listing ID
      responses:
        '200':
          description: Moderation history for listing
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ModerationLogEntry' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /moderation/ban-user:
    post:
      summary: '[SUPERSEDED] Ban user — use moderation-api'
      operationId: banUser
      deprecated: true
      description: '**SUPERSEDED — do not implement.** User-ban as a moderation action is owned by moderation-api.yaml (single decision vocabulary + actor model). Kept only as a deprecated pointer.'
      x-required-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BanUserRequest' }
      responses:
        '200':
          description: User banned successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BanUserResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /system/settings:
    get:
      summary: Get current system settings
      operationId: getSystemSettings
      x-required-roles: [ADMIN]
      responses:
        '200':
          description: System settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/SystemSetting'
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /system/settings/{key}:
    get:
      summary: Get a single system setting (carries the ETag for optimistic concurrency)
      operationId: getSystemSetting
      description: >-
        ADMIN-only read of one setting by key. Sets a weak **ETag** response header (§10) — this is the
        validator a client must echo as `If-Match` on the matching PATCH. Mirrors the reference-data
        precedent `GET /reference-data/{dataset}/{id}` (GET sets the ETag the PATCH's If-Match consumes).
        Admin read → not publicly cacheable (`Cache-Control: private, no-store`, API_CONVENTIONS §13).
        WHAT: add `GET /system/settings/{key}` returning a single `SystemSetting` and setting the weak
        `ETag` header. WHY: `PATCH /system/settings/{key}` requires `If-Match` =
        `weakEtag('system-setting:{key}', updatedAt)`, but the only existing read was the collection
        `GET /system/settings` (object map) which surfaces no ETag — so a client had no way to obtain the
        precondition validator and the optimistic-concurrency loop (read → If-Match → PATCH) was unusable
        end-to-end. WHY BETTER: the cleanest REST shape — it reuses the validator the service already
        computes (`SystemSettingService.etag()`) and the exact GET-sets-ETag pattern already proven on
        reference-data, with no transport concern leaking into the body and no change to the existing
        collection endpoint or the `SystemSetting` schema (purely additive).
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
          description: Setting key to read
      responses:
        '200':
          description: System setting retrieved successfully
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on the matching PATCH (§10)
            Cache-Control:
              schema: { type: string }
              description: 'Admin read — not publicly cacheable (§13): private, no-store'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemSetting' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update system setting
      operationId: updateSystemSetting
      description: >-
        Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior
        `GET /system/settings/{key}` (the per-setting read that surfaces the validator).
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: key
          required: true
          schema: { type: string }
          description: Setting key to update
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior read of the setting
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemSettingUpdateRequest' }
      responses:
        '200':
          description: System setting updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemSetting' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /audit/log:
    get:
      summary: Get audit trail entries
      operationId: getAuditLog
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: entityType
          schema: { type: string, enum: [listing, user, organization, reference-data, moderation-action, feature-toggle] }
          description: >-
            Filter by the bare logical entity type. `reference-data` matches every reference dataset
            regardless of its stored `reference-data:{dataset}` suffix; narrow to one dataset with
            `referenceDataset`.
        - in: query
          name: referenceDataset
          schema: { type: string, enum: [species, breeds, cities, health_certifications, genetic_markers] }
          description: >-
            Filter reference-data audit rows to a single dataset (maps to the stored
            `audit_log.entity_type = 'reference-data:{dataset}'` form). Only meaningful when
            entityType=reference-data; ignored otherwise.
        - in: query
          name: entityId
          schema: { type: string, format: uuid }
          description: >-
            Filter by the **UUID** entity id (maps to audit_log.entity_id) — for UUID-keyed entities
            (listing/user/organization/moderation-action). Mutually exclusive with entityIdInt.
        - in: query
          name: entityIdInt
          schema: { type: integer, minimum: 1 }
          description: >-
            Filter by the **INT** entity id (maps to audit_log.entity_id_int) — for INT-keyed lookup
            entities (entityType=reference-data: species/breeds/cities/health_certifications/
            genetic_markers; id-type convention: lookups=INT). Mutually exclusive with entityId; supplying
            both → 400 VALIDATION_ERROR. This is what makes reference-data CRUD history (D4) filterable.
        - in: query
          name: actionType
          schema:
            type: string
            maxLength: 100
            pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$'
            x-known-values: &auditKnownVerbs
              - identity.register_initiated
              - identity.phone_verified
              - identity.verify_failed
              - identity.verify_locked_out
              - identity.oauth_register
              - identity.oauth_login
              - identity.role_changed
              - identity.identifier_rebound
              - identity.profile_updated
              - identity.account_deactivated
              - identity.account_reactivated
              - identity.erasure_requested
              - identity.recovery_requested
              - identity.recovery_locked_out
              - identity.recovery_succeeded
              - user.erased
              - reference_data.created
              - reference_data.updated
              - reference_data.activated
              - reference_data.deactivated
              - listing.auto_expired
              - feature_toggle.flip
          description: >-
            Filter by the exact stored audit verb. Verbs are namespaced **`{domain}.{verb}`** (lower_snake
            segments, dot-separated; mirrors the free-text `audit_log.action VARCHAR(100)` column, no DB
            enum). The set grows additively per domain — `x-known-values` lists the verbs emitted today
            (informative, not exhaustive/closed); a consumer may also pass any value matching `pattern`.
        - in: query
          name: actorId
          schema: { type: string, format: uuid }
          description: Filter by the acting principal (users.id) who performed the action (was performedBy)
        - in: query
          name: startDate
          schema: { type: string, format: date }
          description: Start date for filtering (inclusive)
        - in: query
          name: endDate
          schema: { type: string, format: date }
          description: End date for filtering (inclusive)
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
          description: Items per page
        - in: query
          name: sort
          schema: { type: string, default: 'created_at:desc' }
          description: 'Sort (§12): <field>:<asc|desc>, e.g. created_at:desc'
      responses:
        '200':
          description: Paginated audit trail entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditLogEntry' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /users/roles:
    get:
      summary: Get users with their roles
      operationId: getUsersWithRoles
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: role
          schema: { type: string, enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER] }
          description: Filter by role
        - in: query
          name: isActive
          schema: { type: boolean }
          description: Filter by active status
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Items per page
        - in: query
          name: search
          schema: { type: string, maxLength: 100 }
          description: Search term for filtering (full name or email)
      responses:
        '200':
          description: Paginated list of users with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UserRoleInfo' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /users/{id}/role:
    patch:
      summary: '[SUPERSEDED] Change user role — use auth-api PATCH /admin/users/{userId}/role'
      operationId: changeUserRole
      deprecated: true
      description: >-
        **SUPERSEDED — do not implement.** The canonical, *implemented* role-change endpoint is
        `PATCH /admin/users/{userId}/role` (`adminSetUserRole`) in **auth-api.yaml**, which owns
        the role-elevation flow (7-role enum, audit, agent-as-principal actor snapshot). This
        admin-api duplicate is kept only as a deprecated pointer to avoid two divergent contracts
        for the same operation (DIV-2/3). Optimistic concurrency (§10) — requires If-Match
        carrying the ETag from a prior GET.
      x-required-roles: [ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: User ID
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior read of the user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangeUserRoleRequest' }
      responses:
        '200':
          description: User role changed successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserRoleInfo' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    Actor:
      type: object
      description: >-
        Actor-badge: the acting principal on any actor-bearing response (ADR-0011 §6). principalType is the
        write-time snapshot of users.principal_type (HUMAN|AGENT); it lets a consumer tell a human-decided from
        an agent-decided action without a second lookup. DEFAULT HUMAN in MVP (no AGENT active until gated).
        SF-1 (Slice-2 reconciliation) — WHAT: actorId is nullable. WHY: audit_log.actor_id is nullable by
        schema design (ON DELETE SET NULL; system/automated actions, e.g. the retention job, have no human
        actor). WHY-BETTER: the badge stays present and honest for system rows (actorId=null, principalType
        retained) instead of the contract falsely promising a non-null uuid the code cannot supply.
      required: [actorId, principalType]
      properties:
        actorId:
          type: string
          format: uuid
          nullable: true
          description: Acting principal (users.id). Null for system/automated actions with no human/agent actor.
        principalType:
          type: string
          enum: [HUMAN, AGENT]
          description: Snapshot of the acting principal's type at the moment of the action (ADR-0011 §1).
        actorDisplayName:
          type: string
          maxLength: 100
          nullable: true
          description: Optional human-readable label of the actor (operator UI convenience).
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    # round-9 / B0 / A2: reconciled to database_schema.sql (migration 0018). Lookup tables
    # (species/breeds/cities) localize the name via name_localized JSONB {ru,en} — a single
    # LocalizedString, not flat name_ru/name_en. Per API_CONVENTIONS §6 the read shape depends on
    # context: an ADMIN/editor read returns the full `nameLocalized` (both locales); a PUBLIC read
    # returns the resolved `name` string for Accept-Language (en fallback). Both fields are declared;
    # exactly the context-appropriate one is populated. `code` is present only on species/breeds
    # (UNIQUE: species globally, breeds per-species); cities have no code. `speciesId` is REQUIRED for
    # breeds (FK → species). `sortOrder` is the display ordering (migration 0018). No
    # description/version/deactivated_at columns; soft-delete = isActive boolean.
    ReferenceDataEntry:
      type: object
      required:
        - id
        - isActive
        - sortOrder
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          minimum: 1
          description: Unique identifier (SERIAL; lookups=INT per id-type convention)
        code:
          type: string
          maxLength: 50
          nullable: true
          description: Unique code within dataset (species/breeds only; null for cities)
        speciesId:
          type: integer
          minimum: 1
          nullable: true
          description: Parent species id (breeds only; null otherwise)
        name:
          type: string
          nullable: true
          description: >-
            Resolved display name for the requested Accept-Language (en fallback). Populated on PUBLIC
            reads (API_CONVENTIONS §6); null on ADMIN reads (use nameLocalized instead).
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          nullable: true
          description: >-
            Display name as LocalizedString {en, ru} (both locales). Populated on ADMIN/editor reads;
            null on PUBLIC reads (use the resolved `name` instead).
        sortOrder:
          type: integer
          description: Display ordering within the dataset (ascending; default 0)
        market:
          type: string
          enum: [pet, livestock]
          nullable: true
          description: Market the species belongs to (species only; ADR-0002)
        isActive:
          type: boolean
          description: Whether entry is active (deactivated via isActive=false, not deleted)
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
    ReferenceDataCreateRequest:
      type: object
      required:
        - nameLocalized
      properties:
        code:
          type: string
          maxLength: 50
          description: Unique code (required for species/breeds; rejected for cities)
        speciesId:
          type: integer
          minimum: 1
          description: Parent species id (required for breeds; rejected for species/cities)
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Display name (LocalizedString {en, ru})
        market:
          type: string
          enum: [pet, livestock]
          description: Market (species only; defaults to 'pet' when omitted)
        sortOrder:
          type: integer
          default: 0
          description: Display ordering within the dataset (ascending)
        isActive:
          type: boolean
          default: true
          description: Whether entry is active upon creation
    ReferenceDataUpdateRequest:
      type: object
      description: >-
        Partial update. `code`/`speciesId` are immutable (identity of the lookup row); only the
        display name, market (species) and isActive may change.
      properties:
        nameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Display name (LocalizedString {en, ru})
        market:
          type: string
          enum: [pet, livestock]
          description: Market (species only)
        sortOrder:
          type: integer
          description: Display ordering within the dataset (ascending)
        isActive:
          type: boolean
          description: Whether entry is active
    ReferenceDataForm:
      type: object
      properties:
        fields:
          type: object
          additionalProperties:
            type: object
            properties:
              type:
                type: string
                enum: [text, textarea, number, boolean, select, date, datetime]
              label:
                type: string
                description: Field label
              required:
                type: boolean
                default: false
              maxLength:
                type: integer
                nullable: true
              minLength:
                type: integer
                nullable: true
              pattern:
                type: string
                nullable: true
              options:
                type: array
                items:
                  type: object
                  properties:
                    label:
                      type: string
                    value:
                      type: string
                nullable: true
    ModerationQueueItem:
      type: object
      required:
        - id
        - listingId
        - animalId
        - sellerId
        - listingType
        - titleLocalized
        - createdAt
        - speciesId
        - breedId
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for queue entry
        listingId:
          type: string
          format: uuid
          description: Listing ID
        animalId:
          type: string
          format: uuid
          description: Animal ID associated with listing
        sellerId:
          type: string
          format: uuid
          description: User ID of listing creator
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Type of listing
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing title (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing description (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Price in minor units (null for non-price listings)
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Currency code (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Quantity
        locationPoint:
          type: object
          description: GeoPoint for location-based search
          nullable: true
        searchRadiusM:
          type: integer
          nullable: true
          description: Search radius in meters
        speciesId:
          type: integer
          description: Animal species reference (INT lookup)
        breedId:
          type: integer
          nullable: true
          description: Animal breed reference (INT lookup; null if custom/other)
        breedText:
          type: string
          maxLength: 100
          nullable: true
          description: Custom breed text if breedId is null
        nickname:
          type: string
          maxLength: 50
          nullable: true
          description: Animal nickname/display name
        sex:
          type: string
          enum: [Male, Female]
          description: Animal sex
        dateOfBirth:
          type: string
          format: date
          description: Animal date of birth
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Animal color/coat pattern
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: Animal microchip ID
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: Animal tattoo/brand ID (for livestock)
        isActive:
          type: boolean
          description: Listing active status
        createdAt:
          type: string
          format: date-time
          description: Listing creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Listing last update timestamp
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Listing expiration timestamp
        photos:
          type: array
          items:
            type: string
            format: uri
          description: Listing photo URLs
          default: []
        moderationNotes:
          type: string
          maxLength: 500
          nullable: true
          description: Notes from previous moderation attempts
        moderationCount:
          type: integer
          default: 0
          description: Number of times this listing has been moderated
    ModerationListingDetails:
      type: object
      required:
        - id
        - listingId
        - animal
        - seller
        - listingType
        - titleLocalized
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Moderation queue entry ID
        listingId:
          type: string
          format: uuid
          description: Listing ID
        animal:
          $ref: '#/components/schemas/AnimalSummary'
        seller:
          $ref: '#/components/schemas/UserSummary'
        listingType:
          type: string
          enum: [sale, breeding, show, adoption, stud_service]
          description: Type of listing
        titleLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing title (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Listing description (LocalizedString {en, ru})
        priceCents:
          type: integer
          format: int64
          nullable: true
          description: Price in minor units
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: '^[A-Z]{3}$'
          default: RUB
          description: Currency code (ISO 4217)
        quantity:
          type: integer
          default: 1
          description: Quantity
        locationPoint:
          type: object
          description: GeoPoint for location-based search
          nullable: true
        searchRadiusM:
          type: integer
          nullable: true
          description: Search radius in meters
        isActive:
          type: boolean
          description: Listing active status
        createdAt:
          type: string
          format: date-time
          description: Listing creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Listing last update timestamp
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Listing expiration timestamp
        photos:
          type: array
          items:
            type: string
            format: uri
          description: Listing photo URLs
          default: []
        moderationHistory:
          type: array
          items: { $ref: '#/components/schemas/ModerationLogEntry' }
          description: Previous moderation actions on this listing
          default: []
    AnimalSummary:
      type: object
      required:
        - id
        - speciesId
        - sex
        - dateOfBirth
        - isActive
      properties:
        id:
          type: string
          format: uuid
          description: Animal ID
        speciesId:
          type: integer
          description: Species reference (INT lookup)
        breedId:
          type: integer
          nullable: true
          description: Breed reference (INT lookup; null if custom/other)
        breedText:
          type: string
          maxLength: 100
          nullable: true
          description: Custom breed text if breedId is null
        nickname:
          type: string
          maxLength: 50
          nullable: true
          description: Animal nickname/display name
        sex:
          type: string
          enum: [Male, Female]
          description: Animal sex
        dateOfBirth:
          type: string
          format: date
          description: Animal date of birth
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Animal color/coat pattern
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: Animal microchip ID
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: Animal tattoo/brand ID (for livestock)
        isActive:
          type: boolean
          description: Animal active status
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Date when current owner acquired the animal
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to mother for pedigree
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to father for pedigree
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Type of health record
              detail:
                type: string
                description: Detail of health record
              date:
                type: string
                format: date
                description: Date of health event
              provider:
                type: string
                description: Provider/veterinary clinic
          description: Animal health records
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Event type (heat_start, mating, etc.)
              date:
                type: string
                format: date
                description: Date of event
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Partner animal ID (if applicable)
          description: Animal reproductive data (for females)
          default: []
    UserSummary:
      type: object
      required:
        - id
        - fullName
        - role
        - isActive
      properties:
        id:
          type: string
          format: uuid
          description: User ID
        fullName:
          type: string
          maxLength: 100
          description: User's full name
        cityId:
          type: integer
          nullable: true
          description: Reference to city for geo-search (INT lookup)
        avatarUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 500
          description: URL to avatar in object storage
        email:
          type: string
          format: email
          nullable: true
          maxLength: 255
          description: Email address for notifications
        emailVerified:
          type: boolean
          default: false
          description: True if email confirmed via link
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: User role
        isActive:
          type: boolean
          description: True = can login; False = deactivated
        createdAt:
          type: string
          format: date-time
          description: Registration timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last profile update
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Last login timestamp
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
          description: When user chose to deactivate (null if active)
    ModerationLogEntry:
      type: object
      required:
        - id
        - listingId
        - actor
        - action
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        listingId:
          type: string
          format: uuid
          description: Listing ID
        actor:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          description: >-
            Acting principal as the {actorId, principalType} agent-badge (ADR-0011 §6); replaces the former flat
            moderatorId. principalType is the write-time snapshot (moderation_decisions.actor_principal_type).
        action:
          type: string
          enum: [approved, rejected, flagged]
          description: Moderation action taken
        reason:
          type: string
          maxLength: 500
          nullable: true
          description: Reason for rejection (required for rejected action)
        createdAt:
          type: string
          format: date-time
          description: Timestamp of moderation action
    ModerationActionRequest:
      type: object
      required:
        - listingId
        - action
      properties:
        listingId:
          type: string
          format: uuid
          description: Listing ID to moderate
        action:
          type: string
          enum: [approve, reject, flag]
          description: Moderation action to perform
        reason:
          type: string
          maxLength: 500
          description: Reason for rejection (required when action is 'reject')
    ModerationActionResponse:
      type: object
      required:
        - listingId
        - action
        - actor
        - processedAt
      properties:
        listingId:
          type: string
          format: uuid
          description: Listing ID that was moderated
        action:
          type: string
          enum: [approved, rejected, flagged]
          description: Moderation action that was performed
        reason:
          type: string
          maxLength: 500
          nullable: true
          description: Reason for rejection (if applicable)
        actor:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          description: >-
            Acting principal as the {actorId, principalType} agent-badge (ADR-0011 §6); replaces the former flat
            moderatorId. principalType is the write-time snapshot (moderation_decisions.actor_principal_type).
        processedAt:
          type: string
          format: date-time
          description: Timestamp when action was processed
        listingStatus:
          type: string
          enum: [draft, pending, published, rejected]
          description: Resulting listing status after moderation
    BanUserRequest:
      type: object
      required:
        - userId
        - reason
        - durationDays
      properties:
        userId:
          type: string
          format: uuid
          description: User ID to ban
        reason:
          type: string
          maxLength: 500
          description: Reason for banning
        durationDays:
          type: integer
          minimum: 1
          maximum: 365
          description: Ban duration in days (null for permanent ban)
        isPermanent:
          type: boolean
          default: false
          description: Whether ban is permanent (overrides durationDays if true)
    BanUserResponse:
      type: object
      required:
        - userId
        - bannedAt
        - expiresAt
      properties:
        userId:
          type: string
          format: uuid
          description: User ID that was banned
        reason:
          type: string
          maxLength: 500
          description: Reason for banning
        bannedAt:
          type: string
          format: date-time
          description: Timestamp when ban was applied
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: When ban expires (null for permanent ban)
        isPermanent:
          type: boolean
          description: Whether ban is permanent
    SystemSetting:
      type: object
      required:
        - key
        - value
        - updatedAt
      properties:
        key:
          type: string
          description: Setting key
        value:
          type: string
          description: Setting value (JSON string for complex values)
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Setting description
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        updatedBy:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          nullable: true
          description: >-
            Acting principal who last updated the setting, as the {actorId, principalType} agent-badge
            (ADR-0011 §6); replaces the former flat updatedBy uuid. Null if never updated.
    SystemSettingUpdateRequest:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          description: New setting value
        description:
          type: string
          maxLength: 500
          nullable: true
          description: Updated setting description
    AuditLogEntry:
      type: object
      required:
        - id
        - entityType
        - entityId
        - actionType
        - actor
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        entityType:
          type: string
          enum: [listing, user, organization, reference-data, moderation-action, feature-toggle]
          description: >-
            Bare logical entity type that was acted upon. For reference data this is always the bare
            `reference-data`; the concrete dataset is carried separately in `referenceDataset` (the stored
            `audit_log.entity_type` may be the suffixed `reference-data:{dataset}` form — normalised here).
        referenceDataset:
          type: string
          enum: [species, breeds, cities, health_certifications, genetic_markers]
          nullable: true
          description: >-
            The reference dataset, when entityType=reference-data (parsed from the stored
            `reference-data:{dataset}` entity_type). Null for every non-reference-data entity.
        entityId:
          type: string
          format: uuid
          nullable: true
          description: >-
            **UUID** id of the entity acted upon (audit_log.entity_id), for UUID-keyed entities
            (listing/user/organization/moderation-action). Null when the entity is an INT-keyed lookup
            (see entityIdInt) or for system-wide actions. Exactly one of entityId / entityIdInt is
            populated per row (mirrors database_schema.sql, migration 0018).
        entityIdInt:
          type: integer
          minimum: 1
          nullable: true
          description: >-
            **INT** id of the entity acted upon (audit_log.entity_id_int), for INT-keyed lookup entities
            (entityType=reference-data: species/breeds/cities/health_certifications/genetic_markers;
            id-type convention: lookups=INT). Null when the entity is UUID-keyed (see entityId) or for
            system-wide actions. Exactly one of entityId / entityIdInt is populated per row.
        actionType:
          type: string
          maxLength: 100
          pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)+$'
          x-known-values: *auditKnownVerbs
          description: >-
            The exact stored audit verb (`audit_log.action`), namespaced **`{domain}.{verb}`** (e.g.
            `identity.role_changed`, `reference_data.created`, `user.erased`). Returned verbatim — the
            information-rich namespace is preserved, never collapsed to a coarse category. `x-known-values`
            lists the verbs emitted today (informative; the set grows additively per domain).
        actor:
          allOf: [ { $ref: '#/components/schemas/Actor' } ]
          description: >-
            Acting principal as the {actorId, principalType} agent-badge (ADR-0011 §6); replaces the former flat
            performedBy uuid. principalType is the write-time snapshot (audit_log.actor_principal_type); the
            display name (former performedByName) is carried as actor.actorDisplayName.
        details:
          type: string
          maxLength: 1000
          nullable: true
          description: Additional details about the action (JSON string)
        ipAddress:
          type: string
          pattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$'
          nullable: true
          description: IP address where action originated
        userAgent:
          type: string
          maxLength: 500
          nullable: true
          description: User agent string of client
        createdAt:
          type: string
          format: date-time
          description: Timestamp when action was logged
    UserRoleInfo:
      type: object
      required:
        - id
        - fullName
        - role
        - isActive
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: User ID
        fullName:
          type: string
          maxLength: 100
          description: User's full name
        email:
          type: string
          format: email
          nullable: true
          maxLength: 255
          description: Email address for notifications
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: User role
        isActive:
          type: boolean
          description: True = can login; False = deactivated
        createdAt:
          type: string
          format: date-time
          description: Registration timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last profile update
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Last login timestamp
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
          description: When user chose to deactivate (null if active)
        cityId:
          type: integer
          nullable: true
          description: Reference to city for geo-search (INT lookup)
        avatarUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 500
          description: URL to avatar in object storage
    ChangeUserRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum: [USER, MODERATOR, ADMIN, BREEDER, FARMER, VETERINARIAN, GROOMER]
          description: New role for user
  responses:
    Problem:
      description: RFC7807 problem (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
