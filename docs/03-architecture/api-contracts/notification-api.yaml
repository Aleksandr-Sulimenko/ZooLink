openapi: 3.0.3
info:
  title: ZooLink Notification API
  version: 1.0.0
  description: >-
    Notification templates, delivery logs, user preferences, and provider
    delivery webhooks (spec 13, notification_state_machine). Sending itself is
    triggered internally by domain events; this API covers management, prefs,
    and delivery-status callbacks.
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth (§2), x-required-roles (§3),
    RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /notifications/templates:
    get:
      summary: List notification templates (admin)
      operationId: listNotificationTemplates
      x-required-roles: [ADMIN]
      parameters:
        - in: query
          name: type
          schema: { type: string, enum: [EMAIL, SMS] }
        - in: query
          name: language
          schema: { type: string, maxLength: 2 }
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NotificationTemplate' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Create a notification template (admin)
      operationId: createNotificationTemplate
      x-required-roles: [ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationTemplateCreate' }
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationTemplate' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /notifications/logs:
    get:
      summary: List notification delivery logs (admin / own)
      operationId: listNotificationLogs
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, enum: [SENT, DELIVERED, FAILED, BOUNCED] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Logs page
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/NotificationLog' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /me/notification-preferences:
    get:
      summary: Get the current user's notification preferences
      operationId: getNotificationPreferences
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      responses:
        '200':
          description: Preferences (users.notification_prefs)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '401': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update the current user's notification preferences
      operationId: updateNotificationPreferences
      x-required-roles: [USER, BREEDER, FARMER, MODERATOR, ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationPreferences' }
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '401': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /notifications/webhook:
    post:
      summary: Provider delivery webhook
      operationId: notificationWebhook
      x-internal: true
      security: []
      description: >-
        Internal/provider-only (signature-verified, not bearer auth — security opt-out).
        Idempotent delivery-status callbacks from the email/SMS provider.
        delivered -> DELIVERED; hard bounce -> BOUNCED; transient error -> FAILED (retryable).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationWebhookEvent' }
      responses:
        '200': { description: Event accepted (idempotent) }
        '400': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    NotificationTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [EMAIL, SMS]
        subjectTemplate:
          type: string
          nullable: true
        bodyTemplate:
          type: string
        language:
          type: string
          maxLength: 2
          description: FK to supported_languages.code
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NotificationTemplateCreate:
      type: object
      required: [name, type, bodyTemplate, language]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [EMAIL, SMS]
        subjectTemplate:
          type: string
          nullable: true
        bodyTemplate:
          type: string
        language:
          type: string
          maxLength: 2
        isActive:
          type: boolean
          default: true
    NotificationLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [EMAIL, SMS]
        templateId:
          type: string
          format: uuid
          nullable: true
        recipient:
          type: string
        status:
          type: string
          enum: [SENT, DELIVERED, FAILED, BOUNCED]
        attempts:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NotificationPreferences:
      type: object
      description: Mirror of users.notification_prefs JSONB
      properties:
        email:
          type: boolean
          default: true
        sms:
          type: boolean
          default: true
        promo:
          type: boolean
          default: false
    NotificationWebhookEvent:
      type: object
      required: [status]
      properties:
        providerMessageId:
          type: string
        status:
          type: string
          enum: [DELIVERED, BOUNCED, FAILED]
        signature:
          type: string
        data:
          type: object
          description: Raw provider payload
  responses:
    Problem:
      description: RFC7807 problem (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
