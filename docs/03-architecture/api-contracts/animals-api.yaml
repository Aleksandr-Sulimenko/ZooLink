openapi: 3.0.3
info:
  title: ZooLink Animals API
  version: 1.0.0
  description: >
    API for managing animal profiles in ZooLink.
    Conforms to API_CONVENTIONS.md: camelCase bodies (§0), bearer auth (§2), x-required-roles (§3),
    RFC7807 Problem errors (§4), {items, meta: PageMeta} pagination (§5), LocalizedString (§6),
    If-Match/ETag on mutating PATCH (§10).
servers:
  - url: /api/v1
    description: ZooLink API v1
security:
  - bearerAuth: []
paths:
  /animals:
    get:
      summary: List animals with filtering
      operationId: listAnimals
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: query
          name: owner_id
          schema: { type: string, format: uuid }
          description: Filter by owner ID (personal listings)
        - in: query
          name: organization_id
          schema: { type: string, format: uuid }
          description: Filter by organization ID (organizational listings)
        - in: query
          name: species_id
          schema: { type: integer }
          description: Filter by species ID
        - in: query
          name: breed_id
          schema: { type: integer }
          description: Filter by breed ID
        - in: query
          name: sex
          schema: { type: string, enum: [Male, Female] }
          description: Filter by sex
        - in: query
          name: nickname
          schema: { type: string }
          description: Filter by nickname (partial match, case-insensitive)
        - in: query
          name: is_active
          schema: { type: boolean }
          description: Filter by active status
        - in: query
          name: date_of_birth_min
          schema: { type: string, format: date }
          description: Minimum date of birth
        - in: query
          name: date_of_birth_max
          schema: { type: string, format: date }
          description: Maximum date of birth
        - in: query
          name: owned_since_min
          schema: { type: string, format: date }
          description: Minimum ownership date
        - in: query
          name: owned_since_max
          schema: { type: string, format: date }
          description: Maximum ownership date
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of animals
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Animal' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    post:
      summary: Create a new animal profile
      operationId: createAnimal
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string, format: uuid }
          description: Client-generated key for safe retry (API_CONVENTIONS §11)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnimalCreate' }
      responses:
        '201':
          description: Animal created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}:
    get:
      summary: Get animal by ID
      operationId: getAnimalById
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Animal details
          headers:
            ETag:
              schema: { type: string }
              description: Weak validator to send back as If-Match on PATCH (§10)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    patch:
      summary: Update animal
      operationId: updateAnimal
      description: Optimistic concurrency (§10) — requires If-Match carrying the ETag from a prior GET.
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
          description: ETag from a prior GET /animals/{id}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnimalUpdate' }
      responses:
        '200':
          description: Animal updated successfully
          headers:
            ETag:
              schema: { type: string }
              description: New weak validator after update
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '412': { $ref: '#/components/responses/Problem' }
        '428': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
    delete:
      summary: Delete animal (soft delete via isActive=false)
      operationId: deleteAnimal
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Animal deleted successfully }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}/ownership-history:
    get:
      summary: Get ownership history for an animal
      operationId: getAnimalOwnershipHistory
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Animal ID
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
          description: Page number for pagination
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
          description: Number of items per page
      responses:
        '200':
          description: Paginated list of ownership history records
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AnimalOwnershipHistory' }
                  meta: { $ref: '#/components/schemas/PageMeta' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}/deactivate:
    patch:
      summary: Deactivate an animal (soft delete)
      operationId: deactivateAnimal
      description: State-transition endpoint — keeps guard-based 409 (API_CONVENTIONS §10) instead of If-Match.
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Animal deactivated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
  /animals/{id}/reactivate:
    patch:
      summary: Reactivate an animal
      operationId: reactivateAnimal
      description: State-transition endpoint — keeps guard-based 409 (API_CONVENTIONS §10) instead of If-Match.
      x-required-roles: [USER, BREEDER, FARMER, VETERINARIAN, GROOMER, MODERATOR, ADMIN]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Animal reactivated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Animal' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '403': { $ref: '#/components/responses/Problem' }
        '404': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LocalizedString:
      type: object
      properties:
        en: { type: string }
        ru: { type: string }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
        nextCursor: { type: string, nullable: true }
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri, example: "about:blank" }
        title: { type: string }
        status: { type: integer }
        code: { type: string }
        detail: { type: string }
        instance: { type: string }
        errors: { type: array, items: { type: object } }
    Animal:
      type: object
      required:
        - id
        - speciesId
        - sex
        - dateOfBirth
        - isActive
        - createdAt
        - updatedAt
        - healthRecords
        - reproductiveData
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to user (nullable if organizationId set)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to organization (nullable if ownerId set)
        speciesId:
          type: integer
          description: Foreign key to species (INT lookup)
        breedId:
          type: integer
          nullable: true
          description: Foreign key to breed (INT lookup; nullable if custom/other)
        breedTextLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Custom breed text if breedId is null, for moderator review (LocalizedString {en, ru})
        nicknameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Display name (LocalizedString {en, ru})
        sex:
          type: string
          enum: [Male, Female]
          description: Sex of the animal
        dateOfBirth:
          type: string
          format: date
          description: Date of birth
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Free-text description (LocalizedString {en, ru})
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Discrete color/coat attribute (maps to DB color_coat snake_case, API_CONVENTIONS §12); structured, distinct from free-text descriptionLocalized
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: Microchip ID
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: Tattoo/brand ID (for livestock)
        isActive:
          type: boolean
          description: Active status (visible for new listings when true)
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Date when current owner acquired the animal
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to mother for pedigree tracking
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to father for pedigree tracking
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Type of health record (e.g., vaccination, deworming)
              detail:
                type: string
                description: Detail of the health record (e.g., Rabies, Panacur)
              date:
                type: string
                format: date
                description: Date of the health event
              provider:
                type: string
                description: Provider/veterinary clinic
          description: Array of health record objects
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Event type (e.g., heat_start, mating)
              date:
                type: string
                format: date
                description: Date of the event
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Foreign key to partner animal (if applicable)
          description: Array of reproductive data objects (for females)
          default: []
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when animal was deactivated (soft delete)
    AnimalCreate:
      type: object
      required:
        - speciesId
        - sex
        - dateOfBirth
        - nicknameLocalized
      properties:
        ownerId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to user (set if personal ownership, null if organization ownership)
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Foreign key to organization (set if organizational ownership, null if personal ownership)
        speciesId:
          type: integer
          description: Foreign key to species (INT lookup)
        breedId:
          type: integer
          nullable: true
          description: Foreign key to breed (INT lookup; nullable if custom/other)
        breedTextLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Custom breed text if breedId is null, for moderator review (LocalizedString {en, ru})
        nicknameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Display name (LocalizedString {en, ru})
        sex:
          type: string
          enum: [Male, Female]
          description: Sex of the animal
        dateOfBirth:
          type: string
          format: date
          description: Date of birth
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Free-text description (LocalizedString {en, ru})
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Discrete color/coat attribute (maps to DB color_coat snake_case, API_CONVENTIONS §12); structured, distinct from free-text descriptionLocalized
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: Microchip ID
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: Tattoo/brand ID (for livestock)
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Date when current owner acquired the animal
        motherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to mother for pedigree tracking
        fatherId:
          type: string
          format: uuid
          nullable: true
          description: Reference to father for pedigree tracking
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Type of health record (e.g., vaccination, deworming)
              detail:
                type: string
                description: Detail of the health record (e.g., Rabies, Panacur)
              date:
                type: string
                format: date
                description: Date of the health event
              provider:
                type: string
                description: Provider/veterinary clinic
          description: Array of health record objects
          default: []
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Event type (e.g., heat_start, mating)
              date:
                type: string
                format: date
                description: Date of the event
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Foreign key to partner animal (if applicable)
          description: Array of reproductive data objects (for females)
          default: []
        isActive:
          type: boolean
          description: Active status
          default: true
    AnimalUpdate:
      type: object
      properties:
        nicknameLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Display name (LocalizedString {en, ru})
        descriptionLocalized:
          allOf: [ { $ref: '#/components/schemas/LocalizedString' } ]
          description: Free-text description (LocalizedString {en, ru})
        colorCoat:
          type: string
          maxLength: 100
          nullable: true
          description: Discrete color/coat attribute (maps to DB color_coat snake_case, API_CONVENTIONS §12); mutable — patchable (unlike immutable species/sex/DoB)
        microchipId:
          type: string
          maxLength: 50
          nullable: true
          description: Microchip ID
        tattooBrandId:
          type: string
          maxLength: 50
          nullable: true
          description: Tattoo/brand ID (for livestock)
        healthRecords:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Type of health record (e.g., vaccination, deworming)
              detail:
                type: string
                description: Detail of the health record (e.g., Rabies, Panacur)
              date:
                type: string
                format: date
                description: Date of the health event
              provider:
                type: string
                description: Provider/veterinary clinic
          description: Array of health record objects
        reproductiveData:
          type: array
          items:
            type: object
            properties:
              event:
                type: string
                description: Event type (e.g., heat_start, mating)
              date:
                type: string
                format: date
                description: Date of the event
              partnerId:
                type: string
                format: uuid
                nullable: true
                description: Foreign key to partner animal (if applicable)
          description: Array of reproductive data objects (for females)
        ownedSince:
          type: string
          format: date
          nullable: true
          description: Date when current owner acquired the animal
        isActive:
          type: boolean
          description: Active status
    AnimalOwnershipHistory:
      type: object
      required:
        - id
        - animalId
        - ownerId
        - startDate
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        animalId:
          type: string
          format: uuid
          description: Foreign key to animal
        ownerId:
          type: string
          format: uuid
          description: Foreign key to user
        startDate:
          type: string
          format: date
          description: Start date of ownership
        endDate:
          type: string
          format: date
          nullable: true
          description: End date of ownership (nullable if current)
        transferReason:
          type: string
          nullable: true
          description: Reason for ownership transfer
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
  responses:
    Problem:
      description: RFC7807 problem (application/problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
