# ⚠️ DRAFT template — normative shape of the MVP CI gate. Activates once ./backend exists.
# Defined per docs/specs/09-testing-strategy.md and docs/specs/security/security_specification.md.
name: CI

on:
  pull_request:
  push:
    branches: [ main, backend ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zoolink
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: zoolink_test
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U zoolink" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      # --- the steps below require ./backend (package.json, prisma) to exist ---
      - name: Install
        run: cd backend && npm ci
      - name: Lint & typecheck
        run: cd backend && npm run lint && npm run typecheck
      - name: Migrate (schema applies cleanly)
        run: cd backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://zoolink:ci@localhost:5432/zoolink_test
      - name: Unit + integration (PostgreSQL; coverage gate)
        run: cd backend && npm test -- --coverage
        env:
          DATABASE_URL: postgresql://zoolink:ci@localhost:5432/zoolink_test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency audit
        run: cd backend && npm audit --audit-level=high
      - name: SAST (Semgrep, OWASP)
        uses: returntocorp/semgrep-action@v1
        with: { config: p/owasp-top-ten }
      - name: Container/IaC scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: HIGH,CRITICAL }
      # DAST (OWASP ZAP baseline) runs on the staging deployment on a schedule, not per-PR.
