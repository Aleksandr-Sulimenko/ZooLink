# MVP CI gate. Per docs/specs/09-testing-strategy.md and security/security_specification.md.
# DB workflow is SQL-canonical + Prisma introspect (ADR-0007): the schema is applied from
# database_schema.sql and the typed client is generated from the committed schema.prisma —
# Prisma Migrate is intentionally NOT used, so there is no `prisma migrate deploy` step.
name: CI

on:
  pull_request:
  push:
    branches: [main, test, backend]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://zoolink:ci@localhost:5432/zoolink_test?schema=public
      REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zoolink
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: zoolink_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U zoolink" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate Prisma client (from committed schema.prisma)
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests (coverage)
        run: npm test -- --coverage

      - name: Apply canonical schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f ../database_schema.sql

      - name: Prisma schema drift check (schema.prisma must match the DB)
        run: |
          npm run db:pull
          git diff --exit-code prisma/schema.prisma \
            || (echo "::error::prisma/schema.prisma is out of sync — run 'npm run db:sync' and commit"; exit 1)

      - name: Seed runner (idempotent — run twice)
        run: |
          npm run seed
          npm run seed

      # Integration/e2e against the real PG + Redis services (outbox round-trip; auth/authz over
      # HTTP). The canonical schema was applied above, so the DB is at its final shape. App boot
      # requires the full env contract — provide test-only secrets here (NOT real values).
      - name: E2E / integration tests
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci_access_secret_0000000000000000000000000000
          JWT_REFRESH_SECRET: ci_refresh_secret_000000000000000000000000000
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: ci
          S3_SECRET_KEY: ci-secret
          S3_BUCKET: zoolink-media
        run: npm run test:e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install (for audit)
        run: cd backend && npm ci
      # Security-gate policy:
      #  - HARD GATE: no HIGH+ vulnerabilities in the PRODUCTION dependency tree (this is what the
      #    runtime image ships — built with `npm ci --omit=dev`). Fails the build.
      - name: Dependency audit — production tree (blocking)
        run: cd backend && npm audit --omit=dev --audit-level=high
      #  - ADVISORY: full tree (incl. dev tooling) for visibility; does not block (dev-only CVEs
      #    don't ship). Promote to blocking once the dev-tree backlog is burned down.
      - name: Dependency audit — full tree (advisory)
        run: cd backend && npm audit --audit-level=high
        continue-on-error: true
      # SAST / container scan are advisory until tuned (rules + SARIF upload + thresholds), then
      # flip continue-on-error → false to make them blocking gates.
      - name: SAST (Semgrep, OWASP)
        uses: returntocorp/semgrep-action@v1
        with: { config: p/owasp-top-ten }
        continue-on-error: true
      - name: Filesystem scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: HIGH,CRITICAL }
        continue-on-error: true
      # DAST (OWASP ZAP baseline) runs against staging on a schedule, not per-PR.
